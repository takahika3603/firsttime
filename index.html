<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>進捗管理</title>

<style>
body{
font-family:"Meiryo";
background:#0f172a;
color:#fff;
padding:20px;
}

.wrapper{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
gap:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:16px;
text-align:center;
}

.percent{
font-size:28px;
font-weight:bold;
}

.bar{
width:100%;
height:20px;
background:#334155;
border-radius:20px;
overflow:hidden;
margin:10px 0;
}

.progress{
height:100%;
width:0%;
background:#22c55e;
transition:0.4s;
}

.info{
font-size:13px;
margin:10px 0;
}

.msg{
height:20px;
margin:10px 0;
color:#facc15;
}

button{
width:100%;
padding:10px;
margin:4px 0;
border:none;
border-radius:10px;
font-weight:bold;
}

.add{ background:#22c55e; color:#fff; }
.miss{ background:#ef4444; color:#fff; }
.reset{ background:#64748b; color:#fff; }
.history{ background:#6366f1; color:#fff; }
</style>
</head>

<body>

<h2 style="text-align:center;">進捗管理</h2>

<div class="wrapper" id="games"></div>

<script>

const TOTAL = 100;
const GAME_COUNT = 5;

const messages = [
"いいぞ！","その調子🔥","速い！","ナイス入力！",
"集中できてる","プロやん","もう止まらん"
];

const names = ["スケジュール", "口コミ獲得（日本人）", "口コミ獲得（外国人）", "飛込数", "プレイヤー5"];

// ===== HTML生成 =====
for(let i=1;i<=GAME_COUNT;i++){

let isJP = (i === 2);

document.getElementById("games").innerHTML += `
<div class="box">

<h3>${names[i - 1]}</h3>

<div class="percent" id="percent${i}">0%</div>
<div class="bar"><div class="progress" id="bar${i}"></div></div>
<div class="info" id="info${i}"></div>
<div class="msg" id="msg${i}"></div>

<button class="add" onclick="add(${i})">
${isJP ? "応対数＋1" : "＋1件入力"}
</button>

<button class="miss" onclick="miss(${i})">
${isJP ? "獲得数＋1" : "ミス"}
</button>

${isJP ? `<button class="history" onclick="showHistory(${i})">履歴</button>` : ""}

<button class="reset" onclick="resetGame(${i})">
${isJP ? "ミス" : "リセット"}
</button>

</div>
`;
}

// ===== データ =====
let data = {};

for(let i=1;i<=GAME_COUNT;i++){
data[i] = {
done: Number(localStorage.getItem(`done${i}`) || 0),
miss: Number(localStorage.getItem(`miss${i}`) || 0),
streak: Number(localStorage.getItem(`streak${i}`) || 0),
time: Number(localStorage.getItem(`time${i}`) || 0),
history: JSON.parse(localStorage.getItem(`history${i}`) || "[]")
};
}

// ===== 保存 =====
function save(i){
localStorage.setItem(`done${i}`, data[i].done);
localStorage.setItem(`miss${i}`, data[i].miss);
localStorage.setItem(`streak${i}`, data[i].streak);
localStorage.setItem(`time${i}`, data[i].time);
localStorage.setItem(`history${i}`, JSON.stringify(data[i].history));
}

// ===== 履歴追加 =====
function addHistory(i, text){
data[i].history.unshift(`${new Date().toLocaleString()} ${text}`);
data[i].history = data[i].history.slice(0, 30);
save(i);
}

// ===== 更新 =====
function update(i){
let d = data[i];

let percent = Math.floor((d.done / TOTAL) * 100);
let remain = TOTAL - d.done;

let accuracy = (d.done + d.miss) === 0
? 100
: Math.floor((d.done / (d.done + d.miss)) * 100);

document.getElementById(`percent${i}`).innerText = percent + "%";
document.getElementById(`bar${i}`).style.width = percent + "%";

document.getElementById(`bar${i}`).style.background =
percent >= 80 ? "#f59e0b" : "#22c55e";

document.getElementById(`info${i}`).innerText =
`入力:${d.done}/100 残り:${remain} ミス:${d.miss} 精度:${accuracy}% 連続:${d.streak}`;

if(d.done === TOTAL){
alert(`🏆 プレイヤー${i} 完全達成！`);
}

save(i);
}

// ===== 応対数（元add） =====
function add(i){
let d = data[i];

if(d.done < TOTAL){
d.done++;
}

d.time = Date.now();

document.getElementById(`msg${i}`).innerText =
messages[Math.floor(Math.random() * messages.length)];

addHistory(i, "応対 +1");

update(i);
}

// ===== 獲得数（元miss） =====
function miss(i){
let d = data[i];

d.miss++;

document.getElementById(`msg${i}`).innerText = "獲得 +1";

addHistory(i, "獲得 +1");

update(i);
}

// ===== ミス（元reset） =====
function resetGame(i){
if(confirm(`プレイヤー${i}をミス扱いする？`)){

data[i].done = 0;
data[i].miss = 0;
data[i].streak = 0;
data[i].time = 0;

addHistory(i, "ミス（リセット扱い）");

document.getElementById(`msg${i}`).innerText = "ミス扱い";

update(i);
}
}

// ===== 履歴表示 =====
function showHistory(i){
alert(data[i].history.join("\n") || "履歴なし");
}

// 初期描画
for(let i=1;i<=GAME_COUNT;i++){
update(i);
}

</script>

</body>
</html>
