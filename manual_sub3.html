<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Timeline System</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo",sans-serif;
  background:#05070c;
  color:#eaf2ff;
  padding:16px;
}

.section{
  margin-bottom:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

input,button{
  padding:8px;
  margin:3px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#eaf2ff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.room{
  background:rgba(255,255,255,0.06);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

.title{
  font-weight:600;
  color:#9fd0ff;
  margin-bottom:6px;
}

.block{
  margin-top:6px;
  font-size:11px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="section">
  <h3>午前（固定部屋）</h3>
  <input id="m_name" placeholder="名前">
  <input id="m_room" placeholder="部屋">
  <input id="m_start" type="time">
  <input id="m_end" type="time">
  <button onclick="addMorning()">追加</button>
</div>

<div class="section">
  <h3>午後</h3>
  <input id="a_name" placeholder="名前">
  <input id="a_start" type="time">
  <input id="a_end" type="time">
  <button onclick="addAfternoon()">追加</button>
</div>

<button onclick="calc()">再計算</button>

<div class="grid" id="grid"></div>

<script>

const ROOMS=["201","202","203","301","302","303","401","402","501"];
const CLEAN=30;

let morning=[];
let afternoon=[];

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

/* =================
入力
================= */
function addMorning(){
  morning.push({
    name:m_name.value,
    room:m_room.value,
    start:m_start.value,
    end:m_end.value
  });
}

function addAfternoon(){
  afternoon.push({
    name:a_name.value,
    start:a_start.value,
    end:a_end.value
  });
}

/* =================
コア
================= */
function calc(){

  let rooms={};

  ROOMS.forEach(r=>{
    rooms[r]={room:r,logs:[],freeAt:0};
  });

  /* 午前 */
  morning.forEach(m=>{
    rooms[m.room].logs.push({
      name:m.name,
      start:toMin(m.start),
      end:toMin(m.end)
    });

    rooms[m.room].freeAt=toMin(m.end)+CLEAN;
  });

  /* 午後 */
  afternoon.sort((a,b)=>toMin(a.start)-toMin(b.start));

  afternoon.forEach(a=>{

    let target=Object.values(rooms)
      .sort((x,y)=>x.freeAt-y.freeAt)[0];

    let start=Math.max(toMin(a.start),target.freeAt);

    target.logs.push({
      name:a.name,
      start:start,
      end:toMin(a.end)
    });

    target.freeAt=toMin(a.end)+CLEAN;
  });

  render(rooms);
}

/* =================
表示
================= */
function render(rooms){

  grid.innerHTML="";

  Object.values(rooms).forEach(r=>{

    grid.innerHTML+=`
      <div class="room">
        <div class="title">${r.room}</div>

        ${r.logs.map(l=>`
          <div class="block">
            ${l.name}<br>
            ${fmt(l.start)} - ${fmt(l.end)}
          </div>
        `).join("")}

      </div>
    `;
  });
}

function fmt(m){
  return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

</script>

</body>
</html>
