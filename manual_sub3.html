<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Zero Idle System</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo",sans-serif;
  background:#05070c;
  color:#eaf2ff;
  padding:16px;
}

/* sections */
.section{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
}

input,button{
  padding:8px;
  margin:3px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#eaf2ff;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

/* room */
.room{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;
  padding:10px;
  font-size:12px;
  position:relative;
}

.title{
  font-weight:600;
  color:#9fd0ff;
  margin-bottom:6px;
}

/* warning */
.badge{
  position:absolute;
  top:8px;
  right:8px;
  font-size:10px;
  padding:2px 6px;
  border-radius:999px;
  background:rgba(255,80,80,0.2);
  color:#ff9a9a;
}

/* waiting */
.wait{
  background:rgba(255,255,255,0.04);
  border-radius:12px;
  padding:8px;
  font-size:11px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- 午前 -->
<div class="section">
  <h3>午前（固定）</h3>
  <input id="m_name" placeholder="名前">
  <input id="m_room" placeholder="部屋">
  <input id="m_end" type="time">
  <button onclick="addMorning()">追加</button>
</div>

<!-- 午後 -->
<div class="section">
  <h3>午後</h3>
  <input id="a_name" placeholder="名前">
  <input id="a_start" type="time">
  <input id="a_end" type="time">
  <button onclick="addAfternoon()">追加</button>
</div>

<button onclick="calc()">再計算</button>

<div class="grid" id="grid"></div>

<div class="section">
  <h3>待機リスト</h3>
  <div id="wait"></div>
</div>

<script>

const ROOMS=["201","202","203","301","302","303","401","402","501"];
const CLEAN=30;

let morning=[];
let afternoon=[];
let waiting=[];

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

/* =================
入力
================= */
function addMorning(){
  morning.push({
    name:m_name.value,
    room:m_room.value,
    end:m_end.value
  });
}

function addAfternoon(){
  afternoon.push({
    name:a_name.value,
    start:a_start.value,
    end:a_end.value
  });
}

/* =================
コアロジック
================= */
function calc(){

  let rooms={};
  waiting=[];

  ROOMS.forEach(r=>{
    rooms[r]={
      room:r,
      logs:[],
      freeAt:0
    };
  });

  /* 午前 */
  morning.forEach(m=>{
    rooms[m.room].logs.push({
      name:m.name,
      start:0,
      end:toMin(m.end)
    });

    rooms[m.room].freeAt=toMin(m.end)+CLEAN;
  });

  /* 午後（重要：空きを最小化優先） */
  let sorted=[...afternoon].sort((a,b)=>toMin(a.start)-toMin(b.start));

  sorted.forEach(a=>{

    let candidates = Object.values(rooms)
      .filter(r=>toMin(a.start)<=r.freeAt || r.freeAt<=toMin(a.start))
      .sort((x,y)=>x.freeAt-y.freeAt);

    let target = candidates[0];

    if(!target){
      waiting.push(a.name);
      return;
    }

    let start=Math.max(toMin(a.start),target.freeAt);

    target.logs.push({
      name:a.name,
      start:start,
      end:toMin(a.end)
    });

    target.freeAt=toMin(a.end)+CLEAN;
  });

  render(rooms);
}

/* =================
稼働率
================= */
function rate(logs){
  if(!logs.length) return 0;

  let min=Math.min(...logs.map(l=>l.start));
  let max=Math.max(...logs.map(l=>l.end));

  let total=logs.reduce((s,l)=>s+(l.end-l.start),0);
  let span=max-min;

  if(span<=0) return 0;

  return Math.round(total/span*100);
}

/* =================
表示
================= */
function render(rooms){

  grid.innerHTML="";

  Object.values(rooms).forEach(r=>{

    let rrate=rate(r.logs);

    grid.innerHTML+=`
      <div class="room">
        <div class="title">${r.room}</div>

        ${rrate<60?'<div class="badge">LOW</div>':''}

        <div>稼働率：${rrate}%</div>

        ${r.logs.map(l=>`
          <div style="margin-top:6px;">
            ${l.name}<br>
            ${fmt(l.start)} - ${fmt(l.end)}
          </div>
        `).join("")}

      </div>
    `;
  });

  wait.innerHTML = waiting.length
    ? waiting.map(w=>`・${w}`).join("<br>")
    : "なし";
}

function fmt(m){
  if(!m && m!==0) return "-";
  return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

</script>

</body>
</html>
