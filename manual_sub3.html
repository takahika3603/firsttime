<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Optimization System PRO</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#05070c;
  color:#eaf2ff;
  padding:14px;
}

/* ===== 入力（1行共通） ===== */
.row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

input,button{
  padding:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#eaf2ff;
  font-size:12px;
}

input{
  flex:1;
  min-width:90px;
}

/* ===== レイアウト ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.room{
  background:rgba(255,255,255,0.06);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

.title{
  font-weight:600;
  color:#9fd0ff;
  margin-bottom:6px;
}

.item{
  margin-top:6px;
  padding:6px;
  border-radius:8px;
}

/* 通常 */
.normal{
  background:transparent;
}

/* オレンジ（接続・調整あり） */
.orange{
  background:rgba(255,165,0,0.18);
  border:1px solid rgba(255,165,0,0.35);
}

/* 赤（待機・破綻） */
.red{
  background:rgba(255,80,80,0.18);
  border:1px solid rgba(255,80,80,0.35);
}
</style>
</head>

<body>

<!-- ===== 共通入力 ===== -->
<div class="row">
  <input id="name" placeholder="名前">
  <input id="room" placeholder="部屋（任意）">
  <input id="start" type="time">
  <input id="end" type="time">
  <button onclick="add()">追加</button>
  <button onclick="calc()">計算</button>
</div>

<div class="grid" id="grid"></div>

<script>

const ROOMS=["201","202","203","301","302","303","401","402","501"];

let list=[];

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

/* =========================
入力
========================= */
function add(){
  list.push({
    name:name.value,
    room:room.value || null,
    start:toMin(start.value),
    end:toMin(end.value)
  });
}

/* =========================
コアロジック
========================= */
function calc(){

  let rooms={};

  ROOMS.forEach(r=>{
    rooms[r]={logs:[],freeAt:0};
  });

  let cleanBase = 30;

  // 混雑時は短縮
  if(list.length > 15) cleanBase = 15;

  list.sort((a,b)=>a.start-b.start);

  list.forEach(p=>{

    let target;

    // 固定（午前扱い）
    if(p.room){
      target = rooms[p.room];
    }
    // 流動（午後扱い）
    else{
      target = Object.values(rooms)
        .sort((a,b)=>a.freeAt-b.freeAt)[0];
    }

    let realStart = Math.max(p.start, target.freeAt);

    let isDelayed = realStart !== p.start;

    let isBoundary = target.freeAt === p.start;

    target.logs.push({
      name:p.name,
      start:p.start,       // シフトは絶対保持
      end:p.end,
      realStart,
      isDelayed,
      isBoundary
    });

    target.freeAt = p.end + cleanBase;
  });

  render(rooms);
}

/* =========================
表示
========================= */
function render(rooms){

  grid.innerHTML="";

  Object.entries(rooms).forEach(([room,r])=>{

    let html="";

    r.logs.forEach(l=>{

      let cls="normal";

      if(l.isDelayed){
        cls="red";        // 待機発生
      }
      else if(l.isBoundary){
        cls="orange";     // 連続接続
      }

      html+=`
        <div class="item ${cls}">
          ${l.name}<br>
          ${fmt(l.start)} - ${fmt(l.end)}
        </div>
      `;
    });

    grid.innerHTML+=`
      <div class="room">
        <div class="title">${room}</div>
        ${html}
      </div>
    `;
  });
}

function fmt(m){
  return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

</script>

</body>
</html>
