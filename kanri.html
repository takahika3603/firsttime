<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来客名簿</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
color:#eaf2ff;

background:
radial-gradient(circle at 20% 10%, rgba(90,130,255,0.18), transparent 55%),
radial-gradient(circle at 80% 90%, rgba(255,90,180,0.10), transparent 60%),
#02030a;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:url("https://www.transparenttextures.com/patterns/noise.png");
opacity:0.03;
pointer-events:none;
}

.container{
padding:18px;
max-width:720px;
margin:auto;
}

h1{
text-align:center;
font-weight:500;
margin:10px 0 12px;
}

/* ボタン */
.button{
width:100%;
padding:12px;
border-radius:16px;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(35px);
border:1px solid rgba(255,255,255,0.06);
color:rgba(255,255,255,0.85);
margin-bottom:10px;
}

/* FAB */
.fab{
position:fixed;
right:18px;
bottom:18px;
width:58px;
height:58px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(30px);
border:1px solid rgba(255,255,255,0.08);
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.8);
}

/* LIST */
.list div{
padding:12px 14px;
border-radius:16px;
margin-bottom:8px;

display:flex;
align-items:center;
gap:14px;

background:rgba(255,255,255,0.03);
backdrop-filter: blur(30px);
border:1px solid rgba(255,255,255,0.06);
transition:0.2s;
}

.list div:hover{
transform:scale(1.02);
background:rgba(255,255,255,0.06);
}

.price{
margin-left:auto;
font-weight:600;
background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-size:14px;
}

.text{
font-size:13px;
color:rgba(230,240,255,0.9);
}

/* CHIP */
.label{
font-size:11px;
color:rgba(160,170,210,0.8);
margin:10px 0 6px;
}

.chip-group{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.chip{
padding:9px 13px;
border-radius:999px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
color:rgba(255,255,255,0.75);
font-size:12px;
transition:0.2s;
}

.chip.active{
background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
color:white;
}

/* DETAIL */
#detailPage{ display:none; }

.card{
padding:16px;
border-radius:20px;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(35px);
border:1px solid rgba(255,255,255,0.06);
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.06);
color:white;
}

.smallBtn{
width:100%;
padding:10px;
border-radius:12px;
margin-top:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:white;
}

.hidden{ display:none; }
</style>
</head>

<body>

<div class="container">

<h1>来客名簿</h1>

<button class="button" onclick="goDashboard()">ダッシュボードへ</button>

<div id="listPage" class="list"></div>

<!-- DETAIL -->
<div id="detailPage">

<div class="card">

<input id="date" placeholder="日付">
<input id="cast" placeholder="キャスト">
<input id="price" placeholder="金額">

<!-- コース -->
<div class="label">コース</div>
<div class="chip-group" id="timeGroup">
<button class="chip" onclick="setChip('time','60分',this)">60分</button>
<button class="chip" onclick="setChip('time','75分',this)">75分</button>
<button class="chip" onclick="setChip('time','90分',this)">90分</button>
<button class="chip" onclick="setChip('time','120分',this)">120分</button>
<button class="chip" onclick="setChip('time','極液',this)">極液</button>
</div>

<button class="smallBtn" onclick="save()">保存</button>
<button class="smallBtn" onclick="back()">戻る</button>

</div>
</div>

</div>

<div class="fab" onclick="add()">＋</div>

<script>

let records = JSON.parse(localStorage.getItem("records") || "[]");
let editIndex = null;

let form = {
time:"",
op:[]
};

/* ===== リスト ===== */
function render(){
const list = document.getElementById("listPage");
list.innerHTML = "";

records.slice().reverse().forEach((r,i)=>{

const d = new Date(r.date);
const day = d.getDate();

const div = document.createElement("div");

div.innerHTML = `
<div class="text">
${day}日 ${r.time} ${r.cast} ${r.course || ""} 
</div>

<div class="price">
${Number(r.price).toLocaleString()}円
</div>
`;

div.onclick = ()=>open(i);

list.appendChild(div);
});
}

/* ===== 開く ===== */
function open(i){

const real = records.length - 1 - i;
const r = records[real];

editIndex = real;

date.value = r.date;
cast.value = r.cast;
price.value = r.price;

form.time = r.time;
sync();

document.getElementById("listPage").style.display="none";
document.getElementById("detailPage").style.display="block";
}

/* ===== チップ ===== */
function setChip(key,value,el){

form[key]=value;

document.querySelectorAll("#timeGroup .chip")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");
}

/* ===== 保存 ===== */
function save(){

records[editIndex]={
date:date.value,
cast:cast.value,
price:price.value,
time:form.time,
course:form.time
};

localStorage.setItem("records",JSON.stringify(records));

back();
render();
}

/* ===== 戻る ===== */
function back(){
document.getElementById("detailPage").style.display="none";
document.getElementById("listPage").style.display="block";
}

/* ===== ダッシュボード ===== */
function goDashboard(){
location.href="dashboard.html";
}

/* ===== 仮追加 ===== */
function add(){
records.push({
date:"2026-04-18",
cast:"未入力",
price:0,
time:"60分",
course:"60分"
});

localStorage.setItem("records",JSON.stringify(records));
render();
}

/* ===== 初期 ===== */
function sync(){
document.querySelectorAll("#timeGroup .chip")
.forEach(c=>{
if(c.innerText===form.time) c.classList.add("active");
});
}

render();

</script>

</body>
</html>
