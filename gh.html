<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog CMS Builder PRO</title>

<style>
:root{
  --bg:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.12);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.6);
  --accent:linear-gradient(135deg,#a5b4fc,#f9a8d4);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo",sans-serif;
background:var(--bg);
color:var(--text);
padding:18px;
}

.container{
max-width:760px;
margin:0 auto;
display:flex;
flex-direction:column;
gap:14px;
}

.header{
font-size:20px;
font-weight:700;
margin-bottom:4px;
}

.sub{
font-size:13px;
color:var(--muted);
margin-bottom:10px;
}

.card{
background:var(--card);
border:1px solid var(--card-border);
border-radius:16px;
padding:14px;
backdrop-filter:blur(18px);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:var(--accent);
color:#fff;
font-weight:700;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
opacity:0.95;
}

/* ===== ブロック（完全横並び）===== */
.block{
display:flex;
flex-direction:row;
align-items:center;
justify-content:space-between;
gap:10px;
padding:12px;
margin:10px 0;
border-radius:12px;
background:rgba(255,255,255,0.04);
overflow-x:auto;
white-space:nowrap;
}

.block-left{
display:flex;
align-items:center;
gap:10px;
min-width:0;
flex-shrink:0;
}

.block-title{
font-size:14px;
font-weight:600;
white-space:nowrap;
}

.block-meta{
display:flex;
align-items:center;
gap:12px;
font-size:12px;
color:var(--muted);
flex-shrink:0;
}

.edit-btn{
cursor:pointer;
color:#a5b4fc;
white-space:nowrap;
}

.output{
white-space:pre-wrap;
font-family:monospace;
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
min-height:160px;
font-size:12px;
line-height:1.5;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
padding:14px;
}

.modal-box{
width:100%;
max-width:520px;
background:#0b0f1a;
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
padding:16px;
}

input,textarea{
width:100%;
background:#05070f;
color:#fff;
border:none;
border-radius:10px;
padding:10px;
font-family:monospace;
margin-bottom:10px;
font-size:13px;
}

textarea{
height:180px;
}

.small{
font-size:12px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<div class="header">Blog CMS Builder PRO</div>
<div class="sub">横並びUIでブロックを管理・生成できます</div>

<div class="card">
<button onclick="openAddModal()">＋ ブロック追加</button>
</div>

<div class="card" id="blockList"></div>

<div class="card">
<button onclick="generate()">コード生成</button>
</div>

<div class="card">
<div id="output" class="output">ここにHTMLが生成されます</div>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalTitle">ブロック編集</h3>

<input id="titleInput" placeholder="タイトル">
<input id="priorityInput" type="number" placeholder="優先順位（数字が大きいほど上）">
<textarea id="codeInput" placeholder="HTMLコード"></textarea>

<button onclick="saveBlock()">保存</button>
</div>
</div>

<script>

let blocks = [
{key:"salary",title:"給与ボックス",priority:1,code:`<div style=\"background:#fdf2f8;padding:12px;border-radius:12px;\">給与は安定しています</div>`,checked:false},
{key:"job",title:"仕事内容ボックス",priority:1,code:`<div style=\"background:#ecfeff;padding:12px;border-radius:12px;\">仕事内容はシンプルです</div>`,checked:false},
{key:"easy",title:"未経験OKボックス",priority:1,code:`<div style=\"background:#f0fdf4;padding:12px;border-radius:12px;\">未経験でも安心して始められます</div>`,checked:false},
{key:"env",title:"働きやすさボックス",priority:1,code:`<div style=\"background:#fff7ed;padding:12px;border-radius:12px;\">働きやすい環境を整えています</div>`,checked:false}
];

let editIndex=null;
let mode="add";

function renderList(){
let html="";
blocks.forEach((b,i)=>{
html+=`
<div class="block">
<div class="block-left">
<input type="checkbox" onchange="toggle(${i})" ${b.checked?"checked":""}>
<span class="block-title">${b.title}</span>
</div>

<div class="block-meta">
<span>優先:${b.priority}</span>
<span class="edit-btn" onclick="editBlock(${i})">編集</span>
</div>
</div>
`;
});
document.getElementById("blockList").innerHTML=html;
}

function toggle(i){blocks[i].checked=!blocks[i].checked;}

function openAddModal(){
mode="add";
editIndex=null;
document.getElementById("modalTitle").innerText="ブロック追加";
document.getElementById("titleInput").value="";
document.getElementById("priorityInput").value="1";
document.getElementById("codeInput").value="";
document.getElementById("modal").style.display="flex";
}

function editBlock(i){
mode="edit";
editIndex=i;
let b=blocks[i];
document.getElementById("modalTitle").innerText="編集："+b.title;
document.getElementById("titleInput").value=b.title;
document.getElementById("priorityInput").value=b.priority;
document.getElementById("codeInput").value=b.code;
document.getElementById("modal").style.display="flex";
}

function saveBlock(){
let title=document.getElementById("titleInput").value;
let priority=parseInt(document.getElementById("priorityInput").value||"0");
let code=document.getElementById("codeInput").value;

if(mode==="add")blocks.push({key:"k"+Date.now(),title,priority,code,checked:false});
else{
blocks[editIndex].title=title;
blocks[editIndex].priority=priority;
blocks[editIndex].code=code;
}

document.getElementById("modal").style.display="none";
renderList();
}

function generate(){
let sorted=[...blocks].filter(b=>b.checked).sort((a,b)=>b.priority-a.priority);
let html="<style>body{font-family:Meiryo;background:#fff;padding:16px;color:#333;max-width:760px;margin:0 auto;line-height:1.6;}</style>";
sorted.forEach(b=>html+=b.code);
document.getElementById("output").innerText=html;
}

renderList();

</script>

</body>
</html>
