<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Scheduler FINAL</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#05070c;
  color:#eaf2ff;
  padding:12px;
}

/* ===== INPUT ===== */
.panel{
  position:sticky;
  top:0;
  background:#05070c;
  padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr auto;
  gap:6px;
  margin-bottom:6px;
}

input,button{
  padding:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#eaf2ff;
  font-size:12px;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.room{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

.title{
  font-weight:600;
  color:#9fd0ff;
  margin-bottom:6px;
}

/* ===== ITEM ===== */
.item{
  margin-top:6px;
  padding:6px;
  border-radius:8px;
}

.ok{ background:transparent; }

.warn{
  background:rgba(255,165,0,0.15);
  border:1px solid rgba(255,165,0,0.35);
}

.bad{
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.35);
}

/* ===== footer score ===== */
.score{
  font-size:10px;
  opacity:0.6;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="panel">

<div class="row">
  <input id="name" placeholder="名前">
  <input id="room" placeholder="午前部屋（任意）">
  <input id="start" type="time">
  <input id="end" type="time">
  <button onclick="add()">追加</button>
</div>

<button onclick="calc()">計算</button>

</div>

<div class="grid" id="grid"></div>

<script>

const ROOMS=["201","202","203","301","302","303","401","402","501"];

let list=[];

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function fmt(m){
  return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

/* =========================
入力
========================= */
function add(){
  list.push({
    name:name.value,
    room:room.value || null,
    start:toMin(start.value),
    end:toMin(end.value)
  });
}

/* =========================
メインロジック
========================= */
function calc(){

  let rooms={};

  ROOMS.forEach(r=>{
    rooms[r]={
      freeAt:480,
      list:[]
    };
  });

  list.sort((a,b)=>a.start-b.start);

  const CLEAN=30;

  for(let p of list){

    let placed=false;

    /* ===== 午前固定 ===== */
    if(p.room){

      let r=rooms[p.room];

      r.list.push({
        ...p,
        realStart:Math.max(p.start,r.freeAt)
      });

      r.freeAt=p.end+CLEAN;
      placed=true;
    }

    /* ===== 午後（負荷分散） ===== */
    if(!placed){

      let bestRoom=null;
      let bestScore=Infinity;

      for(let r of ROOMS){

        let room=rooms[r];

        // 入れる条件
        if(p.start >= room.freeAt - CLEAN){

          let score=room.freeAt;

          if(score < bestScore){
            bestScore=score;
            bestRoom=r;
          }
        }
      }

      if(bestRoom){

        let room=rooms[bestRoom];

        room.list.push({
          ...p,
          realStart:Math.max(p.start,room.freeAt)
        });

        room.freeAt=p.end+CLEAN;

      }else{
        console.log("未配置:",p);
      }
    }
  }

  render(rooms);
}

/* =========================
表示
========================= */
function render(rooms){

  grid.innerHTML="";

  for(let r of ROOMS){

    let room=rooms[r];

    let html="";

    room.list.sort((a,b)=>a.realStart-b.realStart);

    for(let i=0;i<room.list.length;i++){

      let a=room.list[i];

      let cls="ok";

      for(let j=0;j<room.list.length;j++){
        if(i!==j){
          let b=room.list[j];
          if(a.realStart < b.end && a.end > b.realStart){
            cls="warn";
          }
        }
      }

      html+=`
        <div class="item ${cls}">
          ${a.name}<br>
          ${fmt(a.realStart)} - ${fmt(a.end)}
        </div>
      `;
    }

    html+=`
      <div class="score">
        freeAt: ${fmt(room.freeAt)}
      </div>
    `;

    grid.innerHTML+=`
      <div class="room">
        <div class="title">${r}</div>
        ${html}
      </div>
    `;
  }
}

</script>

</body>
</html>
