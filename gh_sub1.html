<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Meiryo",sans-serif;
color:#fff;
overflow-x:hidden;

/* 空間背景 */
background:
radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08), transparent 60%),
radial-gradient(circle at 80% 80%, rgba(120,160,255,0.06), transparent 55%),
#05070c;
}

/* ===== 全体 ===== */
.container{
padding:120px 20px 140px;
max-width:900px;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
gap:24px;
perspective:1000px;
}

/* ===== タイトル ===== */
h1{
font-size:12px;
letter-spacing:4px;
opacity:0.45;
}

/* ===== 浮遊ラベル ===== */
#floatingLabel{
position:fixed;
top:18%;
left:50%;
transform:translateX(-50%);
padding:10px 16px;
border-radius:999px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter: blur(24px);
font-size:12px;
opacity:0;
transition:0.3s;
pointer-events:none;
}

/* ===== グラフ ===== */
canvas{
max-width:260px;
}

/* 線Canvas */
#lineCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* ===== ボタン ===== */
.buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

button{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
color:#fff;
padding:8px 14px;
border-radius:999px;
font-size:12px;
cursor:pointer;
transition:0.25s;
backdrop-filter: blur(20px);
}

button:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.12);
}

button.active{
background:rgba(255,255,255,0.9);
color:#000;
}

/* ===== リスト（空間カード） ===== */
.list{
width:100%;
display:flex;
flex-direction:column;
gap:10px;
}

.row-item{
display:flex;
justify-content:space-between;
align-items:center;

padding:14px 14px;
border-radius:14px;

background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);

transition:0.25s;
transform:translateZ(0);
}

.row-item:hover{
transform:translateX(6px) translateZ(20px);
background:rgba(255,255,255,0.06);
}

.row-item.active{
border-left:2px solid rgba(255,255,255,0.7);
padding-left:12px;
background:rgba(255,255,255,0.06);
}

.row-title{
font-size:12px;
}

.row-cat{
font-size:11px;
opacity:0.5;
}

/* ===== 空間光 ===== */
body::after{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 50% 50%, rgba(120,160,255,0.08), transparent 60%);
animation:float 8s ease-in-out infinite;
pointer-events:none;
}

@keyframes float{
0%,100%{ transform:scale(1); }
50%{ transform:scale(1.05); }
}
</style>
</head>

<body>

<div id="floatingLabel"></div>

<div class="container">

<h1>VISION ANALYTICS</h1>

<canvas id="donut"></canvas>

<canvas id="lineCanvas"></canvas>

<div class="buttons" id="buttons"></div>

<div class="list" id="list"></div>

</div>

<script>

/* =========================
   データ
========================= */
const articles = [
{title:"給与体系の設計", category:"お給料"},
{title:"スタッフ教育方針", category:"スタッフ"},
{title:"店内環境改善", category:"お店の環境"},
{title:"特別待遇の説明", category:"うれしい待遇"},
{title:"お客様層分析", category:"お客様層"},
{title:"採用フロー", category:"採用条件"},
{title:"業務マニュアル", category:"お仕事内容"},
{title:"今日のつぶやき", category:"お店のつぶやき"},
{title:"インセンティブ制度", category:"お給料"},
{title:"スタッフ連携方法", category:"スタッフ"}
];

const categories = [
"お給料",
"スタッフ",
"お店の環境",
"うれしい待遇",
"お客様層",
"採用条件",
"お仕事内容",
"お店のつぶやき"
];

let currentCategory = "全体";
let chart;

/* =========================
   Canvas（線）
========================= */
const lineCanvas = document.getElementById("lineCanvas");
const ctx = lineCanvas.getContext("2d");

function resize(){
lineCanvas.width = window.innerWidth;
lineCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* =========================
   ドーナツ
========================= */
function renderChart(){

const data = categories.map(c =>
articles.filter(a => a.category === c).length
);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("donut"), {
type:"doughnut",
data:{
labels:categories,
datasets:[{
data:data,
backgroundColor:"rgba(255,255,255,0.15)"
}]
},
options:{
plugins:{ legend:{ labels:{ color:"#fff" } } }
}
});
}

/* =========================
   ボタン
========================= */
function renderButtons(){

const el = document.getElementById("buttons");

el.innerHTML = `
<button onclick="filterAll()" class="${currentCategory==='全体'?'active':''}">
全体
</button>
`;

categories.forEach(c=>{
el.innerHTML += `
<button onclick="filter('${c}')"
class="${currentCategory===c?'active':''}">
${c}
</button>`;
});
}

/* =========================
   リスト
========================= */
function renderList(){

const el = document.getElementById("list");

let filtered =
currentCategory==="全体"
? articles
: articles.filter(a => a.category === currentCategory);

el.innerHTML = filtered.map(a => `
<div class="row-item ${currentCategory!=='全体'?'active':''}">
  <div class="row-title">${a.title}</div>
  <div class="row-cat">${a.category}</div>
</div>
`).join("");
}

/* =========================
   浮遊ラベル
========================= */
function floating(){
const el = document.getElementById("floatingLabel");

if(currentCategory==="全体"){
el.style.opacity=0;
return;
}

el.style.opacity=1;
el.innerText=currentCategory;
}

/* =========================
   線描画（空間接続）
========================= */
function drawLine(){

ctx.clearRect(0,0,lineCanvas.width,lineCanvas.height);

if(currentCategory==="全体") return;

const donut = document.getElementById("donut");
const r = donut.getBoundingClientRect();

const sx = r.left + r.width/2;
const sy = r.top + r.height/2;

const items = document.querySelectorAll(".row-item");

items.forEach(i=>{
const rect = i.getBoundingClientRect();

const ex = rect.left;
const ey = rect.top + rect.height/2;

ctx.beginPath();
ctx.moveTo(sx,sy);
ctx.quadraticCurveTo(sx+120,sy,ex,ey);

ctx.strokeStyle="rgba(255,255,255,0.18)";
ctx.lineWidth=1;
ctx.stroke();
});
}

/* =========================
   フィルター
========================= */
function filter(cat){
currentCategory=cat;
update();
}

function filterAll(){
currentCategory="全体";
update();
}

/* =========================
   更新
========================= */
function update(){
renderButtons();
renderChart();
renderList();
floating();
setTimeout(drawLine,50);
}

window.addEventListener("resize",drawLine);

update();

</script>

</body>
</html>
