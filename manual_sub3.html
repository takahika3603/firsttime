<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Ops Control Panel</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#05070c;
  color:#eaf2ff;
  padding:12px;
}

/* ===== 上部固定UI ===== */
.panel{
  position:sticky;
  top:0;
  background:#05070c;
  padding-bottom:10px;
  z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* ===== フォーム2分割 ===== */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr auto;
  gap:6px;
  margin-bottom:6px;
}

input,button{
  padding:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#eaf2ff;
  font-size:12px;
}

button{
  cursor:pointer;
}

/* ===== セクションラベル ===== */
.label{
  font-size:11px;
  opacity:0.6;
  margin:6px 0 4px;
}

/* ===== レイアウト ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.room{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

.title{
  font-weight:600;
  color:#9fd0ff;
  margin-bottom:6px;
}

/* ===== 状態表示 ===== */
.item{
  margin-top:6px;
  padding:6px;
  border-radius:8px;
  line-height:1.3;
}

.ok{ background:transparent; }

.warn{
  background:rgba(255,165,0,0.15);
  border:1px solid rgba(255,165,0,0.35);
}

.bad{
  background:rgba(255,80,80,0.15);
  border:1px solid rgba(255,80,80,0.35);
}

/* ===== 稼働率バー ===== */
.bar{
  height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6aa9ff,#8be7ff);
}
</style>
</head>

<body>

<div class="panel">

<div class="label">固定（午前）※部屋必須</div>
<div class="row">
  <input id="m_name" placeholder="名前">
  <input id="m_room" placeholder="部屋">
  <input id="m_start" type="time">
  <input id="m_end" type="time">
  <button onclick="addFixed()">追加</button>
</div>

<div class="label">流動（午後）※自動配置</div>
<div class="row">
  <input id="a_name" placeholder="名前">
  <input id="a_start" type="time">
  <input id="a_end" type="time">
  <button onclick="addFlow()">追加</button>
</div>

<button onclick="calc()">計算</button>

</div>

<div class="grid" id="grid"></div>

<script>

const ROOMS=["201","202","203","301","302","303","401","402","501"];

let fixed=[];
let flow=[];

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

/* =========================
入力
========================= */
function addFixed(){
  if(!m_name.value||!m_room.value||!m_start.value||!m_end.value) return;

  fixed.push({
    name:m_name.value,
    room:m_room.value,
    start:toMin(m_start.value),
    end:toMin(m_end.value)
  });
}

function addFlow(){
  if(!a_name.value||!a_start.value||!a_end.value) return;

  flow.push({
    name:a_name.value,
    start:toMin(a_start.value),
    end:toMin(a_end.value)
  });
}

/* =========================
衝突判定
========================= */
function overlap(a,b){
  return a.start < b.end && a.end > b.start;
}

/* =========================
メイン
========================= */
function calc(){

  let rooms={};
  let usage={};

  ROOMS.forEach(r=>{
    rooms[r]=[];
    usage[r]=0;
  });

  const CLEAN=30;

  /* ===== 固定（午前） ===== */
  for(let p of fixed){

    rooms[p.room].push(p);
    usage[p.room]+=p.end-p.start;
  }

  /* ===== 流動（午後） ===== */
  for(let p of flow){

    let placed=false;

    for(let r of ROOMS){

      let list=rooms[r];

      let ok=true;

      for(let x of list){
        if(overlap(x,p)){
          ok=false;
          break;
        }
      }

      if(ok){
        rooms[r].push(p);
        usage[r]+=p.end-p.start;
        placed=true;
        break;
      }
    }

    if(!placed){
      console.log("未配置:",p);
    }
  }

  render(rooms,usage);
}

/* =========================
表示
========================= */
function render(rooms,usage){

  grid.innerHTML="";

  for(let r of ROOMS){

    let arr=rooms[r].sort((a,b)=>a.start-b.start);

    let html="";

    for(let i=0;i<arr.length;i++){

      let a=arr[i];

      let cls="ok";

      for(let j=0;j<arr.length;j++){
        if(i!==j && overlap(a,arr[j])){
          cls="warn";
        }
      }

      html+=`
        <div class="item ${cls}">
          ${a.name}<br>
          ${fmt(a.start)} - ${fmt(a.end)}
        </div>
      `;
    }

    let rate=Math.min(100,(usage[r]/960)*100);

    html+=`
      <div class="bar"><div class="fill" style="width:${rate}%"></div></div>
    `;

    grid.innerHTML+=`
      <div class="room">
        <div class="title">${r}</div>
        ${html}
      </div>
    `;
  }
}

function fmt(m){
  return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

</script>

</body>
</html>
