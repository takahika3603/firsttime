<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Generator</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Meiryo", sans-serif;
background:#0b0f1a;
color:#fff;
padding:20px;
}

h1{
text-align:center;
font-size:18px;
margin-bottom:20px;
}

/* ===== カードUI ===== */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
padding:14px;
margin-bottom:12px;
backdrop-filter: blur(10px);
}

/* ===== input系 ===== */
select, textarea, button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:none;
font-size:14px;
}

textarea{
height:80px;
resize:none;
}

/* ===== チェックボックス ===== */
.checks label{
display:block;
margin:6px 0;
font-size:13px;
color:#cbd5e1;
}

/* ===== ボタン ===== */
button{
background:#22c55e;
color:#fff;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.98);
}

/* ===== 出力 ===== */
.output{
white-space:pre-wrap;
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:12px;
margin-top:12px;
min-height:120px;
}

/* コピー */
.copy{
background:#6366f1;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Blog Generator</h1>

<div class="card">
<label>フォーマット</label>
<select id="format">
<option value="normal">通常ブログ</option>
<option value="event">イベント</option>
<option value="new">新人紹介</option>
<option value="sales">高収入アピール</option>
</select>
</div>

<div class="card">
<label>訴求ポイント</label>
<div class="checks">
<label><input type="checkbox" value="salary"> お給料</label>
<label><input type="checkbox" value="job"> 仕事内容</label>
<label><input type="checkbox" value="easy"> 未経験OK</label>
<label><input type="checkbox" value="env"> 働きやすさ</label>
</div>
</div>

<div class="card">
<label>どういう系</label>
<select id="type">
<option value="important">大事アピール系</option>
<option value="anxiety">不安解決系</option>
<option value="push">背中押し系</option>
</select>
</div>

<div class="card">
<label>トーン</label>
<select id="tone">
<option value="friendly">フレンドリー</option>
<option value="cute">かわいい</option>
<option value="luxury">高級感</option>
<option value="sexy">セクシー</option>
</select>
</div>

<div class="card">
<label>自由入力</label>
<textarea id="input" placeholder="今日の内容やイベントなど"></textarea>
</div>

<button onclick="generate()">生成する</button>

<div class="card">
<div id="output" class="output">ここに生成結果が表示されます</div>
<button class="copy" onclick="copyText()">コピー</button>
</div>

<script>

function getChecks(){
const checks = document.querySelectorAll("input[type=checkbox]");
let arr = [];
checks.forEach(c=>{
if(c.checked) arr.push(c.value);
});
return arr;
}

function buildAppeal(type, point){

const labelMap = {
salary:"お給料",
job:"仕事内容",
easy:"未経験",
env:"働きやすさ"
};

let p = labelMap[point] || point;

if(type === "important"){
return `○○に関して気になることは多いですよね。特に${p}はとても大事なポイントです。`;
}

if(type === "anxiety"){
return `○○に関して不安になる方も多いですが、特に${p}は心配されやすいポイントです。しかし当店ではしっかりサポートしています。`;
}

return `${p}についてご紹介します。`;
}

function generate(){

const format = document.getElementById("format").value;
const type = document.getElementById("type").value;
const tone = document.getElementById("tone").value;
const input = document.getElementById("input").value;
const appeals = getChecks();

let text = "";

// ===== フォーマット =====
if(format === "normal"){
text += "【通常ブログ】\n\n";
}
if(format === "event"){
text += "【イベント案内】\n\n";
}
if(format === "new"){
text += "【新人紹介】\n\n";
}
if(format === "sales"){
text += "【高収入アピール】\n\n";
}

// ===== 導入 =====
text += "いつもご覧いただきありがとうございます✨\n\n";

// ===== 訴求 =====
appeals.forEach(a=>{
text += buildAppeal(type,a) + "\n\n";
});

// ===== 本文 =====
text += "【本日の内容】\n";
text += input + "\n\n";

// ===== トーン =====
text += `【トーン：${tone}】\n`;
text += "ご来店お待ちしております✨\n";

document.getElementById("output").innerText = text;
}

function copyText(){
const text = document.getElementById("output").innerText;
navigator.clipboard.writeText(text);
alert("コピーしました");
}

</script>

</body>
</html>
