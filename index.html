<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>進捗管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:"Meiryo";
background:#0f172a;
color:#fff;
padding:20px;
}

.wrapper{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
gap:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:16px;
text-align:center;
}

.percent{
font-size:26px;
font-weight:bold;
margin:10px 0;
}

.info{
font-size:13px;
margin:10px 0;
color:#cbd5e1;
}

.msg{
height:20px;
color:#facc15;
margin:10px 0;
}

button{
width:100%;
padding:10px;
margin:4px 0;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.good{ background:#22c55e; color:#fff; }
.bad{ background:#ef4444; color:#fff; }
.history{ background:#6366f1; color:#fff; }
.reset{ background:#64748b; color:#fff; }

canvas{
margin:10px 0;
}
.top-btn{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  padding: 14px;
  border-radius: 12px;
  background: #facc15;
  color: #0f172a;
  font-weight: bold;
  border: none;
  z-index: 999;
}
</style>
</head>

<body>

<h2 style="text-align:center;">進捗管理</h2>

<div class="wrapper" id="games"></div>

<script>

const GAME_COUNT = 5;

const names = ["スケジュール", "口コミ獲得（日本人）", "口コミ獲得（外国人）", "飛込数", "プレイヤー5"];

// ===== データ =====
let data = {};

for(let i=1;i<=GAME_COUNT;i++){

data[i] = {
response: Number(localStorage.getItem(`response${i}`) || 0),
acquired: Number(localStorage.getItem(`acquired${i}`) || 0),
miss: Number(localStorage.getItem(`miss${i}`) || 0),
history: JSON.parse(localStorage.getItem(`history${i}`) || "[]")
};

}

// ===== HTML生成（全て統一） =====
for(let i=1;i<=GAME_COUNT;i++){

document.getElementById("games").innerHTML += `
<div class="box">

<h3>${names[i - 1]}</h3>

<div class="percent" id="percent${i}">0%</div>

<canvas id="chart${i}" height="180"></canvas>

<div class="info" id="info${i}"></div>

<div class="msg" id="msg${i}"></div>

<button class="good" onclick="addAcquired(${i})">獲得数＋1</button>
<button class="bad" onclick="addMiss(${i})">ミス数＋1</button>
<button class="history" onclick="showHistory(${i})">履歴</button>
<button class="reset" onclick="resetOnly(${i})">リセット</button>

</div>
`;
}

// ===== Chart =====
let charts = {};

function initChart(i){

let ctx = document.getElementById(`chart${i}`);

charts[i] = new Chart(ctx, {
type: 'doughnut',
data: {
labels: ['獲得', 'ミス'],
datasets: [{
data: [data[i].acquired, data[i].miss]
}]
},
options: {
responsive: true,
plugins: {
legend: { labels: { color: "#fff" } }
}
}
});

}

// ===== 保存 =====
function save(i){
localStorage.setItem(`response${i}`, data[i].response);
localStorage.setItem(`acquired${i}`, data[i].acquired);
localStorage.setItem(`miss${i}`, data[i].miss);
localStorage.setItem(`history${i}`, JSON.stringify(data[i].history));
}

// ===== 履歴 =====
function addHistory(i, type, reason=""){
data[i].history.unshift({
time: new Date().toLocaleString(),
type,
reason
});
data[i].history = data[i].history.slice(0, 200);
save(i);
}

// ===== 更新 =====
function update(i){

let d = data[i];

let total = d.response;
let percent = total === 0 ? 0 : Math.floor((d.acquired / total) * 100);

document.getElementById(`percent${i}`).innerText =
`獲得率 ${percent}%`;

document.getElementById(`info${i}`).innerText =
`応対:${d.response} / 獲得:${d.acquired} / ミス:${d.miss}`;

charts[i].data.datasets[0].data = [d.acquired, d.miss];
charts[i].update();

save(i);
}

// ===== 獲得 =====
function addAcquired(i){

data[i].response++;
data[i].acquired++;

document.getElementById(`msg${i}`).innerText = "獲得 +1";

addHistory(i, "獲得");

update(i);
}

// ===== ミス（理由入力） =====
function addMiss(i){

let reason = prompt("ミスの理由を入力してください");

data[i].response++;
data[i].miss++;

document.getElementById(`msg${i}`).innerText = "ミス +1";

addHistory(i, "ミス", reason || "未入力");

update(i);
}

// ===== 履歴表示 =====
function showHistory(i){

let list = data[i].history.map(h =>
`${h.time}｜${h.type}｜${h.reason}`
).join("\n");

alert(list || "履歴なし");
}

// ===== リセット（数値のみ） =====
function resetOnly(i){

if(confirm("件数をリセットする？（履歴は残る）")){

data[i].response = 0;
data[i].acquired = 0;
data[i].miss = 0;

addHistory(i, "リセット");

update(i);
}
}

// ===== 初期化 =====
for(let i=1;i<=GAME_COUNT;i++){
initChart(i);
update(i);
}

</script>
<button class="top-btn" onclick="location.href='top.html'">
  TOPへ
</button>
</body>
</html>
