<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
  overflow-x:hidden;
}

.glow{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(106,162,255,0.25), transparent 60%);
  filter:blur(60px);
  top:-100px;
  right:-100px;
}

.container{ padding:20px; }

.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
}

.topBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:12px;
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.1);
}

.filterGroup{
  display:flex;
  gap:8px;
  padding:12px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
}

.selectWrap{ flex:1; }

.selectWrap select,
.selectWrap input{
  width:100%;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  color:white;
  border:1px solid rgba(255,255,255,0.12);
}

.kpiBox{
  padding:10px;
  border-radius:22px;
  background:rgba(120,170,255,0.08);
}

.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.kpiItem{
  padding:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
}

.kpiItem .label{
  font-size:11px;
  opacity:0.6;
}

.kpiItem .value{
  font-size:16px;
  font-weight:700;
  color:#cfe3ff;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="topBar">
  <a class="btn" href="kanri.html">← 名簿へ戻る</a>
</div>

<!-- フィルター -->
<div class="filterGroup">
  <div class="selectWrap">
    <select id="monthFilter" onchange="applyFilter()">
      <option value="">全期間</option>
      <option value="01">1月</option>
      <option value="02">2月</option>
      <option value="03">3月</option>
      <option value="04">4月</option>
      <option value="05">5月</option>
      <option value="06">6月</option>
      <option value="07">7月</option>
      <option value="08">8月</option>
      <option value="09">9月</option>
      <option value="10">10月</option>
      <option value="11">11月</option>
      <option value="12">12月</option>
    </select>
  </div>

  <div class="selectWrap">
    <input type="date" id="dayFilter" onchange="applyFilter()">
  </div>
</div>

<!-- KPI -->
<div class="card kpiBox">
  <div class="kpiGrid">
    <div class="kpiItem">
      <div class="label">目標</div>
      <div class="value">¥20,000,000</div>
    </div>

    <div class="kpiItem">
      <div class="label">売上</div>
      <div class="value" id="sales">0円</div>
    </div>

    <div class="kpiItem">
      <div class="label">進捗</div>
      <div class="value" id="progress">0%</div>
    </div>

    <div class="kpiItem">
      <div class="label">必要日割</div>
      <div class="value" id="daily">0円</div>
    </div>
  </div>
</div>

<div class="card">
来客数：<span id="count"></span>名（海外：<span id="overseasCount"></span>名）
</div>

<div class="card">
<h3>新規 vs 再来</h3>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<h3>日本 vs 海外</h3>
<canvas id="chart2"></canvas>
</div>

<div class="card">
<h3>キャスト売上</h3>
<canvas id="chart3"></canvas>
</div>

<div class="card">
<h3>リピート率</h3>
<canvas id="chart4"></canvas>
</div>

</div>

<script>
const records = JSON.parse(localStorage.getItem("records") || "[]");
let chart1, chart2, chart3, chart4;

function applyFilter(){

  const monthValue = document.getElementById("monthFilter").value;
  const dayValue = document.getElementById("dayFilter").value;

  let filtered = records;

  if(monthValue){
    filtered = filtered.filter(r =>
      r.date && r.date.slice(5,7) === monthValue
    );
  }

  if(dayValue){
    filtered = filtered.filter(r => r.date === dayValue);
  }

  updateDashboard(filtered);
}

function updateDashboard(data){

const totalSales = data.reduce((s,r)=>s+(+r.price||0),0);

document.getElementById("sales").innerText = "¥" + totalSales.toLocaleString();

const target = 20000000;
document.getElementById("progress").innerText =
((totalSales/target)*100).toFixed(1)+"%";

const now = new Date();
const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
const daysLeft = Math.max(1, lastDay - now.getDate());

document.getElementById("daily").innerText =
Math.ceil((target-totalSales)/daysLeft).toLocaleString()+"円";

const jpCount = data.filter(r=>r.country==="日本").length;
const overseasCount = data.filter(r=>r.country && r.country!=="日本").length;

document.getElementById("count").innerText = jpCount + overseasCount;
document.getElementById("overseasCount").innerText = overseasCount;

/* chart1 */
const newC = data.filter(r=>r.type==="新規").length;
const reC = data.filter(r=>r.type==="再来").length;

if(chart1) chart1.destroy();

chart1 = new Chart(document.getElementById("chart1"),{
type:"doughnut",
data:{labels:["新規","再来"],datasets:[{data:[newC,reC]}]},
options:{cutout:"80%"}
});

/* chart2 */
let jp=0, overseas=0;

data.forEach(r=>{
if(r.country==="日本") jp+=+r.price||0;
else overseas+=+r.price||0;
});

if(chart2) chart2.destroy();

chart2 = new Chart(document.getElementById("chart2"),{
type:"doughnut",
data:{labels:["日本","海外"],datasets:[{data:[jp,overseas]}]},
options:{cutout:"80%"}
});

/* chart3 */
const castMap={};
data.forEach(r=>{
castMap[r.cast]=(castMap[r.cast]||0)+(+r.price||0);
});

if(chart3) chart3.destroy();

chart3 = new Chart(document.getElementById("chart3"),{
type:"doughnut",
data:{labels:Object.keys(castMap),datasets:[{data:Object.values(castMap)}]}
});

/* chart4 */
const stats={};

data.forEach(r=>{
if(!stats[r.cast]) stats[r.cast]={t:0,r:0};
stats[r.cast].t++;
if(r.type==="再来") stats[r.cast].r++;
});

const sorted = Object.keys(stats).map(n=>{
return {name:n,rate:stats[n].r/stats[n].t};
}).sort((a,b)=>b.rate-a.rate);

if(chart4) chart4.destroy();

chart4 = new Chart(document.getElementById("chart4"),{
type:"bar",
data:{
labels:sorted.map(s=>s.name),
datasets:[{data:sorted.map(s=>s.rate*100)}]
},
options:{indexAxis:"y"}
});
}

window.addEventListener("DOMContentLoaded",()=>{
updateDashboard(records);
applyFilter();
});
</script>

</body>
</html>
