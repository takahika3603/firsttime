<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- フォント -->
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#fff7fb;
  font-family: 'Kiwi Maru', serif;
  color:#555;
  padding:16px;
}

/* 入力 */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#ffeef6;
  margin-bottom:10px;
}

/* カード */
.card{
  background:#ffffff;
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(255,182,193,0.2);
}

/* 2カラム */
.row{
  display:flex;
  gap:12px;
}
.col{ flex:1; }

.center{ text-align:center; }

/* KPI文字 */
.big{
  font-size:20px;
  font-weight:500;
  color:#ff7aa2;
}

.small{
  font-size:12px;
  color:#999;
}

/* 区切り線 */
hr{
  border:none;
  border-top:1px solid #f1d5e0;
  margin:10px 0;
}

/* 年間バー */
.bar{
  height:14px;
  background:#ffe4ee;
  border-radius:999px;
  overflow:hidden;
}

.bar-inner{
  height:100%;
  background:linear-gradient(90deg,#ffb6d9,#a0e7ff);
}

/* 指名 */
.circleWrap{
  display:flex;
  justify-content:space-around;
}

.circleItem{
  text-align:center;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#ffe4ee;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  margin-bottom:6px;
}

/* 候補 */
#suggestBox div{
  background:#fff;
  padding:8px;
  border-radius:10px;
  margin-bottom:5px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* リスト */
#dailyList div{
  padding:8px;
  border-bottom:1px solid #f5dbe6;
}
/* スマホでも2カラム維持 */
@media (max-width: 600px){

  .row{
    flex-direction: row;
    gap:8px;
  }

  .col{
    flex:1;
    min-width:0;
  }

  .card{
    padding:10px;
    border-radius:16px;
  }

  .big{
    font-size:16px;
  }

  .small{
    font-size:10px;
  }

  canvas{
    width:100% !important;
    height:120px !important;
  }

  #progress{
    font-size:14px;
  }

  /* 行間を詰める */
  .card div{
    line-height:1.2;
  }
}
#monthFilter, #dayFilter{
  font-size:14px;
}
</style>
</head>

<body>
<!-- 📅 フィルター（ここを追加） -->
<div class="row">
  <div class="col">
    <input type="month" id="monthFilter">
  </div>
  <div class="col">
    <select id="dayFilter">
  <option value="">日▼</option>
</select>
  </div>
</div>
<!-- 🔍 検索 -->
<input id="castSearch" placeholder="キャスト名を入力">
<div id="suggestBox"></div>

<!-- KPI -->
<div class="row">

  <!-- 左 -->
  <div class="col card">
    <div>組数 <span id="kumi" class="big">0</span></div>
    <div>リピート率 <span id="repeat" class="big">0</span>%</div>

    <hr>

    <div>売上 <span id="sales" class="big">0</span>円</div>
    <div class="small">前月比 <span id="compare">0</span>%</div>
  </div>

  <!-- 右 -->
  <div class="col card center">
    <canvas id="donut"></canvas>
    <div id="progress" class="big">0%</div>
    <div class="small">進捗率</div>
  </div>

</div>

<!-- 年間 -->
<!-- 年間 -->
<div class="card">
  <div class="small">年間目標</div>

  <!-- ★追加：目標入力 -->
  <input id="goalInput" placeholder="目標を入力">

  <div class="bar">
    <div id="yearBar" class="bar-inner" style="width:0%"></div>
  </div>
  <div id="yearText" class="small">0 / 0</div>
</div>

<!-- 指名 -->
<div class="card">
  <div class="circleWrap">

    <div class="circleItem">
      <div class="circle">F</div>
      <div id="fSales">0</div>
    </div>

    <div class="circleItem">
      <div class="circle">P</div>
      <div id="pSales">0</div>
    </div>

    <div class="circleItem">
      <div class="circle">N</div>
      <div id="nSales">0</div>
    </div>

    <div class="circleItem">
      <div class="circle">R</div>
      <div id="rSales">0</div>
    </div>

  </div>
</div>
<!-- 📈 今月売上推移 -->
<div class="card">
  <div class="small">今月売上推移</div>
  <canvas id="lineChart"></canvas>
</div>
<!-- 日別 -->
<div class="card">
  <div class="small">日別売上</div>
  <div id="dailyList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIza...",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga"
});

const db = getFirestore(app);

const castList = ["あめり","かえで","かりん","はるか","すい","せれん"];

let all = [];
let chartInstance = null;
let lineChartInstance = null;
let currentCast = "";
function updateDayOptions(){

  const monthVal = document.getElementById("monthFilter").value;
  const select = document.getElementById("dayFilter");

  // リセット
  select.innerHTML = '<option value="">日▼</option>';

  if(!monthVal) return;

  const [year, month] = monthVal.split("-");
  const lastDay = new Date(year, month, 0).getDate();

  // 全日
  const allOpt = document.createElement("option");
  allOpt.value = "";
  allOpt.textContent = "全日";
  select.appendChild(allOpt);

  // 日付
  for(let i=1;i<=lastDay;i++){
    const day = String(i).padStart(2,"0");
    const dateStr = `${monthVal}-${day}`;

    const opt = document.createElement("option");
    opt.value = dateStr;
    opt.textContent = `${i}日`;

    select.appendChild(opt);
  }
}
async function load(){
  const snap = await getDocs(collection(db,"records"));
  snap.forEach(doc=> all.push(doc.data()));
  // 初期表示（最初のキャストを表示）
if(castList.length > 0){
  document.getElementById("castSearch").value = castList[0];
  selectCast(castList[0]);
}
}

document.getElementById("castSearch").addEventListener("input", function(){

  const val = this.value;

  const result = castList
    .filter(n=>n.startsWith(val))
    .concat(castList.filter(n=>!n.startsWith(val)&&n.includes(val)));

  const box = document.getElementById("suggestBox");
  box.innerHTML="";

  result.forEach(name=>{
    const div = document.createElement("div");
    div.innerText = name;
    div.onclick = ()=> selectCast(name);
    box.appendChild(div);
  });
});
function selectCast(name){

  currentCast = name;

  // ★目標を読み込み（キャストごと）
  const savedGoal = localStorage.getItem("goal_" + name);
  if(savedGoal){
    document.getElementById("goalInput").value = savedGoal;
  }else{
    document.getElementById("goalInput").value = "";
  }

  const monthVal = document.getElementById("monthFilter").value;
  const dayVal = document.getElementById("dayFilter").value;

  const data = all.filter(r=>{
    if(r.cast !== name) return false;
    if(!r.date) return false;

    // 月フィルター
    if(monthVal && !r.date.startsWith(monthVal)) return false;

    // 日フィルター
    if(dayVal && r.date !== dayVal) return false;

    return true;
  });

  const total = data.reduce((s,r)=>s+(r.price||0),0);

  document.getElementById("kumi").innerText = data.length;
  document.getElementById("sales").innerText = total.toLocaleString();

  const repeat = data.filter(r=>r.type==="再来").length;
  const rate = data.length ? (repeat/data.length*100).toFixed(1):0;
  document.getElementById("repeat").innerText = rate;

  document.getElementById("fSales").innerText = sumBy(data,"フリー");
  document.getElementById("pSales").innerText = sumBy(data,"P");
  document.getElementById("nSales").innerText = sumBy(data,"NET");
  document.getElementById("rSales").innerText = sumBy(data,"リピ");

  drawChart(total);
  drawLineChart(data);
  drawDaily(data);
}

function sumBy(data,type){
  return data.filter(r=>r.shimei===type)
    .reduce((s,r)=>s+(r.price||0),0);
}

function drawChart(total){

  const goal = Number(document.getElementById("goalInput").value) || 0;

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(document.getElementById("donut"),{
    type:"doughnut",
    data:{
      datasets:[{
        data: goal ? [total, goal-total] : [total],
        backgroundColor:["#ffb6d9","#ffe4ee"]
      }]
    },
    options:{
      cutout:"75%",
      plugins:{
        legend:{ display:false }
      }
    }
  });

  // 進捗
  const percent = goal ? (total/goal*100).toFixed(1) : 0;
  document.getElementById("progress").innerText = percent + "%";

  // バー
  document.getElementById("yearBar").style.width = percent + "%";
  document.getElementById("yearText").innerText =
    `${total.toLocaleString()} / ${goal.toLocaleString()}`;
}

function drawDaily(data){

const box = document.getElementById("dailyList");
box.innerHTML="";

// 日ごとに合計
const dailyMap = {};

data.forEach(r=>{
  if(!r.date) return;

  if(!dailyMap[r.date]){
    dailyMap[r.date] = 0;
  }

  dailyMap[r.date] += (r.price || 0);
});

// 配列に変換してソート
const dailyArray = Object.entries(dailyMap)
  .sort((a,b)=> new Date(b[0]) - new Date(a[0]));

// 表示
dailyArray.forEach(([date,total])=>{
  const div = document.createElement("div");
  div.innerText = `${date}　${total.toLocaleString()}円`;
  box.appendChild(div);
});
}
function drawLineChart(data){

  const monthVal = document.getElementById("monthFilter").value;
  if(!monthVal) return;

  const [year, month] = monthVal.split("-");
  const lastDay = new Date(year, month, 0).getDate();

  // 日ごとの売上
  const dailyMap = {};
  data.forEach(r=>{
    if(!r.date) return;
    if(!dailyMap[r.date]) dailyMap[r.date] = 0;
    dailyMap[r.date] += (r.price || 0);
  });

  const labels = [];
  const values = [];

  for(let i=1;i<=lastDay;i++){
    const day = String(i).padStart(2,"0");
    const dateStr = `${monthVal}-${day}`;

    labels.push(i + "日");
    values.push(dailyMap[dateStr] || 0);
  }

  // 上限：最大値 + 10万
  const max = Math.max(...values);
  const maxY = max + 100000;

  if(lineChartInstance){
    lineChartInstance.destroy();
  }

  lineChartInstance = new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{
      labels: labels,
      datasets:[{
        data: values,
        tension:0.3,
        fill:true,
        backgroundColor:"rgba(255,182,217,0.2)",
        borderColor:"#ff7aa2"
      }]
    },
    options:{
      plugins:{
        legend:{ display:false }
      },
      scales:{
        y:{
          beginAtZero:true,
          suggestedMax: maxY
        }
      }
    }
  });
}
load();
updateDayOptions();
document.getElementById("monthFilter").addEventListener("change", ()=>{

  updateDayOptions(); // ←追加

  const name = document.getElementById("castSearch").value;
  if(name) selectCast(name);
});

document.getElementById("dayFilter").addEventListener("change", ()=>{
  const name = document.getElementById("castSearch").value;
  if(name) selectCast(name);
});
document.getElementById("goalInput").addEventListener("input", function(){

  if(!currentCast) return;

  localStorage.setItem("goal_" + currentCast, this.value);

  // 再描画（グラフ更新）
  selectCast(currentCast);
});
</script>

</body>
</html>
