<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
color:#e6eeff;

background:
radial-gradient(circle at 20% 10%, rgba(120,160,255,0.15), transparent 40%),
radial-gradient(circle at 80% 90%, rgba(255,120,200,0.15), transparent 40%),
#0b0f1a;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* グリッド（2×2） */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

/* カード */
.card{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.06);
border-radius:18px;
padding:16px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* タイトル */
.label{
font-size:12px;
color:#9fb0ff;
margin-bottom:6px;
}

/* 数字 */
.value{
font-size:20px;
font-weight:600;
}

/* グラフカード */
.chart-card{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.05);
border-radius:20px;
padding:16px;
margin-bottom:16px;
border:1px solid rgba(255,255,255,0.08);
}

/* 見出し */
.chart-title{
font-size:14px;
margin-bottom:10px;
color:#cbd6ff;
}

/* 仮キャンバス */
.canvas-box{
width:100%;
height:220px;
display:flex;
align-items:center;
justify-content:center;
color:#6f7fbf;
font-size:13px;
border-radius:12px;
background:rgba(255,255,255,0.03);
}

/* ボタン */
.button{
width:100%;
padding:12px;
border-radius:14px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
margin-bottom:16px;
backdrop-filter: blur(20px);
transition:0.2s;
}

.button:hover{
background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>
<div class="container">

<h1>ダッシュボード</h1>

<button class="button">← 名簿に戻る</button>

<!-- 2×2 KPI -->
<div class="grid">

<div class="card">
<div class="label">目標金額</div>
<div class="value" id="goal">¥20,000,000</div>
</div>

<div class="card">
<div class="label">今月売上</div>
<div class="value" id="total">¥0</div>
</div>

<div class="card">
<div class="label">進捗率</div>
<div class="value" id="rate">0%</div>
</div>

<div class="card">
<div class="label">必要日割り売上</div>
<div class="value" id="daily">¥0</div>
</div>

</div>

<!-- 国別ドーナツ -->
<div class="chart-card">
<div class="chart-title">日本 vs 外国人 売上比率</div>
<div class="canvas-box">
（ここにドーナツグラフ）
</div>
</div>

<!-- キャストドーナツ -->
<div class="chart-card">
<div class="chart-title">キャスト別 売上構成</div>
<div class="canvas-box">
（ここにドーナツグラフ）
</div>
</div>

</div>
</body>
</html>
