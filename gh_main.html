<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Heaven</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo",sans-serif;
background:radial-gradient(circle at top,#111827,#000000);
color:#fff;
overflow:hidden;
}

/* 背景の光 */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(165,180,252,0.15),transparent 40%),
radial-gradient(circle at 80% 30%,rgba(249,168,212,0.12),transparent 40%),
radial-gradient(circle at 50% 80%,rgba(96,165,250,0.08),transparent 50%);
filter:blur(40px);
z-index:0;
}

/* 全体 */
.container{
position:relative;
z-index:1;
max-width:900px;
margin:0 auto;
padding:40px 16px;
display:flex;
flex-direction:column;
gap:16px;
}

/* タイトル */
.title{
font-size:22px;
font-weight:600;
letter-spacing:1px;
opacity:0.9;
}

/* Vision Pro風カード */
.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:18px;
padding:18px;
box-shadow:
0 10px 40px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.08);

transition:0.3s;
}

/* ホバーで浮く */
.card:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.08);
}

/* カードタイトル */
.card h2{
margin:0;
font-size:15px;
font-weight:600;
opacity:0.9;
}

/* 説明 */
.card p{
margin:8px 0 0;
font-size:12px;
opacity:0.6;
line-height:1.6;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="title">Girls Heaven Dashboard</div>

<div class="card" onclick="go('gh_sub1.html')">
<h2>分析</h2>
<p>記事傾向・カテゴリ構造を可視化</p>
</div>

<div class="card">
<h2>ブログ生成</h2>
<p>構造化された記事を自動生成</p>
</div>

<div class="card">
<h2>軽量化（バニラ）</h2>
<p>シンプルHTML出力・高速表示最適化</p>
</div>

<div class="card">
<h2>軽量化（ココア）</h2>
<p>装飾付きリッチHTML出力</p>
</div>

</div>

</body>
</html>
