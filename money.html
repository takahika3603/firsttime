<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
  overflow-x:hidden;
}

/* 背景ぼかしレイヤー */
.glow{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(106,162,255,0.25), transparent 60%);
  filter:blur(60px);
  top:-100px;
  right:-100px;
}

/* レイアウト */
.container{
  padding:20px;
}

/* ガラスカード */
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-2px);
}

/* ヘッダー */
.topBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  text-decoration:none;
  color:white;
  font-size:12px;
  border:1px solid rgba(255,255,255,0.1);
}

/* KPI */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.big{
  font-size:22px;
  font-weight:700;
}

/* タイトル */
h3{
  margin:0 0 10px;
  font-size:14px;
  opacity:0.8;
}

/* canvas */
canvas{
  width:100% !important;
  aspect-ratio: 1 / 1;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="topBar">
  <a class="btn" href="index.html">← 名簿へ戻る</a>
</div>
   <div class="card">
  <input type="month" id="monthFilter">
  <input type="date" id="dayFilter">
  <button onclick="applyFilter()">絞り込み</button>
</div>
  <div class="card">
  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button onclick="showAll()">全期間</button>
    <button onclick="showToday()">今日</button>
    <button onclick="showThisMonth()">今月</button>
  </div>
</div>

<!-- KPI -->
<div class="grid">

<div class="card">
目標
<div class="big">¥20,000,000</div>
</div>

<div class="card">
売上
<div class="big" id="sales">0円</div>
</div>

<div class="card">
進捗
<div class="big" id="progress">0%</div>
</div>

<div class="card">
必要日割
<div class="big" id="daily">0円</div>
</div>

</div>

<!-- 来客数 -->
<div class="card">
来客数：<span id="count"></span>名（海外：<span id="overseasCount"></span>名）
</div>
<!-- 海外分析ボタン -->
<div class="card" onclick="location.href='kaigai.html'" style="cursor:pointer;">
  <div style="font-size:14px; font-weight:600;">
    海外分析
  </div>
  <div style="font-size:11px; opacity:0.7; margin-top:4px;">
    国別・売上・指名を分析する
  </div>
</div>
<!-- 新規 / 再来 -->
<div class="card">
<h3>新規 vs 再来</h3>
<canvas id="chart1"></canvas>
</div>

<!-- 日本 / 海外 -->
<div class="card">
<h3>日本 vs 海外 売上</h3>
<canvas id="chart2"></canvas>
</div>

<!-- キャスト売上 -->
<div class="card">
<h3>キャスト売上</h3>
<canvas id="chart3"></canvas>
</div>

<!-- ★追加：リピート率ランキング -->
<div class="card">
<h3>リピート率ランキング</h3>
<canvas id="chart4"></canvas>
</div>

</div>

<script>

const records = JSON.parse(localStorage.getItem("records") || "[]");
  let chart1, chart2, chart3, chart4;
function applyFilter(){

  const monthValue = document.getElementById("monthFilter").value;
  const dayValue = document.getElementById("dayFilter").value;

  let filtered = records;

  // 月で絞る
  if(monthValue){
    const m = monthValue.slice(5,7);
    filtered = filtered.filter(r =>
      r.date && r.date.slice(5,7) === m
    );
  }

  // 日で絞る
  if(dayValue){
    filtered = filtered.filter(r =>
      r.date === dayValue
    );
  }

  updateDashboard(filtered);
}
function showAll(){
  updateDashboard(records);
}

function showToday(){
  const today = new Date().toISOString().slice(0,10);

  const filtered = records.filter(r =>
    r.date === today
  );

  updateDashboard(filtered);
}

function showThisMonth(){
  const now = new Date();
  const month = String(now.getMonth()+1).padStart(2,"0");

  const filtered = records.filter(r =>
    r.date && r.date.slice(5,7) === month
  );

  updateDashboard(filtered);
}
function updateDashboard(data){

/* ======================
売上
====================== */
const totalSales = data.reduce((s,r)=>s+(+r.price||0),0);

document.getElementById("sales").innerText =
"¥" + totalSales.toLocaleString();

/* 進捗 */
const target = 20000000;
document.getElementById("progress").innerText =
((totalSales/target)*100).toFixed(1)+"%";

/* 日割 */
const now = new Date();
const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
const daysLeft = lastDay - now.getDate();
document.getElementById("daily").innerText =
Math.ceil((target-totalSales)/daysLeft).toLocaleString()+"円";

/* 来客 */
const jpCount = data.filter(r => r.country === "日本").length;
const overseasCount = data.filter(r => r.country && r.country !== "日本").length;

document.getElementById("count").innerText = jpCount + overseasCount;
document.getElementById("overseasCount").innerText = overseasCount;

/* ======================
新規 / 再来
====================== */
const newC = data.filter(r=>r.type==="新規").length;
const reC = data.filter(r=>r.type==="再来").length;

if(chart1) chart1.destroy();

chart1 = new Chart(document.getElementById("chart1"),{
type:"doughnut",
data:{
  labels:["新規","再来"],
  datasets:[{ data:[newC,reC] }]
}
});

/* ======================
日本 / 海外
====================== */
let jp=0, overseas=0;

data.forEach(r=>{
if(r.country==="日本") jp+=+r.price||0;
else overseas+=+r.price||0;
});

if(chart2) chart2.destroy();

chart2 = new Chart(document.getElementById("chart2"),{
type:"doughnut",
data:{
  labels:["日本","海外"],
  datasets:[{ data:[jp,overseas] }]
}
});

/* ======================
キャスト売上
====================== */
const castMap = {};
data.forEach(r=>{
castMap[r.cast]=(castMap[r.cast]||0)+(+r.price||0);
});

if(chart3) chart3.destroy();

chart3 = new Chart(document.getElementById("chart3"),{
type:"doughnut",
data:{
  labels:Object.keys(castMap),
  datasets:[{ data:Object.values(castMap) }]
}
});

/* ======================
リピート率
====================== */
const castStats = {};

data.forEach(r=>{
if(!castStats[r.cast]){
castStats[r.cast]={total:0,re:0};
}
castStats[r.cast].total++;
if(r.type==="再来") castStats[r.cast].re++;
});

const sorted = Object.keys(castStats).map(name=>{
const d = castStats[name];
return { name, rate: d.total ? d.re/d.total : 0 };
}).sort((a,b)=>b.rate-a.rate);

if(chart4) chart4.destroy();

chart4 = new Chart(document.getElementById("chart4"),{
type:"bar",
data:{
labels:sorted.map(s=>s.name),
datasets:[{
data:sorted.map(s=>s.rate*100)
}]
}
});

}
updateDashboard(records);
</script>

</body>
</html>
