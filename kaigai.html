<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ★ index.html（来客名簿）と完全同じFirebase設定を入れる */
const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
🔥 来客名簿（index.html）から取得
========================= */
async function loadFromIndex(){

  // ★ここが「来客名簿の保存先」
  const snap = await getDocs(collection(db, "来客名簿"));

  // Firestore → 配列に変換
  records = snap.docs.map(doc => doc.data());

  filtered = records;

  updateDashboard(filtered);
}

window.addEventListener("load", loadFromIndex);
</script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
}

.container{ padding:16px; }

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;

}

h1{ font-size:18px; margin:0 0 10px; }
h3{ font-size:13px; margin:0 0 10px; opacity:0.8; }

/* ===== フィルター ===== */
.filterCard{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.filterGroup{
  display:flex;

}

.selectWrap{
  flex:1;
}

.selectWrap select{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:white;
  border:1px solid rgba(255,255,255,0.12);
  outline:none;
  appearance:none;
}

/* KPI */
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpiBox{
  padding:12px;
  border-radius:14px;
  background:rgba(120,170,255,0.08);
  border:1px solid rgba(120,170,255,0.2);
}

.kpiLabel{ font-size:11px; opacity:0.6; }
.kpiValue{ font-size:20px; font-weight:700; margin-top:6px; }

/* バー */
.bar{
  height:16px;
  width:100%;
  border-radius:999px;
  overflow:hidden;
  display:flex;
  background:rgba(255,255,255,0.08);
}

.barNew{background:#6aa2ff;width:50%;}
.barRe{background:#ff78b4;width:50%;}

.barLabel{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  margin-top:6px;
  opacity:0.8;
}

canvas{
  width:100% !important;
  height:220px !important;
}
.smallCanvas{
  height:180px !important;
}
</style>
</head>

<body>

        <option value="28">28日</option>

</div>

<!-- KPI -->
<div class="card">
  <div class="kpiGrid">

<!-- 新規 vs 再来 -->

  <h3>海外リピート率</h3>
  <canvas></canvas>
</div>

</div>

<script>
let records = [];
let filtered = [];
let repeatChart;
let castVisitChart;

/* =====================
フィルター処理（枠）
===================== */
function applyFilter(){

  const month = document.getElementById("monthFilter").value;
  const day = document.getElementById("dayFilter").value;

  filtered = [...records];

  if(month){
    filtered = filtered.filter(r =>
      r.date && r.date.slice(5,7) === month
    );
  }

  if(day){
    filtered = filtered.filter(r =>
      r.date && new Date(r.date).getDate().toString().padStart(2,'0') === day
    );
  }

  updateDashboard(filtered);
}

/* =====================
ダッシュボード更新（枠）
===================== */
function updateDashboard(data){

  // KPI
  const totalSales = 0;
  const totalPeople = 0;

  // 新規 vs 再来
  const newC = 0;
  const reC = 0;

  // バー比率（仮）
  document.querySelector(".barNew").style.width = "50%";
  document.querySelector(".barRe").style.width = "50%";
    // =====================
  // キャスト接客回数
  // =====================
  const castCount = {};

data.forEach(r=>{
  const name = r.cast || "未設定";
  castCount[name] = (castCount[name] || 0) + 1;
});

const sortedCast = Object.entries(castCount)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,10);

const labels = sortedCast.map(x=>x[0]);
const values = sortedCast.map(x=>x[1]);

// =====================
// ★ここが重要（更新 or 初回作成）
// =====================
if (castVisitChart) {

  // すでにある → データだけ更新
  castVisitChart.data.labels = labels;
  castVisitChart.data.datasets[0].data = values;
  castVisitChart.update();

} else {

  // 初回だけグラフ作る
  castVisitChart = new Chart(
    document.getElementById("castVisitChart"),
    {
      type:"bar",
      data:{
        labels:labels,
        datasets:[{
          data:values
        }]
      },
      options:{
        indexAxis:"y",
        plugins:{
          legend:{ display:false }
        },
        scales:{
          x:{ beginAtZero:true },
          y:{ ticks:{ font:{ size:10 }}}
    　    }
      　}
    　}
  　);
　}
}
/* 初期ロード */
window.addEventListener("load", ()=>{
  filtered = records;
  updateDashboard(filtered);
});
</script>

</body>
