<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外分析ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ★ index.html（来客名簿）と完全同じFirebase設定を入れる */
const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
🔥 来客名簿（index.html）から取得
========================= */
async function loadFromIndex(){

  const snap = await getDocs(collection(db, "records"));

  records = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  filtered = [...records];

  console.log("読み込み成功:", records); // ←確認用

  updateDashboard(filtered);
}

window.addEventListener("load", loadFromIndex);
</script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
}

.container{ padding:16px; }

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  backdrop-filter: blur(25px);
}

h1{ font-size:18px; margin:0 0 10px; }
h3{ font-size:13px; margin:0 0 10px; opacity:0.8; }

/* ===== フィルター ===== */
.filterCard{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.filterGroup{
  display:flex;
  gap:10px;
}

.selectWrap{
  flex:1;
}

.selectWrap select{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:white;
  border:1px solid rgba(255,255,255,0.12);
  outline:none;
  appearance:none;
}

/* KPI */
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpiBox{
  padding:12px;
  border-radius:14px;
  background:rgba(120,170,255,0.08);
  border:1px solid rgba(120,170,255,0.2);
}

.kpiLabel{ font-size:11px; opacity:0.6; }
.kpiValue{ font-size:20px; font-weight:700; margin-top:6px; }

/* バー */
.bar{
  height:16px;
  width:100%;
  border-radius:999px;
  overflow:hidden;
  display:flex;
  background:rgba(255,255,255,0.08);
}

.barNew{background:#6aa2ff;width:50%;}
.barRe{background:#ff78b4;width:50%;}

.barLabel{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  margin-top:6px;
  opacity:0.8;
}

canvas{
  width:100% !important;
  height:220px !important;
}
.smallCanvas{
  height:180px !important;
}
</style>
</head>

<body>

<div class="container">

<!-- タイトル -->
<h1 style="margin:0 0 12px; padding:16px; font-size:18px;">
  海外分析ダッシュボード
</h1>

<!-- フィルター -->
<div class="filterCard">

  <div class="filterGroup">

    <div class="selectWrap">
      <select id="monthFilter" onchange="applyFilter()">
        <option value="">全期間</option>
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05">5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>

    <div class="selectWrap">
      <select id="dayFilter" onchange="applyFilter()">
        <option value="">全日</option>
        <option value="01">1日</option>
        <option value="02">2日</option>
        <option value="03">3日</option>
        <option value="04">4日</option>
        <option value="05">5日</option>
        <option value="06">6日</option>
        <option value="07">7日</option>
        <option value="08">8日</option>
        <option value="09">9日</option>
        <option value="10">10日</option>
        <option value="11">11日</option>
        <option value="12">12日</option>
        <option value="13">13日</option>
        <option value="14">14日</option>
        <option value="15">15日</option>
        <option value="16">16日</option>
        <option value="17">17日</option>
        <option value="18">18日</option>
        <option value="19">19日</option>
        <option value="20">20日</option>
        <option value="21">21日</option>
        <option value="22">22日</option>
        <option value="23">23日</option>
        <option value="24">24日</option>
        <option value="25">25日</option>
        <option value="26">26日</option>
        <option value="27">27日</option>
        <option value="28">28日</option>
        <option value="29">29日</option>
        <option value="30">30日</option>
        <option value="31">31日</option>
      </select>
    </div>

  </div>
</div>

<!-- KPI -->
<div class="card">
  <div class="kpiGrid">

    <div class="kpiBox">
      <div class="kpiLabel">海外売上</div>
      <div class="kpiValue" id="overseasSales">¥0</div>
    </div>

    <div class="kpiBox">
      <div class="kpiLabel">海外人数</div>
      <div class="kpiValue" id="overseasPeople">0名</div>
    </div>

  </div>
</div>

<!-- 新規 vs 再来 -->
<div class="card">
  <h3>新規 vs 再来</h3>

  <div class="bar">
    <div class="barNew"></div>
    <div class="barRe"></div>
  </div>

  <div class="barLabel">
    <span>新規</span>
    <span>再来</span>
  </div>
</div>

<!-- 導線 -->
<div class="card">
  <h3>導線</h3>
 <canvas id="routeChart" class="smallCanvas"></canvas>
</div>

<!-- 指名方法 -->
<div class="card">
  <h3>指名方法</h3>

  <div class="bar">
    <div style="width:25%;background:#6aa2ff"></div>
    <div style="width:25%;background:#7ad3ff"></div>
    <div style="width:25%;background:#ffd36a"></div>
    <div style="width:25%;background:#ff78b4"></div>
  </div>

  <div class="barLabel">
    <span>フリー</span>
    <span>NET</span>
    <span>P</span>
    <span>リピ</span>
  </div>
</div>

<!-- 国籍 -->
<div class="card">
  <h3>国籍</h3>
 <canvas id="nationalityChart" class="smallCanvas"></canvas>
</div>
<!-- キャスト接客回数 -->
<div class="card">
  <h3>キャスト接客回数</h3>
  <canvas id="castVisitChart"></canvas>
</div>
<!-- リピート率 -->
<div class="card">
  <h3>海外リピート率</h3>
  <canvas id="repeatChart"></canvas>
</div>

</div>

<script>
let records = [];
let filtered = [];
let repeatChart;
let castVisitChart;

/* =====================
フィルター処理（枠）
===================== */
function applyFilter(){

  const month = document.getElementById("monthFilter").value;
  const day = document.getElementById("dayFilter").value;

  filtered = [...records];

  filtered = filtered.filter(r => {
    if(!r.date) return false;

    // ★Firestore対応
    const date = r.date.seconds
      ? new Date(r.date.seconds * 1000)
      : new Date(r.date);

    const m = (date.getMonth()+1).toString().padStart(2,'0');
    const d = date.getDate().toString().padStart(2,'0');

    if(month && m !== month) return false;
    if(day && d !== day) return false;

    return true;
  });

  updateDashboard(filtered);
}

/* =====================
ダッシュボード更新（枠）
===================== */
function updateDashboard(data){

// ★海外データ（これを必ず先に作る）
const overseas = data.filter(r => r.country && r.country !== "日本");
  // ★海外人数（来客数）
const overseasPeople = data
  .filter(r => r.country && r.country !== "日本")
  .length;

document.getElementById("overseasPeople").innerText =
  overseasPeople + "名";

  // ★海外売上
const overseasSales = data
  .filter(r => r.country && r.country !== "日本")
  .reduce((sum, r) => sum + (Number(r.price) || 0), 0);

document.getElementById("overseasSales").innerText =
  "¥" + overseasSales.toLocaleString();

  // ★導線集計
const routeCount = {};

overseas.forEach(r => {
  const route = r.route || "未設定";
  routeCount[route] = (routeCount[route] || 0) + 1;
});

  // =====================
  // 新規 vs 再来（ここ修正）
  // =====================
  const newC = overseas.filter(r => r.type === "新規").length;
  const reC = overseas.filter(r => r.type === "再来").length;

  const total = newC + reC || 1; // 0割防止

  const newRate = (newC / total) * 100;
  const reRate = (reC / total) * 100;

  document.querySelector(".barNew").style.width = newRate + "%";
  document.querySelector(".barRe").style.width = reRate + "%";

    // =====================
  // キャスト接客回数
  // =====================
  const castCount = {};

overseas.forEach(r => {
  const name = r.cast || "未設定";
  castCount[name] = (castCount[name] || 0) + 1;
});

const sortedCast = Object.entries(castCount)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,10);

const labels = sortedCast.map(x=>x[0]);
const values = sortedCast.map(x=>x[1]);

// =====================
// ★ここが重要（更新 or 初回作成）
// =====================
if (castVisitChart) {

  // すでにある → データだけ更新
  castVisitChart.data.labels = labels;
  castVisitChart.data.datasets[0].data = values;
  castVisitChart.update();

} else {

  // 初回だけグラフ作る
  castVisitChart = new Chart(
    document.getElementById("castVisitChart"),
    {
      type:"bar",
      data:{
        labels:labels,
        datasets:[{
          data:values
        }]
      },
      options:{
        indexAxis:"y",
        plugins:{
          legend:{ display:false }
        },
        scales:{
          x:{ beginAtZero:true },
          y:{ ticks:{ font:{ size:10 }}}
    　    }
      　}
    　}
  　);
　}
  // =====================
// 導線グラフ
// =====================
const routeLabels = Object.keys(routeCount);
const routeValues = Object.values(routeCount);

if (window.routeChartObj) {
  routeChartObj.data.labels = routeLabels;
  routeChartObj.data.datasets[0].data = routeValues;
  routeChartObj.update();
} else {
  window.routeChartObj = new Chart(
    document.getElementById("routeChart"),
    {
      type: "doughnut",
      data: {
        labels: routeLabels,
        datasets: [{
          data: routeValues
        }]
      },
      options: {
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "white", font: { size: 10 } }
          }
        }
      }
    }
  );
}
// =====================
// 国籍グラフ
// =====================
const nationCount = {};

overseas.forEach(r=>{
  const c = r.country || "不明";
  nationCount[c] = (nationCount[c] || 0) + 1;
});

const nationLabels = Object.keys(nationCount);
const nationValues = Object.values(nationCount);

if (window.nationChartObj) {
  nationChartObj.data.labels = nationLabels;
  nationChartObj.data.datasets[0].data = nationValues;
  nationChartObj.update();
} else {
  window.nationChartObj = new Chart(
    document.getElementById("nationalityChart"),
    {
      type: "doughnut",
      data: {
        labels: nationLabels,
        datasets: [{
          data: nationValues
        }]
      },
      options: {
        plugins: {
          legend: {
            position: "bottom",
            labels: { color: "white", font: { size: 10 } }
          }
        }
      }
    }
  );
}
}
</script>

</body>
</html>
