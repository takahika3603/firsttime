<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
  overflow-x:hidden;
}

/* 背景ぼかしレイヤー */
.glow{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(106,162,255,0.25), transparent 60%);
  filter:blur(60px);
  top:-100px;
  right:-100px;
}

/* レイアウト */
.container{
  padding:20px;
}

/* ガラスカード */
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-2px);
}

/* ヘッダー */
.topBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  text-decoration:none;
  color:white;
  font-size:12px;
  border:1px solid rgba(255,255,255,0.1);
}

/* KPI */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.big{
  font-size:22px;
  font-weight:700;
}

/* タイトル */
h3{
  margin:0 0 10px;
  font-size:14px;
  opacity:0.8;
}

/* canvas */
canvas{
  width:100% !important;
  height:100% !important;
}
  #chart4Wrap{
  width:100%;
}
  /* ===== フィルターUI ===== */
.filterCard{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  backdrop-filter: blur(30px);
}

.filterTitle{
  font-size:12px;
  opacity:0.6;
  margin-bottom:10px;
}

.filterGroup{
  display:flex;
  gap:12px;
}

.selectWrap{
  position:relative;
  flex:1;
}

.selectWrap select,
.selectWrap input{
  width:100%;
  padding:14px 40px 14px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:white;
  font-size:13px;
  outline:none;
  backdrop-filter: blur(20px);
  transition:0.25s;
}

.selectWrap::after{
  content:"⌄";
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  opacity:0.6;
  pointer-events:none;
}

.selectWrap select:hover,
.selectWrap input:hover{
  background:rgba(255,255,255,0.1);
  transform:translateY(-1px);
}

.selectWrap select:focus,
.selectWrap input:focus{
  border-color:#6aa2ff;
  background:rgba(255,255,255,0.12);
  box-shadow:
    0 0 0 2px rgba(106,162,255,0.2),
    0 8px 20px rgba(0,0,0,0.4);
}

/* ネイティブ矢印消す */
.selectWrap select{
  appearance:none;
  -webkit-appearance:none;
}

/* 日付アイコン調整 */
input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0.4;
  filter:invert(1);
}
  /* KPIだけ小さくする */
.kpiSmall{
  font-size:14px;
  font-weight:700;
}
.kpiBox{
  padding:10px;
  border-radius:22px;
  background: rgba(120,170,255,0.08);
  border: 1px solid rgba(120,170,255,0.18);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.45),
    0 0 40px rgba(106,162,255,0.08);
  backdrop-filter: blur(35px);
}

.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.kpiItem{
  padding:10px 8px;
  border-radius:14px;
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
}

.kpiItem .label{
  font-size:11px;
  opacity:0.6;
}

.kpiItem .value{
  font-size:16px;
  font-weight:700;
  margin-top:4px;
  color:#cfe3ff;
  text-shadow:0 0 10px rgba(106,162,255,0.25);
}
  .barWrap{
  margin-top:10px;
}

.bar{
  display:flex;
  height:18px;
  width:100%;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
}

/* 新規 */
.barNew{
  background:linear-gradient(90deg,#6aa2ff,#8ec5ff);
  width:0%;
  transition:width 0.5s ease;
}

/* 再来 */
.barRe{
  background:linear-gradient(90deg,#ff78b4,#ff9bc8);
  width:0%;
  transition:width 0.5s ease;
}

.barLabel{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:6px;
  opacity:0.8;
}
  .labelSmall{
  font-size:11px;
  opacity:0.6;
}

.valueBig{
  font-size:18px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="topBar">
  <a class="btn" href="index.html">← 名簿へ戻る</a>
</div>
  <div class="filterCard">

  <div class="filterTitle">期間フィルター</div>

  <div class="filterGroup">

    <div class="selectWrap">
      <select id="monthFilter" onchange="applyFilter()">
        <option value="">全期間</option>
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05">5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>

    <div class="selectWrap">
  <select id="dayFilter" onchange="applyFilter()">
    <option value="">全日</option>
    <option value="01">1日</option>
    <option value="02">2日</option>
    <option value="03">3日</option>
    <option value="04">4日</option>
    <option value="05">5日</option>
    <option value="06">6日</option>
    <option value="07">7日</option>
    <option value="08">8日</option>
    <option value="09">9日</option>
    <option value="10">10日</option>
    <option value="11">11日</option>
    <option value="12">12日</option>
    <option value="13">13日</option>
    <option value="14">14日</option>
    <option value="15">15日</option>
    <option value="16">16日</option>
    <option value="17">17日</option>
    <option value="18">18日</option>
    <option value="19">19日</option>
    <option value="20">20日</option>
    <option value="21">21日</option>
    <option value="22">22日</option>
    <option value="23">23日</option>
    <option value="24">24日</option>
    <option value="25">25日</option>
    <option value="26">26日</option>
    <option value="27">27日</option>
    <option value="28">28日</option>
    <option value="29">29日</option>
    <option value="30">30日</option>
    <option value="31">31日</option>
  </select>
</div>
    </div>

  </div>

</div>



<!-- KPI統合カード -->
<div class="card kpiBox">

  <div class="kpiGrid">

    <div class="kpiItem">
      <div class="label">目標</div>
      <div class="value">¥20,000,000</div>
    </div>

    <div class="kpiItem">
      <div class="label">売上</div>
      <div class="value" id="sales">0円</div>
    </div>

    <div class="kpiItem">
      <div class="label">進捗</div>
      <div class="value" id="progress">0%</div>
    </div>

    <div class="kpiItem">
      <div class="label">必要日割</div>
      <div class="value" id="daily">0円</div>
    </div>

  </div>

</div>

<div class="card visitorBox">

  <span class="labelSmall">来客数：</span>
  <span id="count" class="valueBig"></span>
  <span class="valueBig">名</span>

  <span class="labelSmall">（海外：</span>
  <span id="overseasCount" class="valueBig"></span>
  <span class="labelSmall">名）</span>

</div>
<!-- 海外分析ボタン -->
<div class="card" onclick="location.href='kaigai.html'" style="cursor:pointer;">
  <div style="font-size:14px; font-weight:600;">
    
海外分析
  </div>
  <div style="font-size:11px; opacity:0.7; margin-top:4px;">
    国別・売上・指名を分析する
  </div>
</div>
<div class="card">
  <h3>新規 vs 再来</h3>

  <div class="barWrap">

    <div class="bar">
      <div class="barNew" id="barNew"></div>
      <div class="barRe" id="barRe"></div>
    </div>

    <div class="barLabel">
      <span id="newText">新規 0%</span>
      <span id="reText">再来 0%</span>
    </div>

  </div>
</div>
<!-- 日本 / 海外 -->
<div class="card">
  <h3>日本 vs 海外 売上</h3>

  <div class="barWrap">

    <div class="bar">
      <div class="barNew" id="barJP"></div>
      <div class="barRe" id="barOverseas"></div>
    </div>

    <div class="barLabel">
      <span id="jpText">日本 0%</span>
      <span id="overseasText">海外 0%</span>
    </div>

  </div>
</div>

<!-- キャスト売上 -->
<div class="card">
<h3>キャスト売上</h3>
<canvas id="chart3"></canvas>
</div>

<!-- ★追加：リピート率ランキング -->
<div class="card">
  <h3>リピート率ランキング</h3>

  <div id="chart4Wrap">
    <canvas id="chart4"></canvas>
  </div>
</div>

</div>

<script>

Chart.register({
  id: 'centerText',
  beforeDraw(chart) {

    // chart1 と chart2 だけ対象
    if (chart.canvas.id !== "chart1" && chart.canvas.id !== "chart2") return;

    const { width, height, ctx } = chart;
    ctx.save();

    const data = chart.data.datasets[0].data;
    const total = data.reduce((a,b)=>a+b,0);

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.font = "500 12px -apple-system";

    // ======================
    // chart1（新規 vs 再来）
    // ======================
    if(chart.canvas.id === "chart1"){

      const newRate = ((data[0]/total)*100).toFixed(1);
      const reRate = ((data[1]/total)*100).toFixed(1);

      ctx.fillText(`新規 ${newRate}%`, width / 2, height / 2 - 8);
      ctx.fillText(`再来 ${reRate}%`, width / 2, height / 2 + 12);
    }

    // ======================
    // chart2（日本 vs 海外）
    // ======================
    if(chart.canvas.id === "chart2"){

      const jpRate = ((data[0]/total)*100).toFixed(1);
      const overseasRate = ((data[1]/total)*100).toFixed(1);

      ctx.fillText(`日本 ${jpRate}%`, width / 2, height / 2 - 8);
      ctx.fillText(`海外 ${overseasRate}%`, width / 2, height / 2 + 12);
    }

    ctx.restore();
  }
});


  let chart1, chart2, chart3, chart4;
function applyFilter(){

  const monthValue = document.getElementById("monthFilter").value;
  const dayValue = document.getElementById("dayFilter").value;
// ★追加：保存
  localStorage.setItem("dashboardFilter", JSON.stringify({
    month: monthValue,
    day: dayValue
  }));

  let records = records || [];

  // 月で絞る
  if(monthValue){
    const m = monthValue;
    filtered = filtered.filter(r =>
      r.date && r.date.slice(5,7) === m
    );
  }

if(dayValue){
  filtered = filtered.filter(r =>
    r.date && new Date(r.date).getDate().toString().padStart(2,'0') === dayValue
  );
}
  

  updateDashboard(filtered);
}

function updateDashboard(data){

  // 売上
  const totalSales = data.reduce((s,r)=>s+(+r.price||0),0);

  document.getElementById("sales").innerText =
  "¥" + totalSales.toLocaleString();

  const target = 20000000;
  document.getElementById("progress").innerText =
  ((totalSales/target)*100).toFixed(1)+"%";

  // 来客
  const jpCount = data.filter(r => r.country === "日本").length;
  const overseasCount = data.filter(r => r.country && r.country !== "日本").length;

  document.getElementById("count").innerText = jpCount + overseasCount;
  document.getElementById("overseasCount").innerText = overseasCount;

  // 新規 vs 再来
  const newC = data.filter(r => r.type === "新規").length;
  const reC = data.filter(r => r.type === "再来").length;

  const total = newC + reC;

  const newRate = total ? (newC / total * 100) : 0;
  const reRate = total ? (reC / total * 100) : 0;

  document.getElementById("barNew").style.width = newRate + "%";
  document.getElementById("barRe").style.width = reRate + "%";

document.getElementById("newText").innerHTML =
  `新規 ${newRate.toFixed(1)}%<br>${newC}名`;

document.getElementById("reText").innerHTML =
  `再来 ${reRate.toFixed(1)}%<br>${reC}名`;

  // 日本 vs 海外
 // 日本 vs 海外（売上ベース）

let jpSales = 0;
let overseasSales = 0;

data.forEach(r => {
  const price = +r.price || 0;

  if (r.country === "日本") {
    jpSales += price;
  } else {
    overseasSales += price;
  }
});

const totalSalesCountry = jpSales + overseasSales;

const jpRate = totalSalesCountry ? (jpSales / totalSalesCountry * 100) : 0;
const overseasRate = totalSalesCountry ? (overseasSales / totalSalesCountry * 100) : 0;

// バー反映
document.getElementById("barJP").style.width = jpRate + "%";
document.getElementById("barOverseas").style.width = overseasRate + "%";

// 文字反映
document.getElementById("jpText").innerHTML =
  `日本 ${jpRate.toFixed(1)}%<br>¥${jpSales.toLocaleString()}`;

document.getElementById("overseasText").innerHTML =
  `海外 ${overseasRate.toFixed(1)}%<br>¥${overseasSales.toLocaleString()}`;
  // キャスト売上（ここに移動）
  const castMap = {};
  data.forEach(r=>{
    castMap[r.cast] = (castMap[r.cast] || 0) + (+r.price || 0);
  });

  const sortedCast = Object.entries(castMap)
    .sort((a,b)=>b[1]-a[1]);

  const castLabels = sortedCast.map(x=>x[0]);
  const castValues = sortedCast.map(x=>x[1]);

  if(chart3) chart3.destroy();

chart3 = new Chart(document.getElementById("chart3"),{
  type:"doughnut",
  data:{
    labels:castLabels,
    datasets:[{
      data: castValues,
      cutout: "80%"  // ←ここを追加
    }]
  }
});
  /* ======================
リピート率
====================== */
const castStats = {};

data.forEach(r=>{
if(!castStats[r.cast]){
castStats[r.cast]={total:0,re:0};
}
castStats[r.cast].total++;
if(r.shimei === "リピ") castStats[r.cast].re++;
});

const sorted = Object.keys(castStats).map(name=>{
const d = castStats[name];
return { name, rate: d.total ? d.re/d.total : 0 };
}).sort((a,b)=>b.rate-a.rate);

if(chart4) chart4.destroy();
const count = Math.min(sorted.length, 20);
const rowHeight = 20; // 1人あたりの高さ
const height = Math.max(200, count * rowHeight);

document.getElementById("chart4Wrap").style.height = height + "px";
chart4 = new Chart(document.getElementById("chart4"),{
  type:"bar",
  data:{
    labels: sorted.slice(0,20).map(s=>s.name),
    datasets:[{
      data: sorted.slice(0,20).map(s=>s.rate*100)
    }]
  },
  options:{
  indexAxis: "y",
  responsive: true,
  maintainAspectRatio: false,
  scales:{
    x:{
      beginAtZero:true,
      max:100
    },
    y:{
      ticks:{
        font:{
          size: 8   // ←ここで半分くらいに
        }
      }
    }
  },
  plugins:{
    legend:{ display:false }
  }
}
});

}
updateDashboard(records);
window.addEventListener("load", () => {
  const saved = JSON.parse(localStorage.getItem("dashboardFilter"));

  if(saved){
    document.getElementById("monthFilter").value = saved.month || "";
    document.getElementById("dayFilter").value = saved.day || "";
  }

  applyFilter();
});
</script>
<script type="module">

// =====================
// ① Firebase読み込み
// =====================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// =====================
// ② Firebase接続情報（ここだけ自分のに変える）
const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};


// =====================
// ③ Firebase起動
// =====================
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// =====================
// ④ データ取得
// =====================
let records = [];

async function loadData(){
  const snap = await getDocs(collection(db, "records"));
  records = snap.docs.map(d => d.data());

  applyFilter(); // 既存の関数を呼ぶ
}

loadData();

</script>
