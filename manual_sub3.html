<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Operation Dashboard</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo",sans-serif;
  background: radial-gradient(circle at 20% 10%, #1b2a3a, #05070c 60%);
  color:#eaf2ff;
  padding:16px;
}

/* sections */
.section{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;
  padding:10px;
  margin-bottom:10px;
  backdrop-filter: blur(10px);
}

h3{
  margin:0 0 6px 0;
  font-size:13px;
  opacity:0.9;
}

/* inputs */
input,button{
  padding:8px;
  margin:3px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:#eaf2ff;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
}

/* card */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;
  padding:10px;
  font-size:11px;
}

.title{
  font-weight:600;
  color:#9fd0ff;
  margin-bottom:4px;
}

.small{
  opacity:0.7;
}
</style>
</head>

<body>

<!-- =====================
① 午前（固定）
===================== -->
<div class="section">
  <h3>午前シフト（固定）</h3>

  <input id="m_name" placeholder="名前">
  <input id="m_room" placeholder="部屋（201など）">
  <input id="m_start" type="time">
  <input id="m_end" type="time">
  <button onclick="addMorning()">追加</button>

  <div id="morningList"></div>
</div>

<!-- =====================
② 午後（可変）
===================== -->
<div class="section">
  <h3>午後シフト</h3>

  <input id="a_name" placeholder="名前">
  <input id="a_start" type="time">
  <input id="a_end" type="time">
  <button onclick="addAfternoon()">追加</button>

  <div id="afternoonList"></div>
</div>

<!-- =====================
③ 部屋ステータス
===================== -->
<div class="section">
  <h3>部屋稼働状況</h3>
  <div class="grid" id="roomGrid"></div>
</div>

<!-- =====================
④ 清掃予定
===================== -->
<div class="section">
  <h3>清掃・準備スケジュール</h3>
  <div id="cleanList"></div>
</div>

<script>

const ROOMS = ["201","202","203","301","302","303","401","402","501"];
const CLEAN = 30;

let morning = [];
let afternoon = [];

function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

/* =====================
午前追加（固定）
===================== */
function addMorning(){
  const name = m_name.value;
  const room = m_room.value;
  const start = m_start.value;
  const end = m_end.value;

  if(!name||!room||!start||!end) return;

  morning.push({name,room,start,end});
  renderMorning();
}

/* =====================
午後追加（動的）
===================== */
function addAfternoon(){
  const name = a_name.value;
  const start = a_start.value;
  const end = a_end.value;

  if(!name||!start||!end) return;

  afternoon.push({name,start,end});
  renderAfternoon();
}

/* =====================
メイン計算
===================== */
function calc(){

  let state = {};

  ROOMS.forEach(r=>{
    state[r] = {
      room:r,
      current:null,
      next:null,
      clean:null,
      freeAt:0
    };
  });

  /* 午前固定 */
  morning.forEach(m=>{
    state[m.room].current = {
      name:m.name,
      end:toMin(m.end)
    };
    state[m.room].freeAt = toMin(m.end) + CLEAN;
  });

  /* 午後割当 */
  let sorted = [...afternoon].sort((a,b)=>toMin(a.start)-toMin(b.start));

  sorted.forEach(a=>{

    let target = Object.values(state)
      .sort((x,y)=>x.freeAt-y.freeAt)[0];

    let start = Math.max(toMin(a.start), target.freeAt);

    target.current = {
      name:a.name,
      end:toMin(a.end)
    };

    target.next = {
      name:a.name,
      start:start
    };

    target.clean = {
      start:toMin(a.end),
      end:toMin(a.end)+CLEAN
    };

    target.freeAt = toMin(a.end) + CLEAN;
  });

  render(state);
}

/* =====================
描画
===================== */
function render(state){

  roomGrid.innerHTML = "";
  cleanList.innerHTML = "";

  Object.values(state).forEach(r=>{

    roomGrid.innerHTML += `
      <div class="card">
        <div class="title">${r.room}</div>
        <div>現在：${r.current?.name || "-"}</div>
        <div class="small">終了：${fmt(r.current?.end)}</div>
        <div>次候補：${r.next?.name || "-"}</div>
      </div>
    `;

    if(r.clean){
      cleanList.innerHTML += `
        <div class="card">
          ${r.room} 清掃 ${fmt(r.clean.start)} → ${fmt(r.clean.end)}
        </div>
      `;
    }

  });
}

function fmt(m){
  if(!m && m!==0) return "-";
  return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

/* =====================
一覧表示
===================== */
function renderMorning(){
  morningList.innerHTML =
    morning.map(m=>`・${m.room} ${m.name} ${m.start}-${m.end}`).join("<br>");
}

function renderAfternoon(){
  afternoonList.innerHTML =
    afternoon.map(a=>`・${a.name} ${a.start}-${a.end}`).join("<br>");
}

/* auto update */
setInterval(calc, 1000);

</script>

</body>
</html>
