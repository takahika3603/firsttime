<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外分析</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
}

.container{
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  text-decoration:none;
  font-size:12px;
  border:1px solid rgba(255,255,255,0.1);
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
}

.big{
  font-size:22px;
  font-weight:700;
}

h3{
  margin:0 0 10px;
  font-size:13px;
  opacity:0.8;
}

canvas{
  width:100%!important;
  aspect-ratio:1/1;
}
.barWrap{
  margin-top:10px;
}

.bar{
  display:flex;
  height:18px;
  width:100%;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
}

.barNew{
  background:linear-gradient(90deg,#6aa2ff,#8ec5ff);
  width:0%;
  transition:width 0.5s ease;
}

.barRe{
  background:linear-gradient(90deg,#ff78b4,#ff9bc8);
  width:0%;
  transition:width 0.5s ease;
}

.barLabel{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:6px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<!-- 戻る -->
<div class="top">
  <a class="btn" href="money.html">← 戻る</a>
</div>

<!-- KPI -->
<div class="grid2">
  <div class="card">
    海外総売上
    <div class="big" id="totalSales">0円</div>
  </div>

  <div class="card">
    海外客数
    <div class="big" id="totalCount">0名</div>
  </div>
</div>
<!-- 日本 vs 海外 -->
<div class="card">
<h3>日本 vs 海外（売上）</h3>
<canvas id="chart1"></canvas>
</div>
<div class="card">
  <h3>海外：新規 vs 再来</h3>

  <div class="barWrap">

    <div class="bar">
      <div class="barNew" id="overNewBar"></div>
      <div class="barRe" id="overReBar"></div>
    </div>

    <div class="barLabel">
      <span id="overNewText">新規 0%</span>
      <span id="overReText">再来 0%</span>
    </div>

  </div>
</div>

<div class="card">
  <h3>導線比率（海外）</h3>

  <div class="barWrap">
    <div class="bar">
      <div class="barNew" id="routeMainBar"></div>
      <div class="barRe" id="routeOtherBar"></div>
    </div>

    <div class="barLabel">
      <span id="routeMainText">主要導線 0%</span>
      <span id="routeOtherText">その他 0%</span>
    </div>
  </div>
</div>
  
<!-- 国別 -->
<div class="card">
<h3>海外 国別構成比（人数）</h3>
<canvas id="chart2"></canvas>
</div>

<!-- 新規 / 再来 + 導線 -->
<div class="grid2">

<div class="card">
<h3>新規 vs 再来（海外）</h3>
<canvas id="chart3"></canvas>
</div>

</div>

<!-- キャスト -->
<div class="card">
<h3>キャスト別海外売上構成</h3>
<canvas id="chart5"></canvas>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let records = [];

/* ======================
海外データ抽出
====================== */

/* ======================
KPI
====================== */
const totalSales = data.reduce((s,r)=>s+(+r.price||0),0);
document.getElementById("totalSales").innerText = "¥" + totalSales.toLocaleString();
document.getElementById("totalCount").innerText = data.length + "名";
/* ======================
新規 / 再来（海外専用・強化版）
====================== */
/* ======================
海外：新規 vs 再来（横バー）
====================== */

function updateOverseasNewRe(data){

  const overseas = data.filter(r =>
    r.country && r.country !== "日本"
  );

  const newCount = overseas.filter(r => r.type === "新規").length;
  const reCount = overseas.filter(r => r.type === "再来").length;

  const total = newCount + reCount;

  const newRate = total ? (newCount / total * 100) : 0;
  const reRate = total ? (reCount / total * 100) : 0;

  document.getElementById("overNewBar").style.width = newRate + "%";
  document.getElementById("overReBar").style.width = reRate + "%";

document.getElementById("overNewText").innerHTML =
  `新規 ${newRate.toFixed(1)}%<br>
   <span style="font-size:11px; opacity:0.7;">${newCount}名</span>`;

document.getElementById("overReText").innerHTML =
  `再来 ${reRate.toFixed(1)}%<br>
   <span style="font-size:11px; opacity:0.7;">${reCount}名</span>`;
}
  function updateRouteBar(data){

  const routeCount = {};

  data.forEach(r=>{
    const key = r.route || "その他";
    routeCount[key] = (routeCount[key] || 0) + 1;
  });

  const total = Object.values(routeCount).reduce((a,b)=>a+b,0);

  const main = routeCount["YOASOBI"] || 0;
  const other = total - main;

  const mainRate = total ? (main / total * 100) : 0;
  const otherRate = total ? (other / total * 100) : 0;

  document.getElementById("routeMainBar").style.width = mainRate + "%";
  document.getElementById("routeOtherBar").style.width = otherRate + "%";

  document.getElementById("routeMainText").innerHTML =
    `主要導線 ${mainRate.toFixed(1)}%<br><span style="font-size:11px">${main}件</span>`;

  document.getElementById("routeOtherText").innerHTML =
    `その他 ${otherRate.toFixed(1)}%<br><span style="font-size:11px">${other}件</span>`;
}
let newC = 0;
let reC = 0;

// 海外データだけで集計
data.forEach(r => {
  if (r.type === "新規") newC++;
  else if (r.type === "再来") reC++;
});

// canvas取得
const canvas = document.getElementById("chart3");

// 念のためチェック
if (canvas) {

  const ctx3 = canvas.getContext("2d");

  // グラデーション（新規）
  const gradNew = ctx3.createLinearGradient(0, 0, 200, 200);
  gradNew.addColorStop(0, "#6aa2ff");
  gradNew.addColorStop(1, "#4f7dff");

  // グラデーション（再来）
  const gradRe = ctx3.createLinearGradient(0, 0, 200, 200);
  gradRe.addColorStop(0, "#ff7ad9");
  gradRe.addColorStop(1, "#ff4fb8");

  // 既存があれば削除（エラー防止）
  if (window.chart3Instance) {
    window.chart3Instance.destroy();
  }

  // グラフ作成
  window.chart3Instance = new Chart(canvas, {
    type: "doughnut",
    data: {
      labels: ["新規", "再来"],
      datasets: [{
        data: [newC, reC],
        backgroundColor: [gradNew, gradRe],
        borderWidth: 0,
        hoverOffset: 10
      }]
    },
    options: {
      cutout: "85%",
      plugins: {
        legend: {
          position: "bottom",
          labels: {
            color: "white",
            font: { size: 11 }
          }
        }
      }
    }
  });

}
/* ======================
日本 vs 海外
====================== */
let jp=0, overseas=0;

records.forEach(r=>{
if(r.country==="日本") jp += +r.price||0;
else overseas += +r.price||0;
});

new Chart(document.getElementById("chart1"),{
type:"doughnut",
data:{
  labels:["日本","海外"],
  datasets:[{
    data:[jp,overseas]
  }]
},

// ★ここを追加する（重要）
options:{
  cutout: "85%"
}

});

/* ======================
国別（人数）
====================== */
const countries = ["香港","台湾","韓国","中国","オーストラリア","その他"];
const countryMap = {};

countries.forEach(c=>countryMap[c]=0);

data.forEach(r=>{
const c = r.country || "その他";
if(countryMap[c] !== undefined){
countryMap[c]++;
}else{
countryMap["その他"]++;
}
});

new Chart(document.getElementById("chart2"),{
type:"doughnut",
data:{
labels:Object.keys(countryMap),
datasets:[{data:Object.values(countryMap)}]
}
});

/* ======================
導線
====================== */
const routeMap = {
"YOASOBI":0,
"JPS":0,
"通りすがり":0,
"友人紹介":0,
"協力店紹介":0,
"駅ちか":0
};

data.forEach(r=>{
if(routeMap[r.route] !== undefined){
routeMap[r.route]++;
}
});

/* ======================
キャスト売上
====================== */
const castMap = {};

data.forEach(r=>{
castMap[r.cast]=(castMap[r.cast]||0)+(+r.price||0);
});

new Chart(document.getElementById("chart5"),{
type:"bar",
data:{
labels:Object.keys(castMap),
datasets:[{
data:Object.values(castMap)
}]
}
});

loadData();
async function loadData(){

  const snap = await getDocs(collection(db, "records"));
  records = snap.docs.map(d => d.data());

  const data = records.filter(r =>
    r.country && r.country !== "日本"
  );

  render(data);
}
</script>

</body>
</html>
