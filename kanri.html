<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#0f1117;
  color:white;
}

.container{
  padding:16px;
}

h1{
  font-size:20px;
  margin-bottom:10px;
}

.button{
  padding:10px;
  border-radius:12px;
  border:none;
  background:#1a1d26;
  color:white;
  margin-bottom:10px;
}

/* LIST */
.list > div{
  padding:12px 14px;
  border-radius:16px;
  margin-bottom:8px;

  width:100%;                 /* ←これ追加 */
  box-sizing:border-box;      /* ←これ追加 */

  display:flex;
  align-items:center;
  gap:14px;

  font-size:12px;  /* ←これ */

  background:rgba(255,255,255,0.03);
}

.list > div:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,0.06);
}

/* CHIP */
.label{
  font-size:11px;
  color:rgba(160,170,210,0.7);
  margin:10px 0 6px;
}

.chip-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.chip{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  font-size:12px;
  transition:0.2s;
}

.chip.active{
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
}
.bikou{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  font-size:12px;
}
.bikou.active{
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
}
/* DETAIL */
#detailPage{ display:none; }

.card{
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(35px);
  border:1px solid rgba(255,255,255,0.06);
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

.smallBtn{
  width:100%;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* hidden */
.hidden{ display:none; }
  /* ナビボタン全体 */
.nav-buttons{
  position:fixed;
  bottom:20px;   /* ＋ボタンと同じ高さ */
  right:90px;    /* ←＋ボタンの左にずらす */
  display:flex;
  flex-direction:row;
  gap:10px;
  z-index:999;
}

/* ボタン本体 */
.nav-btn{
  padding:10px 14px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-size:12px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(20px);

  transition:0.2s;
}

/* ホバー（浮く感じ） */
.nav-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  border:1px solid transparent;
}
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  padding:16px 0;
}

.menuBtn{
  position:absolute;
  right:20px;
  font-size:22px;
  cursor:pointer;
}

.menu{
  position:fixed;
  top:70px;
  right:20px;
  width:240px;
  background:rgba(255,255,255,0.06);
  border-radius:16px;
  backdrop-filter:blur(30px);
  overflow:hidden;
  z-index:999;
}

.menuItem{
  padding:14px;
  cursor:pointer;
}

.menuSubItem{
  padding:12px 14px;
  font-size:13px;
  opacity:0.85;
}

.subMenu{
  padding-left:16px;
  border-left:1px solid rgba(255,255,255,0.08);
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.3s;
}

.subMenu.open{
  max-height:500px;
  opacity:1;
}

.hidden{

}
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}

.kpiCard{
  padding:18px;
  border-radius:22px;

  backdrop-filter: blur(40px);

.kpiCard:hover{

.kpiLabel{

.kpiValue{

.kpiSub{

.dashboardCard{

.dashTitle{

  opacity:0.7;
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ★ここ重要（下のJSで使うため）
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;
</script>
<script>
let records = [];

let form = {
  time:"",
  course:"",
  country:"日本",
  type:"",
  shimei:"",
  op:[],
  bikou:[],
  route:"",
  extra:[]
};
let editIndex = null;
 /* ===== 初期化 ===== */
createTimeChips();
render();
updateKPI(records);
  
/* ===== 時間チップ生成 ===== */
function createTimeChips(){
  const group = document.getElementById("timeGroup");
  for(let i=8;i<=23;i++){
    const btn = document.createElement("button");
    btn.className="chip";
    btn.innerText=i+"時";
    btn.onclick=()=>setChip("time",i,btn);
    group.appendChild(btn);
  }
}

/* ===== 画面切替 ===== */
function add(){
form = {
  time:"",
  course:"",
  country:"日本",
  type:"",
  shimei:"",
  op:[],
  bikou:[],
  route:"",
  extra:[]// ←これ追加
};

  editIndex = null;
document.getElementById("deleteBtn").style.display = "none";
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  document.getElementById("countrySelectBox").classList.add("hidden");
  document.getElementById("cast").value = "";
document.getElementById("price").value = "";
  // ↓ここ追加（今日の日付を自動入力）
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');

  document.getElementById("date").value = `${yyyy}-${mm}-${dd}`;
  // ↑ここまで追加

  const detailPage = document.getElementById("detailPage");
  document.getElementById("listPage").style.display="none";
document.getElementById("detailPage").style.display="block";
}

function back(){
  document.getElementById("listPage").style.display="block";
  document.getElementById("detailPage").style.display="none";
  document.getElementById("deleteBtn").style.display = "none";
}

/* ===== チップ ===== */
function setChip(type,value,el){
  form[type]=value;
  const group=el.parentNode;
  group.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

function setCountry(val,el){
  form.country = val;

  // 日本・海外の選択状態リセット
  document.querySelectorAll(".chip-group .chip").forEach(c=>{
    if(c.innerText==="日本" || c.innerText==="海外"){
      c.classList.remove("active");
    }
  });

  // 押したボタンを光らせる
  el.classList.add("active");

  const box = document.getElementById("countrySelectBox"); // 国選択
  const route = document.getElementById("routeBox");       // ←導線（追加したやつ）

  if(val === "海外"){
    box.classList.remove("hidden");
    route.classList.remove("hidden"); // ←これが今回の目的
  }else{
    box.classList.add("hidden");
    route.classList.add("hidden");    // ←日本なら消す
    form.route = ""; // ←リセット（重要）
  }
}

function toggleOp(val,el){
  if(form.op.includes(val)){
    form.op=form.op.filter(v=>v!==val);
    el.classList.remove("active");
  }else{
    form.op.push(val);
    el.classList.add("active");
  }
}

  function toggleBikou(val,el){
  if(form.bikou.includes(val)){
    form.bikou = form.bikou.filter(v=>v!==val);
    el.classList.remove("active");
  }else{
    form.bikou.push(val);
    el.classList.add("active");
  }
}

function toggleExtra(name, price, el){

  const input = document.getElementById("price");
  let current = Number(input.value) || 0;

  if(form.extra.includes(name)){
    // OFF（引く）
    form.extra = form.extra.filter(v=>v!==name);
    current -= price;
    el.classList.remove("active");
  }else{
    // ON（足す）
    form.extra.push(name);
    current += price;
    el.classList.add("active");
  }

  input.value = current;
}
/* ===== 保存 ===== */
let isSaving = false;

async function save(){

  if(isSaving) return;
  isSaving = true;

  try {

    const record = {
      date: document.getElementById("date").value,
      cast: document.getElementById("cast").value,
      price: document.getElementById("price").value,
      time: form.time,
      course: form.course,
      country: form.country === "海外"
        ? document.getElementById("countrySelect").value
        : "日本",
      type: form.type,
      shimei: form.shimei,
      op: form.op,
      bikou: form.bikou,
      route: form.route,
      extra: form.extra
    };

    await addDoc(collection(window.db, "records"), record);

    // ✔ 成功時はUIだけ更新（静かに）
    await render();
    back();

  } catch (error) {

    console.log(error);

    // ❌ ユーザーには出さない or 軽く1行だけ
    showToast("保存に失敗しました");

  } finally {
    isSaving = false;
  }
}
async function deleteRecord(){

  if(!editIndex){
    alert("削除対象がありません");
    return;
  }

  if(confirm("このデータを削除しますか？")){

    try {

      await deleteDoc(
        doc(window.db, "records", editIndex)
      );

      alert("削除しました");

      // ★重要：状態リセット
      editIndex = null;
      form = {
        time:"",
        course:"",
        country:"日本",
        type:"",
        shimei:"",
        op:[],
        bikou:[],
        route:"",
        extra:[]
      };

      back();
      render();

    } catch (e) {
      console.log(e);
      alert("削除失敗");
    }

  }
}
function editRecord(r){

  // 🔥 ここが超重要（FirestoreのID）
  editIndex = r.id;

  document.getElementById("deleteBtn").style.display = "block";

  document.getElementById("date").value = r.date || "";
  document.getElementById("cast").value = r.cast || "";
  document.getElementById("price").value = r.price || "";

  form.time = r.time;
  form.course = r.course;
  form.country = r.country || "日本";
  form.type = r.type;
  form.shimei = r.shimei;
  form.op = r.op || [];
  form.bikou = r.bikou || [];
  form.route = r.route || "";
  form.extra = r.extra || [];

  document.getElementById("listPage").style.display="none";
  document.getElementById("detailPage").style.display="block";

  reflectChips();
}
  function reflectChips(){
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));

  document.querySelectorAll(".chip").forEach(c=>{
    if(c.innerText == form.course) c.classList.add("active");
    if(c.innerText == form.shimei) c.classList.add("active");
    if(c.innerText == form.type) c.classList.add("active");
    if(c.innerText == form.time+"時") c.classList.add("active");
    

    if(form.country == "日本" && c.innerText=="日本") c.classList.add("active");
    if(form.country == "海外" && c.innerText=="海外") c.classList.add("active");
if(c.classList.contains("bikou") && form.bikou.includes(c.innerText)){
  c.classList.add("active");
}
if(c.innerText == form.route) c.classList.add("active");
    if(form.op.includes(c.innerText)) c.classList.add("active");
         // 追加オプション反映
if(form.extra && form.extra.includes(c.innerText.replace(/ [+-].*/,""))){
  c.classList.add("active");
}
  });
 
  if(form.country==="海外"){
    document.getElementById("countrySelectBox").classList.remove("hidden");
    document.getElementById("routeBox").classList.remove("hidden");
  }else{
    document.getElementById("countrySelectBox").classList.add("hidden");
    document.getElementById("routeBox").classList.add("hidden");
  }
}

  
/* ===== 描画 ===== */
function filterData(){

  const month = document.getElementById("monthFilter").value;
  const date = document.getElementById("dateFilter").value;

  const filtered = allRecords.filter(r => {

if(!r.date || typeof r.date !== "string") return false;

const matchMonth = month ? r.date.slice(5,7) === month : true;
const matchDate = date ? r.date.slice(8,10) === date : true;

    return matchMonth && matchDate;
  });

  records = filtered;
  render();
  updateKPI(records);
}
async function render(){

  const list = document.getElementById("listPage");
  list.innerHTML = "";

  try {

    const snap = await getDocs(
      collection(window.db, "records")
    );

    let data = [];

    snap.forEach((doc) => {
      data.push({
        id: doc.id,      // ←★これ超重要（削除・編集に使う）
        ...doc.data()
      });
    });

    // ★ここがポイント（データ保存）
    allRecords = data;
    records = data;

    data.slice().reverse().forEach((r, i) => {

      const div = document.createElement("div");

      div.innerHTML = `
<span style="display:flex; align-items:center; gap:8px; width:100%;">

  <span style="width:20px; opacity:0.6;">
    ${i + 1}
  </span>

  <span>
    ${r.type || ""}｜${r.cast || ""}｜${r.course || ""}｜${r.shimei || ""}
  </span>

  <span style="margin-left:auto; font-weight:600;">
    ${r.price ? Number(r.price).toLocaleString() + "円" : ""}
  </span>

</span>
`;

      // ★クリックで編集
      div.onclick = () => editRecord(r);

      list.appendChild(div);

    });

    updateKPI(records);

  } catch (error) {
    console.log(error);
  }
}
function toggleMenu(){
  document.getElementById("menu").classList.toggle("hidden");
}

function toggleSub(id){

  const target = document.getElementById(id);

  document.querySelectorAll(".subMenu").forEach(el=>{
    if(el !== target){
      el.classList.remove("open");
    }
  });

  target.classList.toggle("open");
}
function updateKPI(data){

  // 総売上
  const total = data.reduce((sum,r)=>sum+(+r.price||0),0);
  document.getElementById("totalSales").innerText =
    "¥" + total.toLocaleString();

  // 月フィルター取得
  const month = document.getElementById("monthFilter").value;

  // 月目標（固定でOK）
  const monthlyTarget = 20000000;

  if(month){

    // 月の日数
    const now = new Date();
    const year = now.getFullYear();
    const lastDay = new Date(year, parseInt(month), 0).getDate();

    const today = now.getDate();

    // 進捗
    const progress = (total / monthlyTarget) * 100;

    document.getElementById("goalProgress").innerText =
      progress.toFixed(1) + "%";

    // 未達なら日割り計算
    const remain = monthlyTarget - total;

    if(remain > 0){
      const daysLeft = lastDay - today;
      const perDay = Math.ceil(remain / daysLeft);

      document.getElementById("dailyNeed").innerText =
        "日割り：" + perDay.toLocaleString() + "円";
    }else{
      document.getElementById("dailyNeed").innerText =
        "達成済み 🎉";
    }
    

  }else{

    // フィルターなし（全体）
    document.getElementById("goalProgress").innerText = "-";
    document.getElementById("dailyNeed").innerText = "月指定で表示";

  }

}
/* ★★★ ここに入れる ★★★ */
function saveFilterState(){
  const state = {
    month: document.getElementById("monthFilter").value,
    date: document.getElementById("dateFilter").value
  };
  localStorage.setItem("filterState", JSON.stringify(state));
}

function restoreFilterState(){
  const saved = JSON.parse(localStorage.getItem("filterState"));
  if(!saved) return;

  document.getElementById("monthFilter").value = saved.month || "";
  document.getElementById("dateFilter").value = saved.date || "";
}

/* 外クリックで閉じる */
window.addEventListener("click", function(e){
  if(!e.target.closest(".menu") && !e.target.closest(".menuBtn")){
    document.getElementById("menu").classList.add("hidden");
    document.querySelectorAll(".subMenu").forEach(el=>{
      el.classList.remove("open");
    });
    
  }
});
  window.addEventListener("load", function(){
  restoreFilterState();
  filterData();
});
</script>
