<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来客名簿</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  color:#e6eeff;

  background:
    radial-gradient(circle at 20% 10%, rgba(120,160,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(255,120,200,0.15), transparent 40%),
    #0b0f1a;
}

.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}

h1{
  text-align:center;
  font-size:22px;
  margin-bottom:20px;
}

/* ガラスカード */
.card{
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.06);
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 入力 */
input, select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:15px;
}

/* ボタン（Vision風） */
.button{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  color:white;
  font-weight:600;
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.1);
  transition:0.2s;
}

/* ホバー半透明 */
.button:hover{
  background:rgba(255,255,255,0.2);
  transform:scale(1.02);
}

/* メインボタン */
.button.primary{
  background:linear-gradient(135deg,#6aa2ff,#ff7ad9);
  box-shadow:0 6px 20px rgba(100,140,255,0.4);
}

/* リスト */
.list div{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px;
  margin-bottom:10px;
  border-radius:16px;

  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.08);

  cursor:pointer;
  transition:0.2s;
}

.list div:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,0.1);
}

.price{
  color:#ff9de6;
  font-weight:600;
}

.hidden{ display:none; }

</style>
</head>

<body>
<div class="container">

<h1>来客名簿</h1>

<button class="button" onclick="goDashboard()">ダッシュボードへ</button>

<div id="listPage">
  <div class="list" id="list"></div>
</div>

<div id="formPage" class="hidden">

  <div class="card">

    <input type="date" id="date">

    <input type="text" id="cast" placeholder="キャスト名">

    <input type="number" id="price" placeholder="料金">

    <select id="countryType">
      <option>日本</option>
      <option>海外</option>
    </select>

    <button class="button primary" onclick="saveData()">保存</button>
    <button class="button" onclick="back()">戻る</button>

  </div>

</div>

<button class="button primary" onclick="goForm()">＋追加</button>

</div>

<script>

let records = JSON.parse(localStorage.getItem("records") || "[]");

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.slice().reverse().forEach(r=>{
    const d = new Date(r.date);
    const md = `${d.getMonth()+1}/${d.getDate()}`;

    const div = document.createElement("div");

    div.innerHTML = `
      <div>${md} ${r.cast}</div>
      <div class="price">¥${Number(r.price).toLocaleString()}</div>
    `;

    list.appendChild(div);
  });
}

function goForm(){
  document.getElementById("formPage").classList.remove("hidden");
}

function back(){
  document.getElementById("formPage").classList.add("hidden");
}

function saveData(){

  const data = {
    date: document.getElementById("date").value,
    cast: document.getElementById("cast").value,
    price: Number(document.getElementById("price").value),
    nationality: document.getElementById("countryType").value
  };

  records.push(data);

  localStorage.setItem("records", JSON.stringify(records));

  back();
  render();
}

function goDashboard(){
  location.href = "money.html";
}

render();

</script>

</body>
</html>
