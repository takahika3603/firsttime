<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外国人口コミトラッカー</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo";
  background:linear-gradient(#000,#05070c);
  color:white;
}

h2{
  text-align:center;
  margin:20px 0;
}

.wrapper{
  padding:20px;
}

.box{
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

.percent{
  font-size:32px;
  text-align:center;
}

.info,.msg{
  text-align:center;
  font-size:12px;
  margin:5px 0;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background:#222;
  color:white;
}

canvas{
  display:block;
  margin:10px auto;
}
</style>
</head>

<body>

<h2>外国人口コミトラッカー</h2>

<div class="wrapper">
<div class="box">

<h3>口コミ獲得（外国人）</h3>

<div class="percent" id="percent">0%</div>
<canvas id="chart"></canvas>

<div class="info" id="info"></div>
<div class="msg" id="msg"></div>

<button onclick="addAcquired()">口コミGET</button>
<button onclick="addMiss()">未獲得（理由入力）</button>
<button onclick="showHistory()">履歴を見る</button>
<button onclick="resetAll()">リセット</button>

</div>
</div>

<script>

let data = {
  response: Number(localStorage.getItem("response")||0),
  acquired: Number(localStorage.getItem("acquired")||0),
  miss: Number(localStorage.getItem("miss")||0),
  history: JSON.parse(localStorage.getItem("history")||"[]")
};

let chart;

/* 初期化 */
function init(){
  chart = new Chart(document.getElementById("chart"),{
    type:'doughnut',
    data:{
      labels:['獲得','未獲得'],
      datasets:[{data:[0,0]}]
    },
    options:{
      cutout:'75%',
      plugins:{legend:{display:false}}
    }
  });
  update();
}

/* 更新 */
function update(){
  const total = data.response;
  const percent = total===0?0:Math.floor((data.acquired/total)*100);

  document.getElementById("percent").innerText = percent+"%";
  document.getElementById("info").innerText =
    `応対:${data.response} / 獲得:${data.acquired} / 未獲得:${data.miss}`;

  chart.data.datasets[0].data = [data.acquired,data.miss];
  chart.update();

  // 保存
  localStorage.setItem("response",data.response);
  localStorage.setItem("acquired",data.acquired);
  localStorage.setItem("miss",data.miss);
  localStorage.setItem("history",JSON.stringify(data.history));
}

/* 成功 */
function addAcquired(){
  data.response++;
  data.acquired++;
  data.history.push({
    type:"成功",
    time:new Date().toLocaleString()
  });
  document.getElementById("msg").innerText="成功 +1";
  update();
}

/* 未獲得 */
function addMiss(){
  const reason = prompt("未獲得の理由を入力");

  data.response++;
  data.miss++;

  data.history.push({
    type:"未獲得",
    reason: reason || "未入力",
    time:new Date().toLocaleString()
  });

  document.getElementById("msg").innerText="未獲得";
  update();
}

/* 履歴 */
function showHistory(){
  if(data.history.length===0){
    alert("履歴なし");
    return;
  }

  const text = data.history.map(h=>{
    if(h.type==="未獲得"){
      return `${h.time}｜未獲得｜${h.reason}`;
    }else{
      return `${h.time}｜成功`;
    }
  }).join("\n");

  alert(text);
}

/* リセット */
function resetAll(){
  if(confirm("リセットしますか？")){
    data = {response:0,acquired:0,miss:0,history:[]};
    update();
  }
}

init();

</script>

</body>
</html>
