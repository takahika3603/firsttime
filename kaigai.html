<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外分析ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ★ index.html（来客名簿）と完全同じFirebase設定を入れる */
const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
🔥 来客名簿（index.html）から取得
========================= */
async function loadFromIndex(){

  const snap = await getDocs(collection(db, "records"));

  records = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  filtered = [...records];

  console.log("読み込み成功:", records); // ←確認用

  updateDashboard(filtered);
}

window.addEventListener("load", loadFromIndex);
</script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
}

.container{ padding:16px; }

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  backdrop-filter: blur(25px);
}

h1{ font-size:18px; margin:0 0 10px; }
h3{ font-size:13px; margin:0 0 10px; opacity:0.8; }

/* ===== フィルター ===== */
.filterCard{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.filterGroup{
  display:flex;
  gap:10px;
}

.selectWrap{
  flex:1;
}

.selectWrap select{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:white;
  border:1px solid rgba(255,255,255,0.12);
  outline:none;
  appearance:none;
}

/* KPI */
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpiBox{
  padding:12px;
  border-radius:14px;
  background:rgba(120,170,255,0.08);
  border:1px solid rgba(120,170,255,0.2);
}

.kpiLabel{ font-size:11px; opacity:0.6; }
.kpiValue{ font-size:20px; font-weight:700; margin-top:6px; }

/* バー */
.bar{
  height:16px;
  width:100%;
  border-radius:999px;
  overflow:hidden;
  display:flex;
  background:rgba(255,255,255,0.08);
}

.barNew{background:#6aa2ff;width:50%;}
.barRe{background:#ff78b4;width:50%;}

.barLabel{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.barLabel > div{
  flex:1;
  text-align:center;
  font-size:11px;
  opacity:0.8;
}
/* 左右に寄せる（これが本体） */
.barLabel > div:first-child{
  text-align:left;
}

.barLabel > div:last-child{
  text-align:right;
}

canvas{
  width:100% !important;
}

/* 円グラフ専用 */
.chartWrap{
  width:100%;
  max-width:260px;
  height:260px;
  margin:0 auto;
}

.chartWrap canvas{
  height:100% !important;
}
</style>
</head>

<body>

<div class="container">

<!-- タイトル -->
<h1 style="margin:0 0 12px; padding:16px; font-size:18px;">
  海外分析ダッシュボード
</h1>

<!-- フィルター -->

        <option value="14">14日</option>

        <option value="16">16日</option>
        <option value="17">17日</option>
        <option value="18">18日</option>
        <option value="19">19日</option>
        <option value="20">20日</option>
        <option value="21">21日</option>
        <option value="22">22日</option>
        <option value="23">23日</option>
        <option value="24">24日</option>
        <option value="25">25日</option>
        <option value="26">26日</option>
        <option value="27">27日</option>
        <option value="28">28日</option>
        <option value="29">29日</option>
        <option value="30">30日</option>
        <option value="31">31日</option>
      </select>
    </div>

  </div>
</div>

<!-- KPI -->
<div class="card">
  <div class="kpiGrid">

    <div class="kpiBox">
      <div class="kpiLabel">海外売上</div>
      <div class="kpiValue" id="overseasSales">¥0</div>
    </div>

    <div class="kpiBox">
      <div class="kpiLabel">海外人数</div>
      <div class="kpiValue" id="overseasPeople">0名</div>
    </div>

  </div>
</div>

<!-- 新規 vs 再来 -->
<div class="card">
  <h3>新規 vs 再来</h3>

  <div class="bar">
    <div class="barNew"></div>
    <div class="barRe"></div>
  </div>

<div class="barLabel">

  <div>
    <div id="newPercent">新規 0%</div>
    <div id="newCount">0名</div>
  </div>

  <div>
    <div id="rePercent">再来 0%</div>
    <div id="reCount">0名</div>
  </div>

</div>
</div>
<!-- 導線 -->
<div class="card">
  <h3>導線</h3>
 <div class="chartWrap">
  <canvas id="routeChart"></canvas>
</div>
</div>

<!-- 指名方法 -->
<div class="card">
  <h3>指名方法</h3>

  <div class="bar">
<div id="freeBar" style="background:#6aa2ff"></div>
<div id="netBar" style="background:#7ad3ff"></div>
<div id="pBar" style="background:#ffd36a"></div>
<div id="repeatBar" style="background:#ff78b4"></div>
  </div>

  <div class="barLabel">

    <div>
      <div id="freePercent">フリー 0%</div>
      <div id="freeCount">0名</div>
    </div>

    <div>
      <div id="netPercent">NET 0%</div>
      <div id="netCount">0名</div>
    </div>

    <div>
      <div id="pPercent">P 0%</div>
      <div id="pCount">0名</div>
    </div>

    <div>
      <div id="repeatPercent">リピ 0%</div>
      <div id="repeatCount">0名</div>
    </div>

  </div>
</div>

<!-- 国籍 -->
<div class="card">
  <h3>国籍</h3>
<div class="chartWrap">
  <canvas id="nationalityChart"></canvas>
</div>
</div>
<!-- キャスト接客回数 -->
<div class="card">
  <h3>キャスト接客回数</h3>
  <canvas id="castVisitChart"></canvas>
</div>
<!-- リピート率 -->
<div class="card">
  <h3>海外リピート率</h3>
  <canvas id="repeatChart"></canvas>
</div>

</div>

<script>
let records = [];
let filtered = [];
let repeatChart;
let castVisitChart;

/* =====================
フィルター処理（枠）
===================== */
function applyFilter(){

  const month = document.getElementById("monthFilter").value;
  const day = document.getElementById("dayFilter").value;

  filtered = [...records];

  filtered = filtered.filter(r => {
    if(!r.date) return false;

    // ★Firestore対応
    const date = r.date.seconds
      ? new Date(r.date.seconds * 1000)
      : new Date(r.date);

    const m = (date.getMonth()+1).toString().padStart(2,'0');
    const d = date.getDate().toString().padStart(2,'0');

    if(month && m !== month) return false;
    if(day && d !== day) return false;

    return true;
  });

  updateDashboard(filtered);
}

/* =====================
ダッシュボード更新（枠）
===================== */
function updateDashboard(data){

// ★海外データ（これを必ず先に作る）
const overseas = data.filter(r => {
  if(!r.country) return false;
  const c = r.country.trim();
  return c !== "日本" && c !== "Japan";
});
// ★海外人数（来客数）
const overseasPeople = overseas.length;

document.getElementById("overseasPeople").innerText =
  overseasPeople + "名";

// ★海外売上
const overseasSales = overseas
  .reduce((sum, r) => sum + (Number(r.price) || 0), 0);

document.getElementById("overseasSales").innerText =
  "¥" + overseasSales.toLocaleString();

  // ★導線集計
const routeCount = {};

overseas.forEach(r => {
  const route = r.route || "未設定";
  routeCount[route] = (routeCount[route] || 0) + 1;
});
// =====================
// 指名方法（海外のみ）
// =====================
const shimeiCount = {
  フリー: 0,
  NET: 0,
  P: 0,
  リピ: 0
};

// ★ここが重要：overseasを使う
overseas.forEach(r => {
  const s = r.shimei;

  if(s === "フリー") shimeiCount.フリー++;
  if(s === "NET") shimeiCount.NET++;
  if(s === "P") shimeiCount.P++;
  if(s === "リピ") shimeiCount.リピ++;
});

const totalShimei =
  shimeiCount.フリー +
  shimeiCount.NET +
  shimeiCount.P +
  shimeiCount.リピ || 1;

// 割合
const freeRate = (shimeiCount.フリー / totalShimei) * 100;
const netRate = (shimeiCount.NET / totalShimei) * 100;
const pRate = (shimeiCount.P / totalShimei) * 100;
const repeatRate = (shimeiCount.リピ / totalShimei) * 100;
// ★バーの長さを動かす（これが重要）
document.getElementById("freeBar").style.width = freeRate + "%";
document.getElementById("netBar").style.width = netRate + "%";
document.getElementById("pBar").style.width = pRate + "%";
document.getElementById("repeatBar").style.width = repeatRate + "%";
// バー反映
// ％表示
document.getElementById("freePercent").innerText =
  `フリー ${freeRate.toFixed(1)}%`;

document.getElementById("netPercent").innerText =
  `NET ${netRate.toFixed(1)}%`;

document.getElementById("pPercent").innerText =
  `P ${pRate.toFixed(1)}%`;

document.getElementById("repeatPercent").innerText =
  `リピ ${repeatRate.toFixed(1)}%`;

// 人数表示
document.getElementById("freeCount").innerText =
  `${shimeiCount.フリー}名`;

document.getElementById("netCount").innerText =
  `${shimeiCount.NET}名`;

document.getElementById("pCount").innerText =
  `${shimeiCount.P}名`;

document.getElementById("repeatCount").innerText =
  `${shimeiCount.リピ}名`;
  // =====================
  // 新規 vs 再来（ここ修正）
  // =====================
  const newC = overseas.filter(r => r.type === "新規").length;
  const reC = overseas.filter(r => r.type === "再来").length;

  const total = newC + reC || 1; // 0割防止

  const newRate = (newC / total) * 100;
  const reRate = (reC / total) * 100;

// バーの割合（※これないと棒が動かない）
document.querySelector(".barNew").style.width = newRate + "%";
document.querySelector(".barRe").style.width = reRate + "%";

// ％表示
document.getElementById("newPercent").innerText =
  `新規 ${newRate.toFixed(1)}%`;

document.getElementById("rePercent").innerText =
  `再来 ${reRate.toFixed(1)}%`;

// 人数表示
document.getElementById("newCount").innerText =
  `${newC}名`;

document.getElementById("reCount").innerText =
  `${reC}名`;

    // =====================
  // キャスト接客回数
  // =====================
  const castCount = {};

overseas.forEach(r => {
  const name = r.cast || "未設定";
  castCount[name] = (castCount[name] || 0) + 1;
});

const sortedCast = Object.entries(castCount)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,10);

const labels = sortedCast.map(x=>x[0]);
const values = sortedCast.map(x=>x[1]);

// =====================
// ★ここが重要（更新 or 初回作成）
// =====================
if (castVisitChart) {

  // すでにある → データだけ更新
  castVisitChart.data.labels = labels;
  castVisitChart.data.datasets[0].data = values;
  castVisitChart.update();

} else {

  // 初回だけグラフ作る
  castVisitChart = new Chart(
    document.getElementById("castVisitChart"),
    {
      type:"bar",
      data:{
        labels:labels,
        datasets:[{
          data:values
        }]
      },
      options:{
        indexAxis:"y",
        plugins:{
          legend:{ display:false }
        },
        scales:{
          x:{ beginAtZero:true },
          y:{ ticks:{ font:{ size:10 }}}
    　    }
      　}
    　}
  　);
　}
// =====================
// 導線グラフ
// =====================
const routeLabels = Object.keys(routeCount);
const routeValues = Object.values(routeCount);

if (window.routeChartObj) {
  routeChartObj.data.labels = routeLabels;
  routeChartObj.data.datasets[0].data = routeValues;
  routeChartObj.update();
} else {
  window.routeChartObj = new Chart(
    document.getElementById("routeChart"),
    {
      type: "doughnut",
      data: {
        labels: routeLabels,
        datasets: [{
          data: routeValues,
          backgroundColor: [
            "#6aa2ff",
            "#7ad3ff",
            "#ffd36a",
            "#ff9f7a",
            "#ff78b4",
            "#c77dff"
          ],
          borderWidth: 0,
          hoverOffset: 8
        }]
      },
     options: {
  maintainAspectRatio: true,
  aspectRatio: 1,
  cutout: "65%",
        plugins: {
          legend: {
            position: "bottom",
            labels: {
              color: "white",
              font: { size: 11 },
              padding: 12
            }
          }
        }
      }
    }
  );
} // ←ここで完全に閉じる（超重要）

// =====================
// 国籍グラフ（←完全に外に出す）
// =====================
const nationCount = {};

overseas.forEach(r=>{
  const c = r.country || "不明";
  nationCount[c] = (nationCount[c] || 0) + 1;
});

const nationLabels = Object.keys(nationCount);
const nationValues = Object.values(nationCount);

if (window.nationChartObj) {
  nationChartObj.data.labels = nationLabels;
  nationChartObj.data.datasets[0].data = nationValues;
  nationChartObj.update();
} else {
  window.nationChartObj = new Chart(
    document.getElementById("nationalityChart"),
    {
      type: "doughnut",
      data: {
        labels: nationLabels,
        datasets: [{
          data: nationValues,
          backgroundColor: [
            "#6aa2ff",
            "#00d4ff",
            "#7bffb2",
            "#ffd36a",
            "#ff9f7a",
            "#ff78b4",
            "#c77dff"
          ],
          borderWidth: 0,
          hoverOffset: 8
        }]
      },
      options: {
        cutout: "65%",
        plugins: {
          legend: {
            position: "bottom",
            labels: {
              color: "white",
              font: { size: 11 },
              padding: 12
            }
          }
        }
      }
    }
  );
}
}  
</script>

</body>
</html>
