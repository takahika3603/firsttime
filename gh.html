<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog CMS Builder</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo",sans-serif;
background:linear-gradient(180deg,#0b0f1a,#000);
color:#fff;
padding:14px;
}

/* ===== layout ===== */
.container{
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
padding:14px;
backdrop-filter:blur(18px);
}

/* ===== input ===== */
select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:#fff;
font-size:14px;
outline:none;
}

textarea{
height:90px;
}

/* ===== checkbox ===== */
.check{
display:flex;
align-items:center;
gap:10px;
margin:8px 0;
font-size:14px;
cursor:pointer;
}

/* ===== button ===== */
button{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#a5b4fc,#f9a8d4);
color:#fff;
font-weight:bold;
}

/* ===== output ===== */
.output{
white-space:pre-wrap;
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
font-family:monospace;
min-height:160px;
}

/* ===== modal ===== */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
width:90%;
max-width:600px;
background:#0b0f1a;
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
padding:14px;
}

.modal-box textarea{
width:100%;
height:200px;
background:#05070f;
color:#fff;
border:none;
border-radius:10px;
padding:10px;
font-family:monospace;
}
</style>
</head>

<body>

<div class="container">

<!-- ① -->
<div class="card">
<h3>① ブログ種類</h3>
<select id="type">
<option value="new">未経験者向け</option>
<option value="society">社会人向け</option>
<option value="max">最高精算額紹介</option>
<option value="morning">朝でも稼げる</option>
</select>
</div>

<!-- ② -->
<div class="card">
<h3>② 訴求ポイント</h3>
<label class="check"><input type="checkbox" value="salary">お給料</label>
<label class="check"><input type="checkbox" value="job">仕事内容</label>
<label class="check"><input type="checkbox" value="easy">未経験OK</label>
<label class="check"><input type="checkbox" value="env">働きやすさ</label>
</div>

<!-- ③ -->
<div class="card">
<h3>③ 文章の伝え方</h3>
<select id="style">
<option value="soft">やわらかい</option>
<option value="direct">ストレート</option>
<option value="empathy">共感型</option>
</select>
</div>

<!-- ④ -->
<div class="card">
<h3>④ 分賞の雰囲気</h3>
<select id="tone">
<option value="cute">かわいい</option>
<option value="luxury">高級感</option>
<option value="friendly">フレンドリー</option>
<option value="serious">真面目</option>
</select>
</div>

<!-- ⑤ ブロック -->
<div class="card">
<h3>⑤ ブロック構成（クリックで編集）</h3>

<div class="check" onclick="openModal('salary')">💰 お給料</div>
<div class="check" onclick="openModal('job')">💼 仕事内容</div>
<div class="check" onclick="openModal('easy')">🌱 未経験OK</div>
<div class="check" onclick="openModal('env')">🏠 環境</div>

</div>

<!-- ⑥ -->
<div class="card">
<h3>⑥ 本日の内容</h3>
<textarea id="content"></textarea>
</div>

<!-- ⑦ -->
<div class="card">
<h3>⑦ 生成</h3>
<button onclick="generate()">コード生成</button>
</div>

<!-- 出力 -->
<div class="card">
<div id="output" class="output">ここにHTMLが表示されます</div>
</div>

</div>

<!-- ===== モーダル ===== -->
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalTitle">編集</h3>
<textarea id="editor"></textarea>
<button onclick="save()">保存</button>
</div>
</div>

<script>

/* ===== ブロック保存 ===== */
let blocks = {
salary:`<div style="background:#fdf2f8;padding:12px;border-radius:12px;">お給料は安定しています。</div>`,
job:`<div style="background:#ecfeff;padding:12px;border-radius:12px;">仕事内容はシンプルです。</div>`,
easy:`<div style="background:#f0fdf4;padding:12px;border-radius:12px;">未経験でも安心です。</div>`,
env:`<div style="background:#fff7ed;padding:12px;border-radius:12px;">働きやすい環境です。</div>`
};

let currentKey=null;

/* ===== モーダル ===== */
function openModal(key){
currentKey=key;
document.getElementById("editor").value=blocks[key];
document.getElementById("modal").style.display="flex";
document.getElementById("modalTitle").innerText="編集：" + key;
}

function save(){
blocks[currentKey]=document.getElementById("editor").value;
document.getElementById("modal").style.display="none";
}

/* ===== 生成 ===== */
function generate(){

let html="";

/* CSS */
html+=`
<style>
body{font-family:Meiryo;background:#fff;padding:16px;}
h2{color:#a5b4fc;}
</style>
`;

/* 種類 */
const type=document.getElementById("type").value;
if(type==="new") html+="<h2>未経験者向け</h2>";
if(type==="society") html+="<h2>社会人向け</h2>";
if(type==="max") html+="<h2>最高精算額</h2>";
if(type==="morning") html+="<h2>朝でも稼げる</h2>";

/* スタイル */
html+=`<p>${document.getElementById("style").value} / ${document.getElementById("tone").value}</p>`;

/* ブロック */
document.querySelectorAll(".check input").forEach(c=>{
if(c.checked){
html+=blocks[c.value];
}
});

/* 本文 */
html+=`<p>${document.getElementById("content").value}</p>`;

document.getElementById("output").innerText=html;
}

</script>

</body>
</html>
