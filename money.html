<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans";
  background: radial-gradient(circle at top, #0b0f1a, #05070c);
  color:white;
  overflow-x:hidden;
}

/* 背景ぼかしレイヤー */
.glow{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(106,162,255,0.25), transparent 60%);
  filter:blur(60px);
  top:-100px;
  right:-100px;
}

/* レイアウト */
.container{
  padding:20px;
}

/* ガラスカード */
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-2px);
}

/* ヘッダー */
.topBar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  text-decoration:none;
  color:white;
  font-size:12px;
  border:1px solid rgba(255,255,255,0.1);
}

/* KPI */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.big{
  font-size:22px;
  font-weight:700;
}

/* タイトル */
h3{
  margin:0 0 10px;
  font-size:14px;
  opacity:0.8;
}

/* canvas */
canvas{
  width:100% !important;
  aspect-ratio: 1 / 1;
}
  /* ===== フィルターUI ===== */
.filterCard{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  backdrop-filter: blur(30px);
}

.filterTitle{
  font-size:12px;
  opacity:0.6;
  margin-bottom:10px;
}

.filterGroup{
  display:flex;
  gap:12px;
}

.selectWrap{
  position:relative;
  flex:1;
}

.selectWrap select,
.selectWrap input{
  width:100%;
  padding:14px 40px 14px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:white;
  font-size:13px;
  outline:none;
  backdrop-filter: blur(20px);
  transition:0.25s;
}

.selectWrap::after{
  content:"⌄";
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  opacity:0.6;
  pointer-events:none;
}

.selectWrap select:hover,
.selectWrap input:hover{
  background:rgba(255,255,255,0.1);
  transform:translateY(-1px);
}

.selectWrap select:focus,
.selectWrap input:focus{
  border-color:#6aa2ff;
  background:rgba(255,255,255,0.12);
  box-shadow:
    0 0 0 2px rgba(106,162,255,0.2),
    0 8px 20px rgba(0,0,0,0.4);
}

/* ネイティブ矢印消す */
.selectWrap select{
  appearance:none;
  -webkit-appearance:none;
}

/* 日付アイコン調整 */
input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0.4;
  filter:invert(1);
}
  /* KPIだけ小さくする */
.kpiSmall{
  font-size:14px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

<div class="topBar">
  <a class="btn" href="kanri.html">← 名簿へ戻る</a>
</div>
  <div class="filterCard">

  <div class="filterTitle">期間フィルター</div>

  <div class="filterGroup">

    <div class="selectWrap">
      <select id="monthFilter" onchange="applyFilter()">
        <option value="">全期間</option>
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05">5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>

    <div class="selectWrap">
      <input type="date" id="dayFilter" onchange="applyFilter()">
    </div>

  </div>

</div>



<!-- KPI -->
<div class="grid">

  <div class="card">
    <div style="font-size:12px; opacity:0.6;">目標</div>
    <div class="big kpiSmall">¥20,000,000</div>
  </div>

  <div class="card">
    <div style="font-size:12px; opacity:0.6;">売上</div>
    <div class="big kpiSmall" id="sales">0円</div>
  </div>

  <div class="card">
    <div style="font-size:12px; opacity:0.6;">進捗</div>
    <div class="big kpiSmall" id="progress">0%</div>
  </div>

  <div class="card">
    <div style="font-size:12px; opacity:0.6;">必要日割</div>
    <div class="big kpiSmall" id="daily">0円</div>
  </div>

</div>

<!-- 来客数 -->
<div class="card">
来客数：<span id="count"></span>名（海外：<span id="overseasCount"></span>名）
</div>
<!-- 海外分析ボタン -->
<div class="card" onclick="location.href='kaigai.html'" style="cursor:pointer;">
  <div style="font-size:14px; font-weight:600;">
    海外分析
  </div>
  <div style="font-size:11px; opacity:0.7; margin-top:4px;">
    国別・売上・指名を分析する
  </div>
</div>
<!-- 新規 / 再来 -->
<div class="card">
<h3>新規 vs 再来</h3>
<canvas id="chart1"></canvas>
</div>

<!-- 日本 / 海外 -->
<div class="card">
<h3>日本 vs 海外 売上</h3>
<canvas id="chart2"></canvas>
</div>

<!-- キャスト売上 -->
<div class="card">
<h3>キャスト売上</h3>
<canvas id="chart3"></canvas>
</div>

<!-- ★追加：リピート率ランキング -->
<div class="card">
<h3>リピート率ランキング</h3>
<canvas id="chart4"></canvas>
</div>

</div>

<script>

Chart.register({
  id: 'centerText',
  beforeDraw(chart) {

    // chart1 と chart2 だけ対象
    if (chart.canvas.id !== "chart1" && chart.canvas.id !== "chart2") return;

    const { width, height, ctx } = chart;
    ctx.save();

    const data = chart.data.datasets[0].data;
    const total = data.reduce((a,b)=>a+b,0);

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.font = "500 12px -apple-system";

    // ======================
    // chart1（新規 vs 再来）
    // ======================
    if(chart.canvas.id === "chart1"){

      const newRate = ((data[0]/total)*100).toFixed(1);
      const reRate = ((data[1]/total)*100).toFixed(1);

      ctx.fillText(`新規 ${newRate}%`, width / 2, height / 2 - 8);
      ctx.fillText(`再来 ${reRate}%`, width / 2, height / 2 + 12);
    }

    // ======================
    // chart2（日本 vs 海外）
    // ======================
    if(chart.canvas.id === "chart2"){

      const jpRate = ((data[0]/total)*100).toFixed(1);
      const overseasRate = ((data[1]/total)*100).toFixed(1);

      ctx.fillText(`日本 ${jpRate}%`, width / 2, height / 2 - 8);
      ctx.fillText(`海外 ${overseasRate}%`, width / 2, height / 2 + 12);
    }

    ctx.restore();
  }
});

const records = JSON.parse(localStorage.getItem("records") || "[]");
  let chart1, chart2, chart3, chart4;
function applyFilter(){

  const monthValue = document.getElementById("monthFilter").value;
  const dayValue = document.getElementById("dayFilter").value;
// ★追加：保存
  localStorage.setItem("dashboardFilter", JSON.stringify({
    month: monthValue,
    day: dayValue
  }));

  let filtered = records;

  // 月で絞る
  if(monthValue){
    const m = monthValue;
    filtered = filtered.filter(r =>
      r.date && r.date.slice(5,7) === m
    );
  }

  // 日で絞る
  if(dayValue){
    filtered = filtered.filter(r =>
      r.date === dayValue
    );
  }

  updateDashboard(filtered);
}

function updateDashboard(data){

/* ======================
売上
====================== */
const totalSales = data.reduce((s,r)=>s+(+r.price||0),0);

document.getElementById("sales").innerText =
"¥" + totalSales.toLocaleString();

/* 進捗 */
const target = 20000000;
document.getElementById("progress").innerText =
((totalSales/target)*100).toFixed(1)+"%";

/* 日割 */
const now = new Date();
const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
const daysLeft = Math.max(1, lastDay - now.getDate());
document.getElementById("daily").innerText =
Math.ceil((target-totalSales)/daysLeft).toLocaleString()+"円";

/* 来客 */
const jpCount = data.filter(r => r.country === "日本").length;
const overseasCount = data.filter(r => r.country && r.country !== "日本").length;

document.getElementById("count").innerText = jpCount + overseasCount;
document.getElementById("overseasCount").innerText = overseasCount;

/* ======================
新規 / 再来
====================== */  
const newC = data.filter(r=>r.type==="新規").length;
const reC = data.filter(r=>r.type==="再来").length;

if(chart1) chart1.destroy();

chart1 = new Chart(document.getElementById("chart1"),{
type:"doughnut",
data:{
  labels:["新規","再来"],
  datasets:[{
    data:[newC,reC],
    borderWidth: 0
  }]
},
options:{
  cutout: '80%'
}
});

/* ======================
日本 / 海外
====================== */
let jp=0, overseas=0;

data.forEach(r=>{
if(r.country==="日本") jp+=+r.price||0;
else overseas+=+r.price||0;
});

if(chart2) chart2.destroy();

chart2 = new Chart(document.getElementById("chart2"),{
type:"doughnut",
data:{
  labels:["日本","海外"],
  datasets:[{ data:[jp,overseas] }]
},
options:{
  cutout: '80%'
}
});

/* ======================
キャスト売上
====================== */
const castMap = {};
data.forEach(r=>{
castMap[r.cast]=(castMap[r.cast]||0)+(+r.price||0);
});

if(chart3) chart3.destroy();

chart3 = new Chart(document.getElementById("chart3"),{
type:"doughnut",
data:{
  labels:Object.keys(castMap),
  datasets:[{ data:Object.values(castMap) }]
},
options:{
  cutout: '80%'
}
});

/* ======================
リピート率
====================== */
const castStats = {};

data.forEach(r=>{
if(!castStats[r.cast]){
castStats[r.cast]={total:0,re:0};
}
castStats[r.cast].total++;
if(r.type==="再来") castStats[r.cast].re++;
});

const sorted = Object.keys(castStats).map(name=>{
const d = castStats[name];
return { name, rate: d.total ? d.re/d.total : 0 };
}).sort((a,b)=>b.rate-a.rate);

if(chart4) chart4.destroy();

chart4 = new Chart(document.getElementById("chart4"),{
type:"bar",
data:{
labels:sorted.map(s=>s.name),
datasets:[{
data:sorted.map(s=>s.rate*100)
}]
}
});

}
updateDashboard(records);
window.addEventListener("load", () => {
  const saved = JSON.parse(localStorage.getItem("dashboardFilter"));

  if(saved){
    document.getElementById("monthFilter").value = saved.month || "";
    document.getElementById("dayFilter").value = saved.day || "";
  }

  applyFilter();
});
</script>

</body>
</html>
