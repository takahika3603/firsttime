<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤情報</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#0f1117;
  color:white;
}

.container{ padding:16px; }

h1{ font-size:18px; margin-bottom:12px; }

input{
  width:100%;
  padding:12px;
  margin-bottom:8px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
  font-weight:600;
  margin-bottom:12px;
}

.card{
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{ font-size:14px; }
.time{ font-size:11px; opacity:0.7; margin-top:4px; }

.delete{
  font-size:12px;
  opacity:0.7;
  cursor:pointer;
}

h2{
  font-size:14px;
  opacity:0.8;
  margin-top:20px;
  margin-bottom:10px;
}

/* ★追加：外部連携用コピー表示 */
.copyBox{
  font-size:11px;
  opacity:0.6;
  margin-bottom:10px;
}
  /* 下固定ボタン */
.backBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;

  padding:14px;
  text-align:center;
  border-radius:14px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:white;

  backdrop-filter: blur(20px);

  transition:0.2s;
  cursor:pointer;
}

/* ホバーで浮く */
.backBtn:hover{
  transform:translateY(-3px);
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  border:1px solid transparent;
}
</style>
</head>

<body>

<div class="container">

<h1>出勤情報</h1>

<input id="name" placeholder="キャスト名">
<input id="start" type="number" placeholder="開始時間（例 12）">
<input id="end" type="number" placeholder="終了時間（例 18）">

<button onclick="addCast()">追加</button>

<div class="copyBox">
※このデータは来客名簿と自動連携されます
</div>

<h2>今日の出勤</h2>
<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =========================
   Firebase
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   日付
========================= */
function getToday(){
  return new Date().toISOString().slice(0,10);
}

/* =========================
   追加
========================= */
window.addCast = async function(){

  const name = document.getElementById("name").value.trim();
  const start = Number(document.getElementById("start").value);
  const end = Number(document.getElementById("end").value);

  if(!name || !start || !end) return;

  const today = getToday();
  const ref = doc(db, "attendance", today);

  const snap = await getDoc(ref);

  let casts = snap.exists() ? (snap.data().casts || []) : [];

  const exists = casts.some(c =>
    c.name === name &&
    c.start === start &&
    c.end === end
  );

  if(!exists){
    casts.push({
      name,
      start,
      end,
      id: crypto.randomUUID() // ★連携用ID（重要）
    });
  }

  await setDoc(ref, {
    date: today,
    casts
  });

  clearForm();
  load();
};

/* =========================
   削除
========================= */
window.removeCast = async function(id){

  const today = getToday();
  const ref = doc(db, "attendance", today);

  const snap = await getDoc(ref);
  if(!snap.exists()) return;

  let casts = snap.data().casts || [];

  casts = casts.filter(c => c.id !== id);

  await setDoc(ref, {
    date: today,
    casts
  });

  load();
};

/* =========================
   クリア
========================= */
function clearForm(){
  document.getElementById("name").value = "";
  document.getElementById("start").value = "";
  document.getElementById("end").value = "";
}

/* =========================
   表示
========================= */
async function load(){

  const today = getToday();
  const ref = doc(db, "attendance", today);

  const snap = await getDoc(ref);

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(!snap.exists()) return;

  const data = snap.data();

  (data.casts || []).forEach((c) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>
        <div class="name">${c.name}</div>
        <div class="time">${c.start}:00 - ${c.end}:00</div>
      </div>
      <div class="delete" onclick="removeCast('${c.id}')">削除</div>
    `;

    list.appendChild(div);
  });
}

load();
</script>
<div class="backBtn" onclick="location.href='index.html'">
  来客名簿へ戻る
</div>
</body>
</html>
