<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>来客名簿</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#0f1117;
  color:white;
}

.container{
  padding:16px;
}

h1{
  font-size:20px;
  margin-bottom:10px;
}

.button{
  padding:10px;
  border-radius:12px;
  border:none;
  background:#1a1d26;
  color:white;
  margin-bottom:10px;
}

/* LIST */
.list div{
  padding:12px 14px;
  border-radius:16px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:14px;
  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(30px);
  border:1px solid rgba(255,255,255,0.06);
  transition:0.2s;
}

.list div:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,0.06);
}

/* CHIP */
.label{
  font-size:11px;
  color:rgba(160,170,210,0.7);
  margin:10px 0 6px;
}

.chip-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.chip{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  font-size:12px;
  transition:0.2s;
}

.chip.active{
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
}

/* DETAIL */
#detailPage{ display:none; }

.card{
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(35px);
  border:1px solid rgba(255,255,255,0.06);
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

.smallBtn{
  width:100%;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* hidden */
.hidden{ display:none; }
</style>
</head>

<body>

<div class="container">

<h1>来客名簿</h1>

<div id="listPage" class="list"></div>

<!-- 詳細 -->
<div id="detailPage">
<div class="card">

<input id="date" placeholder="日付">
<input id="cast" placeholder="キャスト">
<input id="price" placeholder="金額">

<!-- 時間 -->
<div class="label">時間</div>
<div class="chip-group" id="timeGroup"></div>

<!-- コース -->
<div class="label">コース</div>
<div class="chip-group">
<button class="chip" onclick="setChip('course','60分',this)">60分</button>
<button class="chip" onclick="setChip('course','75分',this)">75分</button>
<button class="chip" onclick="setChip('course','90分',this)">90分</button>
<button class="chip" onclick="setChip('course','120分',this)">120分</button>
<button class="chip" onclick="setChip('course','極液',this)">極液</button>
</div>

<!-- 顧客区分 -->
<div class="label">顧客区分</div>
<div class="chip-group">
<button class="chip" onclick="setCountry('日本',this)">日本</button>
<button class="chip" onclick="setCountry('海外',this)">海外</button>
</div>

<div id="countrySelectBox" class="hidden">
<select id="countrySelect">
<option>香港</option>
<option>台湾</option>
<option>韓国</option>
<option>中国</option>
<option>オーストラリア</option>
<option>その他</option>
</select>
</div>

<!-- 区分 -->
<div class="label">区分</div>
<div class="chip-group">
<button class="chip" onclick="setChip('type','新規',this)">新規</button>
<button class="chip" onclick="setChip('type','再来',this)">再来</button>
</div>

<!-- 指名 -->
<div class="label">指名</div>
<div class="chip-group">
<button class="chip" onclick="setChip('shimei','フリー',this)">フリー</button>
<button class="chip" onclick="setChip('shimei','NET',this)">NET</button>
<button class="chip" onclick="setChip('shimei','P',this)">P</button>
<button class="chip" onclick="setChip('shimei','リピ',this)">リピ</button>
</div>

<!-- オプション -->
<div class="label">オプション</div>
<div class="chip-group">
<button class="chip" onclick="toggleOp('AN',this)">AN</button>
<button class="chip" onclick="toggleOp('SL',this)">SL</button>
<button class="chip" onclick="toggleOp('NL',this)">NL</button>
<button class="chip" onclick="toggleOp('K',this)">K</button>
<button class="chip" onclick="toggleOp('CP',this)">CP</button>
</div>

<button class="smallBtn" onclick="save()">保存</button>
<button class="smallBtn" onclick="back()">戻る</button>

</div>
</div>

</div>

<div class="fab" onclick="add()">＋</div>

<script>

let records = JSON.parse(localStorage.getItem("records") || "[]");

let form = {
  time:"",
  course:"",
  country:"日本",
  type:"",
  shimei:"",
  op:[]
};

/* ===== 時間チップ生成 ===== */
function createTimeChips(){
  const group = document.getElementById("timeGroup");
  for(let i=8;i<=23;i++){
    const btn = document.createElement("button");
    btn.className="chip";
    btn.innerText=i+"時";
    btn.onclick=()=>setChip("time",i,btn);
    group.appendChild(btn);
  }
}

/* ===== 画面切替 ===== */
function add(){
  document.getElementById("listPage").style.display="none";
  document.getElementById("detailPage").style.display="block";
}

function back(){
  document.getElementById("listPage").style.display="block";
  document.getElementById("detailPage").style.display="none";
}

/* ===== チップ ===== */
function setChip(type,value,el){
  form[type]=value;
  const group=el.parentNode;
  group.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

function setCountry(val,el){
  form.country=val;

  document.querySelectorAll(".chip-group .chip").forEach(c=>{
    if(c.innerText==="日本"||c.innerText==="海外"){
      c.classList.remove("active");
    }
  });

  el.classList.add("active");

  const box=document.getElementById("countrySelectBox");
  if(val==="海外"){
    box.classList.remove("hidden");
  }else{
    box.classList.add("hidden");
  }
}

function toggleOp(val,el){
  if(form.op.includes(val)){
    form.op=form.op.filter(v=>v!==val);
    el.classList.remove("active");
  }else{
    form.op.push(val);
    el.classList.add("active");
  }
}

/* ===== 保存 ===== */
function save(){
  const record={
    date:document.getElementById("date").value,
    cast:document.getElementById("cast").value,
    price:document.getElementById("price").value,
    time:form.time,
    course:form.course,
    country:form.country,
    type:form.type,
    shimei:form.shimei,
    op:form.op
  };

  records.push(record);
  localStorage.setItem("records",JSON.stringify(records));

  back();
  render();
}

/* ===== 描画 ===== */
function render(){
  const list=document.getElementById("listPage");
  list.innerHTML="";

  records.slice().reverse().forEach(r=>{
    const div=document.createElement("div");

    div.innerHTML=`
    <div style="display:flex; width:100%; align-items:center;">
      <div style="width:60px;">${r.date}</div>
      <div style="width:70px;">${r.course}</div>
      <div style="width:60px;">${r.shimei}</div>
      <div style="flex:1;">${r.cast}</div>
      <div style="margin-left:auto; font-weight:600;
      background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;">
      ${Number(r.price).toLocaleString()}円
      </div>
    </div>
    `;

    list.appendChild(div);
  });
}

/* ===== 初期化 ===== */
createTimeChips();
render();

</script>

</body>
</html>
