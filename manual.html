<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Meiryo", sans-serif;
background:#000;
color:#f5f5f7;
overflow-x:hidden;
}

/* ===== 空間背景 ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 10%, rgba(255,255,255,0.07), transparent 45%),
radial-gradient(circle at 80% 70%, rgba(120,180,255,0.05), transparent 50%);
filter: blur(18px);
pointer-events:none;
}

/* ===== ヘッダー ===== */
header{
position:fixed;
top:22px;
width:100%;
text-align:center;
font-size:13px;
letter-spacing:4px;
color:rgba(255,255,255,0.6);
}

/* ===== コンテナ（中央基準） ===== */
.container{
padding:90px 14px 120px;
max-width:900px;
margin:0 auto;

display:flex;
flex-direction:column;
align-items:center;
}

/* ===== グリッド（完全中央） ===== */
.grid{
display:grid;
grid-template-columns: repeat(2, minmax(140px, 220px));
gap:10px;

justify-content:center;
}

/* ===== 横長カード（業務向け） ===== */
.card{
height:72px;
padding:12px 14px;

display:flex;
align-items:center;
justify-content:flex-start;

background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.10);
border-radius:16px;

cursor:pointer;
transition:0.25s;

backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);

box-shadow:
0 18px 50px rgba(0,0,0,0.65),
inset 0 1px 0 rgba(255,255,255,0.06);
}

.card:hover{
transform:translateY(-2px);
border-color:rgba(255,255,255,0.18);
}

.card:active{
transform:scale(0.98);
}

.title{
font-size:13px;
font-weight:500;
color:rgba(255,255,255,0.85);
}

/* ===== ブログセクション ===== */
.section-title{
margin:26px 4px 10px;
font-size:11px;
color:rgba(255,255,255,0.45);
letter-spacing:3px;
text-align:center;
width:100%;
}

/* 横スクロール */
.row{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:8px;
justify-content:center;
width:100%;
}

.row::-webkit-scrollbar{
display:none;
}

/* ブログカード */
.small-card{
min-width:140px;
height:60px;
padding:10px 12px;

display:flex;
align-items:center;
justify-content:center;

border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.10);

cursor:pointer;
backdrop-filter: blur(14px);
transition:0.2s;
}

.small-card:active{
transform:scale(0.97);
}

.small-title{
font-size:12px;
color:rgba(255,255,255,0.75);
}

/* ===== 戻るボタン ===== */
.back{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

padding:12px 18px;
border-radius:999px;

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);

backdrop-filter: blur(18px);
color:#fff;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
MANUAL
</header>

<div class="container">

<!-- ===== 2列メイン ===== -->
<div class="grid">

<div class="card" onclick="go('room.html')">
<div class="title">部屋セット</div>
</div>

<div class="card" onclick="go('open.html')">
<div class="title">開店準備</div>
</div>

<div class="card" onclick="go('chat.html')">
<div class="title">チャット予約</div>
</div>

<div class="card" onclick="go('mail.html')">
<div class="title">メルマガ予約</div>
</div>

<div class="card" onclick="go('site.html')">
<div class="title">サイト更新</div>
</div>

<div class="card" onclick="go('girl.html')">
<div class="title">女の子出勤対応</div>
</div>

<div class="card" onclick="go('visit.html')">
<div class="title">お客様来店</div>
</div>

<div class="card" onclick="go('guide.html')">
<div class="title">お客様案内</div>
</div>

</div>

<!-- ===== BLOG ===== -->
<div class="section-title">BLOG SYSTEM</div>

<div class="row">

<div class="small-card" onclick="go('heaven.html')">
<div class="small-title">ガールズヘブン</div>
</div>

<div class="small-card" onclick="go('vanilla.html')">
<div class="small-title">バニラ</div>
</div>

<div class="small-card" onclick="go('cocoa.html')">
<div class="small-title">ココア</div>
</div>

</div>

</div>

<!-- 戻る -->
<div class="back" onclick="go('top.html')">
← HOME
</div>

<script>
function go(url){
window.location.href = url;
}
</script>

</body>
</html>
