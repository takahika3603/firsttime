<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Vision OS</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans";

  /* ■ OS空間背景（完全ダークレイヤー） */
  background:
    radial-gradient(circle at 50% 0%, rgba(18,22,35,0.9), transparent 60%),
    radial-gradient(circle at 80% 30%, rgba(10,12,25,0.8), transparent 65%),
    radial-gradient(circle at 20% 100%, rgba(5,8,18,1), #02030a 70%);

  color:#d7dbe6;
  -webkit-font-smoothing:antialiased;
}

/* HEADER（OSステータス領域） */
header{
  padding:28px 18px 14px;
}

h1{
  margin:0;
  font-size:20px;
  font-weight:500;
  letter-spacing:0.3px;
}

.sub{
  font-size:12px;
  opacity:0.35;
  margin-top:6px;
}

/* SPACE LAYER */
.space{
  padding:10px 14px 40px;
  display:flex;
  flex-direction:column;
  gap:16px;

  perspective:1200px; /* 空間の深さ */
}

/* ■ FLOATING CARD（OSウィンドウ） */
.window{
  padding:18px;
  border-radius:24px;

  background:rgba(16,18,26,0.72);

  border:1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 25px 80px rgba(0,0,0,0.65),
    inset 0 1px 0 rgba(255,255,255,0.03);

  backdrop-filter: blur(24px);

  transform: translateZ(0);

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

/* ■ “空間押し込み” */
.window:active{
  transform:
    scale(0.97)
    translateY(8px)
    translateZ(-60px);

  background:rgba(12,14,20,0.85);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.7);
}

/* TITLE */
.title{
  font-size:15px;
  font-weight:500;
  color:#e6eaf2;
}

/* DESC */
.desc{
  font-size:12px;
  opacity:0.35;
  margin-top:6px;
}

/* STATUS DOT */
.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
  opacity:0.5;
}

.blue{ background:#6b7a90; }
.orange{ background:#907a6b; }
.purple{ background:#7a6b90; }
.green{ background:#6b9080; }

/* SECTION LABEL */
.section{
  font-size:11px;
  opacity:0.4;
  margin:6px 2px -6px;
  letter-spacing:0.5px;
}

</style>
</head>

<body>

<header>
  <h1>Vision OS</h1>
  <div class="sub">spatial operating system</div>
</header>

<div class="space">

  <div class="section">CORE SYSTEM</div>

  <div class="window" onclick="location.href='manual.html'">
    <div class="title"><span class="dot blue"></span>マニュアル</div>
    <div class="desc">システム理解・構造・操作定義</div>
  </div>

  <div class="section">ANALYTICS</div>

  <div class="window" onclick="location.href='badskill.html'">
    <div class="title"><span class="dot orange"></span>苦手分野</div>
    <div class="desc">弱点・ミス・再発・危険領域</div>
  </div>

  <div class="window" onclick="location.href='index.html'">
    <div class="title"><span class="dot purple"></span>進捗管理</div>
    <div class="desc">成長・履歴・達成ログ</div>
  </div>

  <div class="section">BUSINESS</div>

  <div class="window" onclick="location.href='kanri.html'">
    <div class="title"><span class="dot green"></span>売上管理</div>
    <div class="desc">成果・数字・パフォーマンス</div>
  </div>

</div>

</body>
</html>
