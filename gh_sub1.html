<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision CMS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo",sans-serif;
  background:#05070c;
  color:#fff;
  overflow-x:hidden;
}

/* ===== コンテナ ===== */
.container{
  max-width:600px;
  margin:0 auto;
  padding:40px 16px 120px;
  text-align:center;
}

h1{
  font-size:12px;
  letter-spacing:4px;
  opacity:0.5;
}

/* ===== グラフ ===== */
canvas{
  max-width:260px;
  margin:20px auto;
}

/* ===== ボタン ===== */
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin:20px 0;
}

button{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
}

button.active{
  background:#fff;
  color:#000;
}

/* ===== リスト ===== */
.list{
  text-align:left;
  margin-top:20px;
}

/* ★アイテム全体 */
.item{
  position:relative;
  overflow:hidden;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:0.2s;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ★タイトル（左） */
.item span:first-child{
  font-size:13px;
  font-weight:500;
  color:#ffffff;
}

/* ★カテゴリ（右：弱表示） */
.item span:last-child{
  font-size:10px;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.5px;
  white-space:nowrap;
}

/* swipe */
.item.swiping{
  background:rgba(255,0,0,0.2);
  transform:scale(1.02);
}

.item.delete{
  transform:scale(0.7);
  opacity:0;
  transition:0.25s;
}

/* ===== FAB ===== */
.fab{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 20px;
  border-radius:999px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  cursor:pointer;
}

/* ===== ナビ ===== */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;
  backdrop-filter:blur(20px);
}

.nav-btn{
  padding:10px 16px;
  font-size:12px;
  cursor:pointer;
}

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal-box{
  width:300px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.15);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.modal-actions{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h1>VISION CMS</h1>

<canvas id="donut"></canvas>

<div class="buttons" id="buttons"></div>

<div class="list" id="list"></div>

</div>

<!-- 追加ボタン -->
<div class="fab" onclick="openModal()">＋ 追加</div>

<!-- ナビ -->
<div class="nav">
  <div class="nav-btn" onclick="location.href='top.html'">TOP</div>
  <div class="nav-btn" onclick="location.href='manual.html'">MANUAL</div>
</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>記事追加</h3>

    <input id="title" placeholder="タイトル">

    <select id="category">
      <option>お給料</option>
      <option>スタッフ</option>
      <option>お店の環境</option>
      <option>うれしい待遇</option>
      <option>お客様層</option>
      <option>採用条件</option>
      <option>お仕事内容</option>
      <option>お店のつぶやき</option>
    </select>

    <div class="modal-actions">
      <button onclick="closeModal()">戻る</button>
      <button onclick="addArticle()">完了</button>
    </div>
  </div>
</div>

<script>

/* ===== STORAGE ===== */
const STORAGE_KEY = "vision_cms_articles";

/* ===== DATA ===== */
const categories = [
  "お給料","スタッフ","お店の環境","うれしい待遇",
  "お客様層","採用条件","お仕事内容","お店のつぶやき"
];

let articles = [];
let current = "全体";
let chart;

/* ===== LOAD ===== */
function loadArticles(){
  const data = localStorage.getItem(STORAGE_KEY);

  if(data){
    articles = JSON.parse(data);
  }else{
    articles = [
      {title:"給与制度説明",category:"お給料"},
      {title:"スタッフ教育",category:"スタッフ"},
      {title:"店内環境改善",category:"お店の環境"}
    ];
  }
}

/* ===== SAVE ===== */
function saveArticles(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));
}

/* ===== CHART ===== */
function renderChart(){
  const data = categories.map(c =>
    articles.filter(a => a.category === c).length
  );

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("donut"),{
    type:"doughnut",
    data:{
      labels:categories,
      datasets:[{
        data:data,
        backgroundColor:categories.map(c =>
          c===current
            ? "rgba(255,255,255,0.9)"
            : "rgba(255,255,255,0.1)"
        )
      }]
    },
    options:{
      plugins:{ legend:{display:false} }
    }
  });
}

/* ===== BUTTONS ===== */
function renderButtons(){
  const el=document.getElementById("buttons");

  el.innerHTML=`<button onclick="filterAll()" class="${current==='全体'?'active':''}">全体</button>`;

  categories.forEach(c=>{
    el.innerHTML+=`
      <button onclick="filter('${c}')" class="${current===c?'active':''}">
        ${c}
      </button>`;
  });
}

/* ===== LIST ===== */
function renderList(){
  const el=document.getElementById("list");

  const filtered=current==="全体"
    ? articles
    : articles.filter(a=>a.category===current);

  el.innerHTML=filtered.map(a=>{
    const realIndex=articles.indexOf(a);

    return `
      <div class="item"
        data-id="${realIndex}"
        ontouchstart="touchStart(event)"
        ontouchmove="touchMove(event)"
        ontouchend="touchEnd(event)">

        <span>${a.title}</span>
        <span>${a.category}</span>

      </div>
    `;
  }).join("");
}

/* ===== FILTER ===== */
function filter(c){current=c;update();}
function filterAll(){current="全体";update();}

/* ===== MODAL ===== */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ===== ADD ===== */
function addArticle(){
  const title=document.getElementById("title").value;
  const category=document.getElementById("category").value;

  if(!title) return;

  articles.unshift({title,category});

  document.getElementById("title").value="";

  saveArticles();
  closeModal();
  update();
}

/* ===== SWIPE DELETE ===== */
let startX=0;
let currentEl=null;

function touchStart(e){
  startX=e.touches[0].clientX;
  currentEl=e.currentTarget;
}

function touchMove(e){
  let diff=e.touches[0].clientX-startX;
  if(diff<-30) currentEl.classList.add("swiping");
}

function touchEnd(e){
  let diff=e.changedTouches[0].clientX-startX;

  if(diff<-80){
    const index=currentEl.dataset.id;

    currentEl.classList.add("delete");

    setTimeout(()=>{
      articles.splice(index,1);
      saveArticles();
      update();
    },200);

  }else{
    currentEl.classList.remove("swiping");
  }
}

/* ===== UPDATE ===== */
function update(){
  renderButtons();
  renderChart();
  renderList();
}

/* ===== INIT ===== */
loadArticles();
update();

</script>

</body>
</html>
