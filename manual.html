<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Meiryo";

  /* ■ 深い空間背景 */
  background:
    radial-gradient(circle at 20% 10%, rgba(10,12,18,0.9), transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(5,6,10,0.85), transparent 60%),
    radial-gradient(circle at 50% 120%, rgba(0,0,0,1), #02030a 70%);

  color:#d6dbe6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ■ 空間ノイズ（超微細レイヤー） */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03), transparent 60%),
    radial-gradient(circle at 70% 80%, rgba(120,140,180,0.02), transparent 65%);
  pointer-events:none;
}

/* ■ HEADER */
header{
  position:fixed;
  top:22px;
  width:100%;
  text-align:center;
  font-size:12px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.4);
}

/* ■ CONTAINER */
.container{
  padding:90px 14px 120px;
  max-width:900px;
  margin:0 auto;

  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ■ GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(140px, 1fr));
  gap:10px;
  width:100%;
  max-width:520px;

  perspective:1200px; /* 空間奥行き */
}

/* ■ CARD（完全空間UI） */
.card{
  height:72px;
  padding:12px 14px;

  display:flex;
  align-items:center;

  background:rgba(14,16,22,0.72);

  border-radius:16px;

  /* ■ 枠＝空気の境界 */
  border:1px solid rgba(255,255,255,0.05);

  /* ■ 浮遊＋内側構造 */
  box-shadow:
    0 18px 50px rgba(0,0,0,0.75),
    0 0 0 1px rgba(255,255,255,0.02),
    inset 0 1px 0 rgba(255,255,255,0.03),
    inset 0 -1px 0 rgba(0,0,0,0.4);

  backdrop-filter: blur(18px);

  transition:0.22s ease;

  will-change: transform;
}

/* ■ ホバー（軽く浮く） */
.card:hover{
  transform:translateY(-2px);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 25px 60px rgba(0,0,0,0.8),
    0 0 0 1px rgba(255,255,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* ■ 押圧（沈む） */
.card:active{
  transform:scale(0.965) translateY(6px);

  background:rgba(10,12,18,0.85);

  border:1px solid rgba(255,255,255,0.03);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.9),
    inset 0 2px 8px rgba(0,0,0,0.5);
}

/* ■ TEXT */
.title{
  font-size:13px;
  font-weight:500;
  color:#e1e6ef;
}

/* ■ SECTION */
.section-title{
  margin:26px 0 10px;
  font-size:11px;
  letter-spacing:3px;
  color:rgba(255,255,255,0.3);
  text-align:center;
  width:100%;
}

/* ■ ROW */
.row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  width:100%;
  justify-content:center;
  padding-bottom:8px;
}

.row::-webkit-scrollbar{
  display:none;
}

/* ■ SMALL CARD */
.small-card{
  min-width:140px;
  height:60px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:14px;

  background:rgba(14,16,22,0.7);
  border:1px solid rgba(255,255,255,0.04);

  backdrop-filter: blur(16px);

  box-shadow:0 14px 40px rgba(0,0,0,0.65);

  transition:0.2s ease;
}

.small-card:active{
  transform:scale(0.97);
}

.small-title{
  font-size:12px;
  color:rgba(255,255,255,0.7);
}

/* ■ BACK BUTTON */
.back{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);

  padding:12px 18px;
  border-radius:999px;

  background:rgba(14,16,22,0.75);
  border:1px solid rgba(255,255,255,0.06);

  backdrop-filter: blur(18px);

  color:#e1e6ef;
  font-size:12px;

  box-shadow:0 20px 50px rgba(0,0,0,0.6);

  cursor:pointer;
}

</style>
</head>

<body>

<header>MANUAL</header>

<div class="container">

<div class="grid">

<div class="card" onclick="go('manual_sub1.html')">
<div class="title">部屋セット</div>
</div>

<div class="card" onclick="go('open.html')">

</div>

<div class="card" onclick="go('manual_sub2.html')">

<div class="card" onclick="go('manual_sub4.html')">

</div>

<div class="card" onclick="go('site.html')">

</div>

<div class="card" onclick="go('girl.html')">
<div class="title">女の子出勤対応</div>
</div>

<div class="card" onclick="go('visit.html')">
<div class="title">お客様来店</div>
</div>

<div class="card" onclick="go('manual_sub3.html')">
<div class="title">部屋繋ぎ</div>
</div>

</div>

<div class="section-title">ブログシステム</div>

<div class="row">

<div class="small-card" onclick="go('gh_main.html')">

</div>

<div class="small-title">バニラ</div>
</div>

<div class="small-card" onclick="go('cocoa.html')">
<div class="small-title">ココア</div>
</div>

</div>

</div>

<div class="back" onclick="go('top.html')">
← ホームへ戻る
</div>

<script>
function go(url){
  window.location.href = url;
}
</script>

</body>
</html>
