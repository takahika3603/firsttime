<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#0f1117;
  color:white;
}

.container{
  padding:16px;
}

h1{
  font-size:20px;
  margin-bottom:10px;
}

.button{
  padding:10px;
  border-radius:12px;
  border:none;
  background:#1a1d26;
  color:white;
  margin-bottom:10px;
}

/* LIST */
.list > div{
  padding:12px 14px;
  border-radius:16px;
  margin-bottom:8px;

  width:100%;                 /* ←これ追加 */
  box-sizing:border-box;      /* ←これ追加 */

  display:flex;
  align-items:center;
  gap:14px;

  font-size:12px;  /* ←これ */

  background:rgba(255,255,255,0.03);
}

.list > div:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,0.06);
}

/* CHIP */
.label{
  font-size:11px;
  color:rgba(160,170,210,0.7);
  margin:10px 0 6px;
}

.chip-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.chip{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  font-size:12px;
  transition:0.2s;
}

.chip.active{
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
}
.bikou{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  font-size:12px;
}
.bikou.active{
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
}
/* DETAIL */
#detailPage{ display:none; }

.card{
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(35px);
  border:1px solid rgba(255,255,255,0.06);
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

.smallBtn{
  width:100%;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* hidden */
.hidden{ display:none; }
  /* ナビボタン全体 */
.nav-buttons{
  position:fixed;
  bottom:20px;   /* ＋ボタンと同じ高さ */
  right:90px;    /* ←＋ボタンの左にずらす */
  display:flex;
  flex-direction:row;
  gap:10px;
  z-index:999;
}

/* ボタン本体 */
.nav-btn{
  padding:10px 14px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-size:12px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(20px);

  transition:0.2s;
}

/* ホバー（浮く感じ） */
.nav-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  border:1px solid transparent;
}
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  padding:16px 0;
}

.menuBtn{
  position:absolute;
  right:20px;
  font-size:22px;
  cursor:pointer;
}

.menu{
  position:fixed;
  top:70px;
  right:20px;
  width:240px;

.menuItem{

.menuSubItem{

.subMenu{

.subMenu.open{

.hidden{

.dashboardCard{

.dashboardCard:hover{

</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTwjQIjolOfaBUNqtzwBTIGKMbUN51e_Y",
  authDomain: "luxuryspa-fuga.firebaseapp.com",
  projectId: "luxuryspa-fuga",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ★ここ重要（下のJSで使うため）
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;
window.updateDoc = updateDoc;
</script>
<script>
const castList = [
"あめり","かえで","かりん","はるか","すい","せれん","ましろ","みおり",
"なな","のぞみ","おとは","りこ","ゆあ","ゆず","さあや","きょうか",
"みみ","あむ","そら","ゆん","まりか","うい","えま","りん","みわ",
"みれい","なつき","みお","しおり","みすず","まき","ゆいか","みおん",
"なぎ","ふうか","せいら","れいあ","らな",
"さくら","めい",
"みこと","りの","はつね","かえ","うる","くるみ","ゆき","なずな","ひかる",
"りか","えみり","れい","あやか","かりな","いよ","あみ","ここな","まこ",
"かれん","みさき","かおり","つむぎ","れな","くみ","りあ","みゆき","うみ",
"もも","しおん","あまね","まりあ","のん","える","まみ","ひなた","うづき",
"るきあ","しの","ちあき","ここ","みく","とうか","いと"
];
let records = [];
let allRecords = [];
let todayCasts = [];

async function loadAttendance(){
  const today = new Date().toISOString().slice(0,10);

  const snap = await getDocs(collection(window.db, "attendance"));

  todayCasts = [];

  snap.forEach(doc => {
    const data = doc.data();

    if(data.date === today){
      todayCasts = data.casts || [];
    }
  });
}
function renderCastChips(){

  const box = document.getElementById("castChips");
  box.innerHTML = "";

  todayCasts.forEach(c => {

    const btn = document.createElement("button");
    btn.className = "chip";
    btn.innerText = `${c.name} ${c.start}-${c.end}`;

    btn.onclick = () => {
      document.getElementById("cast").value = c.name;
    };

    box.appendChild(btn);
  });
}
let form = {
  course:"",
  country:"日本",
  countryDetail:"",
  type:"",
  shimei:"",
  visitType:"",
  op:[],
  bikou:[],
  route:"",
  extra:[]
};
window.addEventListener("load", function(){

  document.getElementById("countrySelect")
    .addEventListener("change", function(){
      form.countryDetail = this.value;
    });

});
let editIndex = null;

const coursePriceMap = {
  "30分": 8000,
  "45分": 12000,
  "60分": 14000,
  "75分": 18000,
  "90分": 22000,
  "120分": 30000,
  "極液": 28000
};
const optionPriceMap = {
  "AN": 3000,
  "SL": 2000,
  "NL": 3000,
  "K": 1000,
  "CP": 1000
};
function isNightOrWeekend(){

  const now = new Date();
  const day = now.getDay(); // 0=日曜
  const hour = now.getHours();

  const isWeekend = (day === 0 || day === 6);
  const isNight = (hour >= 21);

  return isWeekend || isNight;
}
function recalcPrice(){

  let total = 0;

  // ③ 指名料金
// ① コース
let coursePrice = coursePriceMap[form.course] || 0;

// ② 深夜
let nightFee = 0;
if(form.course && form.course !== "30分" && form.course !== "45分"){
  if(isNightOrWeekend()){
    nightFee = 1000;
  }
}

// ③ 指名
let shimeiFee = 0;
if(form.shimei === "NET" || form.shimei === "P"){
  shimeiFee = 2000;
}
if(form.shimei === "リピ"){
  shimeiFee = 3000;
}
if(form.bikou.includes("クーポン")){
  shimeiFee = 0;
}
// ★追加オプション割引（備考）
let bikouDiscount = 0;

if(form.bikou.includes("ぴゅあらば")){
  bikouDiscount -= 1000;
}

if(form.bikou.includes("マンステ")){
  bikouDiscount -= 1000;
}
if(form.bikou.includes("口コミ")){
  bikouDiscount -= 1000;
}
// 合計に追加
total += coursePrice + nightFee + shimeiFee + bikouDiscount;
// オプション加算
form.op.forEach(op=>{
  total += optionPriceMap[op] || 0;
});
// ★クレカ
if(form.bikou.includes("クレカ")){
  const base = coursePrice + nightFee + shimeiFee;
  total += Math.floor(base * 0.15);
}

  // 最低0円制御（保険）
  if(total < 0) total = 0;

  // ※追加オプションは除外（既存のtoggleExtraで処理）

  document.getElementById("price").value = total;
}
/* ===== 画面切替 ===== */
function add(){
form = {
  time:"",
  course:"",
  country:"日本",
  type:"",
  shimei:"",
  visitType:"",
  op:[],
  bikou:[],
  route:"",
  extra:[]// ←これ追加
};

  editIndex = null;
document.getElementById("deleteBtn").style.display = "none";
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  document.getElementById("countrySelectBox").classList.add("hidden");
  document.getElementById("cast").value = "";
document.getElementById("price").value = "";
  // ↓ここ追加（今日の日付を自動入力）
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');

  document.getElementById("date").value = `${yyyy}-${mm}-${dd}`;
  // ↑ここまで追加

  const detailPage = document.getElementById("detailPage");
  document.getElementById("listPage").style.display="none";
document.getElementById("detailPage").style.display="block";
}

function back(){
  document.getElementById("listPage").style.display="block";
  document.getElementById("detailPage").style.display="none";
  document.getElementById("deleteBtn").style.display = "none";
}
document.getElementById("cast").addEventListener("input", function(){

  const val = this.value.trim();

  if(!val){
    document.getElementById("suggestBox").innerHTML = "";
    return;
  }

  // ★ 頭文字優先＋部分一致
  const result = castList
    .filter(name => name.startsWith(val))
    .concat(
      castList.filter(name =>
        !name.startsWith(val) && name.includes(val)
      )
    );

  renderSuggest(result);
});
function renderSuggest(list){

  const box = document.getElementById("suggestBox");
  box.innerHTML = "";

  list.slice(0,10).forEach(name => {

    const btn = document.createElement("button");
    btn.className = "chip";
    btn.innerText = name;

    btn.onclick = () => {
      document.getElementById("cast").value = name;
      box.innerHTML = "";
    };

    box.appendChild(btn);
  });
}
/* ===== チップ ===== */

  const group=el.parentNode;
  group.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  // ★これ追加（超重要）
  recalcPrice();
}
function setCoursePrice(course, el){
  form.course = course;

document.querySelectorAll(".chip").forEach(c=>{
  if(c.parentNode === el.parentNode){
    c.classList.remove("active");
  }
});

el.classList.add("active");
recalcPrice(); // ←ここで1回だけ

}
function setCountry(val,el){
  form.country = val;

  document.querySelectorAll(".chip-group .chip").forEach(c=>{
    if(c.innerText==="日本" || c.innerText==="海外"){
      c.classList.remove("active");
    }
  });

  el.classList.add("active");

  const box = document.getElementById("countrySelectBox");
  const route = document.getElementById("routeBox");

  if(val === "海外"){
    box.classList.remove("hidden");
    route.classList.remove("hidden");
  }else{
    box.classList.add("hidden");
    route.classList.add("hidden");

    form.countryDetail = ""; // ★リセット
    form.route = "";         // ★リセット
  }
}

function toggleOp(val,el){

  const input = document.getElementById("price");
  let current = Number(input.value) || 0;

  const price = optionPriceMap[val] || 0;

  if(form.op.includes(val)){
    // OFF（引く）
    form.op = form.op.filter(v=>v!==val);
    current -= price;
    el.classList.remove("active");
  }else{
    // ON（足す）
    form.op.push(val);
    current += price;
    el.classList.add("active");
  }

  input.value = current;
}

function toggleBikou(val,el){
  if(form.bikou.includes(val)){
    form.bikou = form.bikou.filter(v=>v!==val);
    el.classList.remove("active");
  }else{
    form.bikou.push(val);
    el.classList.add("active");
  }

  recalcPrice(); // ←これ絶対必要
}

function toggleExtra(name, price, el){

  const input = document.getElementById("price");
  let current = Number(input.value) || 0;

  if(form.extra.includes(name)){
    // OFF（引く）
    form.extra = form.extra.filter(v=>v!==name);
    current -= price;
    el.classList.remove("active");
  }else{
    // ON（足す）
    form.extra.push(name);
    current += price;
    el.classList.add("active");
  }

  input.value = current;
}
/* ===== 保存 ===== */
let isSaving = false;

async function save(){

  if(isSaving) return;
  isSaving = true;

  try {

    const record = {
      date: document.getElementById("date").value,
      cast: document.getElementById("cast").value,
      price: Number(document.getElementById("price").value),

       course: form.course, 
      country: form.country,
      countryDetail: form.countryDetail,
      route: form.route,

      type: form.type,
      shimei: form.shimei,
      visitType: form.visitType,
      op: form.op,
      bikou: form.bikou,
      extra: form.extra,
      createdAt: Date.now(),
    };

    const attendanceRecord = {
      date: record.date,
      cast: record.cast,
      createdAt: Date.now()
    };

    // ===== 更新モード =====
    if(editIndex !== null && editIndex !== undefined){

      await updateDoc(
        doc(window.db, "records", editIndex),
        record
      );

    }else{

      // ===== 新規 =====
      await addDoc(
        collection(window.db, "records"),
        record
      );

      await addDoc(
        collection(window.db, "attendance"),
        attendanceRecord
      );
    }

    await render();
    back(); // ←成功した時だけ閉じる

  } catch (error) {

    console.log("保存エラー:", error);
    alert("保存に失敗しました");

  } finally {

    isSaving = false;

  }
}
async function deleteRecord(){

  if(editIndex === null){
    alert("削除対象がありません");
    return;
  }

  if(confirm("このデータを削除しますか？")){

    try {

      await deleteDoc(
        doc(window.db, "records", editIndex)
      );

      alert("削除しました");

      // ★重要：状態リセット
      editIndex = null;
      form = {
        time:"",
        course:"",
        country:"日本",
        type:"",
        shimei:"",
        op:[],
        bikou:[],
        route:"",
        extra:[]
      };

      back();
      render();

    } catch (e) {
      console.log(e);
      alert("削除失敗");
    }

  }
}
function editRecord(r){

  // 🔥 ここが超重要（FirestoreのID）
  editIndex = r.id;

  document.getElementById("deleteBtn").style.display = "block";

  document.getElementById("date").value = r.date || "";
  document.getElementById("cast").value = r.cast || "";
  document.getElementById("price").value = r.price || "";

  form.time = r.time;
  form.course = r.course;
  form.country = r.country || "日本";
  form.type = r.type;
  form.shimei = r.shimei;
  form.visitType = r.visitType;
  form.op = r.op || [];
  form.bikou = r.bikou || [];
  form.route = r.route || "";
  form.extra = r.extra || [];

  document.getElementById("listPage").style.display="none";
  document.getElementById("detailPage").style.display="block";

  reflectChips();
}
  function reflectChips(){
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));

  document.querySelectorAll(".chip").forEach(c=>{
    if(c.innerText == form.course) c.classList.add("active");
    if(c.innerText == form.shimei) c.classList.add("active");
    if(c.innerText == form.type) c.classList.add("active");
    if(c.innerText == form.time+"時") c.classList.add("active");
    if(c.innerText == form.visitType) c.classList.add("active");
    

    if(form.country == "日本" && c.innerText=="日本") c.classList.add("active");
    if(form.country == "海外" && c.innerText=="海外") c.classList.add("active");
if(c.classList.contains("bikou") && form.bikou.includes(c.innerText)){
  c.classList.add("active");
}
if(c.innerText == form.route) c.classList.add("active");
    if(form.op.includes(c.innerText)) c.classList.add("active");
         // 追加オプション反映
if(form.extra && form.extra.includes(c.innerText.replace(/ [+-].*/,""))){
  c.classList.add("active");
}
  });
 
  if(form.country==="海外"){
    document.getElementById("countrySelectBox").classList.remove("hidden");
    document.getElementById("routeBox").classList.remove("hidden");
  }else{
    document.getElementById("countrySelectBox").classList.add("hidden");
    document.getElementById("routeBox").classList.add("hidden");
  }
}

  
/* ===== 描画 ===== */
function filterData(){

  const month = document.getElementById("monthFilter").value;
  const date = document.getElementById("dateFilter").value;

  const filtered = allRecords.filter(r => {

    if(!r.date) return true;

    const matchMonth = month ? r.date.slice(5,7) === month : true;
    const matchDate = date ? r.date.slice(8,10) === date : true;

    return matchMonth && matchDate;
  });

  records = filtered;

  // ★ここ重要（renderじゃなくこれ）
  drawList(records);
}
async function render(){

  try {

    const snap = await getDocs(
      collection(window.db, "records")
    );

    let data = [];

    snap.forEach((doc) => {
      data.push({
        id: doc.id,
        ...doc.data()
      });
    });

    allRecords = data;

    // ★ここ変更（フィルターを必ず通す）
    filterData();

  } catch (error) {
    console.log(error);
  }
}
function drawList(data){

  const list = document.getElementById("listPage");
  list.innerHTML = "";

  // 日付順（古い→新しい）で並べる
const sorted = data
    .slice()
    .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0))
    .map((r, index) => ({
      ...r,
      number: index + 1
    }))
    .reverse();

  sorted.forEach((r) => {

      const div = document.createElement("div");

      div.innerHTML = `
<span style="display:flex; align-items:center; gap:8px; width:100%;">

<span style="width:28px; font-size:12px; font-weight:400;">
  ${r.number}
</span>

<span>
  ${r.type || ""}｜${r.cast || ""}｜${r.course || ""}｜${r.shimei || ""}
</span>

<span style="margin-left:auto; font-weight:600;">
  ${r.price ? Number(r.price).toLocaleString() + "円" : ""}
</span>

</span>
`;

      div.onclick = () => editRecord(r);
      list.appendChild(div);
    });

  updateKPI(data);
}

function saveFilterState(){
  const state = {
    month: document.getElementById("monthFilter").value,
    date: document.getElementById("dateFilter").value
  };
  localStorage.setItem("filterState", JSON.stringify(state));
}

function restoreFilterState(){
  const saved = JSON.parse(localStorage.getItem("filterState"));
  if(!saved) return;

  document.getElementById("monthFilter").value = saved.month || "";
  document.getElementById("dateFilter").value = saved.date || "";
}
