<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務ダッシュボード</title>

<style>
body{
margin:0;
font-family:"Meiryo", sans-serif;
background:#0f172a;
color:#fff;
}

/* 全体フォント強制統一 */
*{
font-family:"Meiryo", sans-serif;
}

/* ヘッダー */
header{
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
background:#111827;
}

/* コンテンツ */
.container{
display:flex;
flex-direction:column;
gap:16px;
padding:20px;
padding-bottom:90px; /* 下ナビ分余白 */
}

/* カード */
.card{
background:#1e293b;
padding:22px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:active{
transform:scale(0.98);
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.desc{
font-size:12px;
color:#94a3b8;
}

.tag{
margin-top:10px;
display:inline-block;
padding:4px 10px;
background:#22c55e;
border-radius:999px;
font-size:12px;
}

/* ===== 下ナビ（アプリ化の核心） ===== */
.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#111827;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #1f2937;
}

.nav-btn{
flex:1;
text-align:center;
font-size:12px;
cursor:pointer;
color:#94a3b8;
}

.nav-btn:active{
transform:scale(0.95);
}

.nav-btn strong{
display:block;
font-size:14px;
color:#fff;
}
</style>
</head>

<body>

<header>
業務ダッシュボード
</header>

<div class="container">

<div class="card" onclick="openPage('task.html')">
<div class="title">タスク管理</div>
<div class="desc">日々の行動・業務整理</div>
<div class="tag">TASK</div>
</div>

<div class="card" onclick="openPage('index.html')">
<div class="title">進捗管理</div>
<div class="desc">KPI・成果・営業進捗</div>
<div class="tag">KPI</div>
</div>

</div>

<!-- 下ナビ -->
<div class="nav">
<div class="nav-btn" onclick="openPage('top.html')">
<strong>🏠</strong>
ホーム
</div>

<div class="nav-btn" onclick="openPage('task.html')">
<strong>📋</strong>
タスク
</div>

<div class="nav-btn" onclick="openPage('index.html')">
<strong>📊</strong>
進捗
</div>
</div>

<script>
function openPage(url){
window.location.href = url;
}
</script>

</body>
</html>
