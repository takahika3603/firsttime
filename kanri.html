<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>来客名簿</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo";
  background:#0f1117;
  color:white;
}

.container{
  padding:16px;
}

h1{
  font-size:20px;
  margin-bottom:10px;
}

.button{
  padding:10px;
  border-radius:12px;
  border:none;
  background:#1a1d26;
  color:white;
  margin-bottom:10px;
}

/* LIST */
.list > div{
  padding:12px 14px;
  border-radius:16px;
  margin-bottom:8px;

  width:100%;                 /* ←これ追加 */
  box-sizing:border-box;      /* ←これ追加 */

  display:flex;
  align-items:center;
  gap:14px;

  font-size:12px;  /* ←これ */

  background:rgba(255,255,255,0.03);
}

.list > div:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,0.06);
}

/* CHIP */
.label{
  font-size:11px;
  color:rgba(160,170,210,0.7);
  margin:10px 0 6px;
}

.chip-group{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.chip{
  padding:9px 13px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.75);
  font-size:12px;
  transition:0.2s;
}

.chip.active{
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  color:white;
}

/* DETAIL */
#detailPage{ display:none; }

.card{
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(35px);
  border:1px solid rgba(255,255,255,0.06);
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

.smallBtn{
  width:100%;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

/* hidden */
.hidden{ display:none; }
  /* ナビボタン全体 */
.nav-buttons{
  position:fixed;
  bottom:20px;   /* ＋ボタンと同じ高さ */
  right:90px;    /* ←＋ボタンの左にずらす */
  display:flex;
  flex-direction:row;
  gap:10px;
  z-index:999;
}

/* ボタン本体 */
.nav-btn{
  padding:10px 14px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-size:12px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(20px);

  transition:0.2s;
}

/* ホバー（浮く感じ） */
.nav-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
  border:1px solid transparent;
}
</style>
</head>

<body>

<div class="container">

<h1>来客名簿</h1>
<div style="display:flex; gap:8px; margin-bottom:10px;">
<div id="listPage" class="list"></div>
  <!-- 月フィルター -->
  <select class="smallBtn" id="monthFilter" onchange="filterData()">
    <option value="">全ての月</option>
    <option value="01">1月</option>
    <option value="02">2月</option>
    <option value="03">3月</option>
    <option value="04">4月</option>
    <option value="05">5月</option>
    <option value="06">6月</option>
    <option value="07">7月</option>
    <option value="08">8月</option>
    <option value="09">9月</option>
    <option value="10">10月</option>
    <option value="11">11月</option>
    <option value="12">12月</option>
  </select>

  <!-- 日付フィルター -->
  <input type="date" class="smallBtn" id="dateFilter" onchange="filterData()">

</div>

<!-- 詳細 -->
<div id="detailPage">
<div class="card">

<input id="date" type="date">
<input id="cast" placeholder="キャスト">
<input id="price" placeholder="金額">

<!-- 時間 -->
<div class="label">時間</div>
<div class="chip-group" id="timeGroup"></div>

<!-- コース -->
<div class="label">コース</div>
<div class="chip-group">
<button class="chip" onclick="setChip('course','60分',this)">60分</button>
<button class="chip" onclick="setChip('course','75分',this)">75分</button>
<button class="chip" onclick="setChip('course','90分',this)">90分</button>
<button class="chip" onclick="setChip('course','120分',this)">120分</button>
<button class="chip" onclick="setChip('course','極液',this)">極液</button>
</div>

<!-- 顧客区分 -->
<div class="label">顧客区分</div>
<div class="chip-group">
<button class="chip" onclick="setCountry('日本',this)">日本</button>
<button class="chip" onclick="setCountry('海外',this)">海外</button>
</div>

<div id="countrySelectBox" class="hidden">
<select id="countrySelect">
<option>香港</option>
<option>台湾</option>
<option>韓国</option>
<option>中国</option>
<option>オーストラリア</option>
<option>その他</option>
</select>
</div>

<!-- 区分 -->
<div class="label">区分</div>
<div class="chip-group">
<button class="chip" onclick="setChip('type','新規',this)">新規</button>
<button class="chip" onclick="setChip('type','再来',this)">再来</button>
</div>

<!-- 指名 -->
<div class="label">指名</div>
<div class="chip-group">
<button class="chip" onclick="setChip('shimei','フリー',this)">フリー</button>
<button class="chip" onclick="setChip('shimei','NET',this)">NET</button>
<button class="chip" onclick="setChip('shimei','P',this)">P</button>
<button class="chip" onclick="setChip('shimei','リピ',this)">リピ</button>
</div>

<!-- オプション -->
<div class="label">オプション</div>
<div class="chip-group">
<button class="chip" onclick="toggleOp('AN',this)">AN</button>
<button class="chip" onclick="toggleOp('SL',this)">SL</button>
<button class="chip" onclick="toggleOp('NL',this)">NL</button>
<button class="chip" onclick="toggleOp('K',this)">K</button>
<button class="chip" onclick="toggleOp('CP',this)">CP</button>
</div>

<button class="smallBtn" onclick="save()">保存</button>
<button class="smallBtn" onclick="back()">戻る</button>
  <button id="deleteBtn" class="smallBtn" onclick="deleteRecord()" style="background:#ff4d4d;">削除</button>

</div>
</div>

</div>

<div class="fab" onclick="add()">＋</div>
<!-- 追加：ナビボタン -->
<div class="nav-buttons">

  <a href="top.html" class="nav-btn">
    TOPへ
  </a>

  <a href="money.html" class="nav-btn">
    ダッシュボード
  </a>

</div>
<script>
let allRecords = JSON.parse(localStorage.getItem("records") || "[]");
let records = [...allRecords];

let form = {
  time:"",
  course:"",
  country:"日本",
  type:"",
  shimei:"",
  op:[]
};
let editIndex = null;
 /* ===== 初期化 ===== */
createTimeChips();
render();

/* ===== 時間チップ生成 ===== */
function createTimeChips(){
  const group = document.getElementById("timeGroup");
  for(let i=8;i<=23;i++){
    const btn = document.createElement("button");
    btn.className="chip";
    btn.innerText=i+"時";
    btn.onclick=()=>setChip("time",i,btn);
    group.appendChild(btn);
  }
}

/* ===== 画面切替 ===== */
function add(){
form = {
    time:"",
    course:"",
    country:"日本",
    type:"",
    shimei:"",
    op:[]
  };

  editIndex = null;
document.getElementById("deleteBtn").style.display = "none";
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  document.getElementById("countrySelectBox").classList.add("hidden");
  // ↓ここ追加（今日の日付を自動入力）
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');

  document.getElementById("date").value = `${yyyy}-${mm}-${dd}`;
  // ↑ここまで追加

  const detailPage = document.getElementById("detailPage");
  document.getElementById("detailPage").style.display="block";
}

function back(){
  document.getElementById("listPage").style.display="block";
  document.getElementById("detailPage").style.display="none";
  document.getElementById("deleteBtn").style.display = "none";
}

/* ===== チップ ===== */
function setChip(type,value,el){
  form[type]=value;
  const group=el.parentNode;
  group.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

function setCountry(val,el){
  form.country=val;

  document.querySelectorAll(".chip-group .chip").forEach(c=>{
    if(c.innerText==="日本"||c.innerText==="海外"){
      c.classList.remove("active");
    }
  });

  el.classList.add("active");

  const box=document.getElementById("countrySelectBox");
  if(val==="海外"){
    box.classList.remove("hidden");
  }else{
    box.classList.add("hidden");
  }
}

function toggleOp(val,el){
  if(form.op.includes(val)){
    form.op=form.op.filter(v=>v!==val);
    el.classList.remove("active");
  }else{
    form.op.push(val);
    el.classList.add("active");
  }
}

/* ===== 保存 ===== */
function save(){
  const record={
    date:document.getElementById("date").value,
    cast:document.getElementById("cast").value,
    price:document.getElementById("price").value,
    time:form.time,
    course:form.course,
    country: form.country === "海外"
  ? document.getElementById("countrySelect").value
  : "日本",
    type:form.type,
    shimei:form.shimei,
    op:form.op
  };

  if(editIndex !== null){
    records[editIndex] = record; // ←上書き
    editIndex = null;
  }else{
    records.push(record); // ←新規
  }

  localStorage.setItem("records",JSON.stringify(records));

  back();
  render();
}
function deleteRecord(){
  if(editIndex === null){
    alert("削除できるデータがありません");
    return;
  }

  if(confirm("このデータを削除しますか？")){
    records.splice(editIndex, 1);

localStorage.setItem("records", JSON.stringify(records));

allRecords = JSON.parse(localStorage.getItem("records") || "[]");
records = [...allRecords];

back();
render();
  }
}
 function editRecord(index){
  const r = records[index];

  editIndex = index;
document.getElementById("deleteBtn").style.display = "block";
  document.getElementById("date").value = r.date || "";
  document.getElementById("cast").value = r.cast || "";
  document.getElementById("price").value = r.price || "";

  form.time = r.time;
  form.course = r.course;

  // ★ここ修正
  if(r.country === "日本"){
    form.country = "日本";
  }else{
    form.country = "海外";
  }

  form.type = r.type;
  form.shimei = r.shimei;
  form.op = r.op || [];

  document.getElementById("listPage").style.display="none";
  document.getElementById("detailPage").style.display="block";

  reflectChips();

  // ★これ追加（国も復元）
  if(r.country !== "日本"){
    document.getElementById("countrySelect").value = r.country;
  }
}
  function reflectChips(){
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));

  document.querySelectorAll(".chip").forEach(c=>{
    if(c.innerText == form.course) c.classList.add("active");
    if(c.innerText == form.shimei) c.classList.add("active");
    if(c.innerText == form.type) c.classList.add("active");
    if(c.innerText == form.time+"時") c.classList.add("active");

    if(form.country == "日本" && c.innerText=="日本") c.classList.add("active");
    if(form.country == "海外" && c.innerText=="海外") c.classList.add("active");

    if(form.op.includes(c.innerText)) c.classList.add("active");
  });

  if(form.country==="海外"){
    document.getElementById("countrySelectBox").classList.remove("hidden");
  }else{
    document.getElementById("countrySelectBox").classList.add("hidden");
  }
}
/* ===== 描画 ===== */
function filterData(){

  const month = document.getElementById("monthFilter").value;
  const date = document.getElementById("dateFilter").value;

  const filtered = allRecords.filter(r => {

    if(!r.date) return false;

    const matchMonth = month ? r.date.slice(5,7) === month : true;
    const matchDate = date ? r.date === date : true;

    return matchMonth && matchDate;
  });

  records = filtered;
  render();
}
  function render(){
  const list=document.getElementById("listPage");
  list.innerHTML="";

  records.slice().reverse().forEach((r, i) => {
    const index = records.length - 1 - i;

    const div=document.createElement("div"); // ←これ追加

    const formattedDate = r.date ? r.date.slice(5).replace("-", "/") : "";

    div.innerHTML = `
    <span>
      ${formattedDate}｜${r.course}｜${r.shimei}｜${r.cast}
    </span>

    <span style="
      margin-left:auto;
      font-weight:600;
      background:linear-gradient(90deg,#6aa2ff,#ff7ad9);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    ">
      ${r.price ? Number(r.price).toLocaleString() + "円" : ""}
    </span>
    `;

    div.onclick = () => editRecord(index); // ←OK

    list.appendChild(div);
  });
}

</script>

</body>
</html>
