<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skill Mirror GRID 2x2</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans";
  color:#e6eeff;

  background:
    radial-gradient(circle at 50% 0%, rgba(60,110,255,0.18), transparent 60%),
    radial-gradient(circle at 80% 30%, rgba(160,60,255,0.12), transparent 65%),
    #02040a;
}

/* HEADER */
header{
  padding:16px;
}

h1{
  margin:0;
  font-size:18px;
}

/* INPUT */
.inputBox{
  display:flex;
  gap:8px;
  padding:0 12px;
}

input{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

button{
  padding:14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#4d6bff,#7a3cff);
  color:white;
}

/* GRID DEFAULT = 2x2 */
#list{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* PC = 4 columns */
@media (min-width:900px){
  #list{
    grid-template-columns:repeat(4,1fr);
  }
}

/* CARD */
.card{
  padding:14px;
  border-radius:16px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(120,140,255,0.12);

  display:flex;
  flex-direction:column;
  gap:8px;
}

/* TITLE */
.title{
  font-size:13px;
  font-weight:600;
}

/* BADGE */
.badge{
  font-size:10px;
  opacity:0.6;
}

/* BAR */
.barBg{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:100%;
  background:linear-gradient(90deg,#4d6bff,#7a3cff);
}

.barDanger{
  height:100%;
  background:linear-gradient(90deg,#ff3b3b,#ff0055);
}

/* ACTIONS */
.actions{
  display:flex;
  gap:5px;
}
.top-btn{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);

  width:88%;
  max-width:420px;

  padding:14px;

  border-radius:16px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(30px);

  color:rgba(255,255,255,0.85);
  font-weight:500;

  box-shadow:0 25px 80px rgba(0,0,0,0.6);

  cursor:pointer;
  transition:0.2s ease;
}

.top-btn:hover{
  transform:translateX(-50%) translateY(-2px);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
}

.top-btn:active{
  transform:translateX(-50%) scale(0.98);
}
.btn{
  flex:1;
  padding:6px;
  font-size:10px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>Skill Mirror GRID 2x2</h1>
</header>

<div class="inputBox">
  <input id="title" placeholder="苦手・ミス入力">
  <button onclick="add()">追加</button>
</div>

<div id="list"></div>

<script>

let data = JSON.parse(localStorage.getItem("skills") || "[]");

/* SAVE */
function save(){
  localStorage.setItem("skills", JSON.stringify(data));
  render();
}

/* ADD */
function add(){
  let t=document.getElementById("title").value;
  if(!t) return;

  data.push({
    id:Date.now(),
    title:t,
    repeat:1
  });

  save();
}

/* SCORE */
function score(d){
  return d.repeat;
}

/* DELETE */
function del(i){
  data.splice(i,1);
  save();
}

/* REPEAT */
function bump(i){
  data[i].repeat++;
  save();
}

/* RENDER */
function render(){

  let list=document.getElementById("list");
  list.innerHTML="";

  let view=[...data].sort((a,b)=>score(b)-score(a));

  view.forEach((d,i)=>{

    let danger=d.repeat>=3;
    let width=Math.min(d.repeat*20,100);

    list.innerHTML+=`
      <div class="card">

        <div class="title">${d.title}</div>

        <div class="badge">${danger?"🔥危険":"通常"}</div>

        <div class="barBg">
          <div class="${danger?'barDanger':'bar'}"
               style="width:${width}%"></div>
        </div>

        <div class="actions">
          <button class="btn" onclick="bump(${i})">+</button>
          <button class="btn" onclick="del(${i})">×</button>
        </div>

      </div>
    `;
  });
}

/* INIT */
render();

</script>
<button class="top-btn" onclick="location.href='top.html'">
  TOPへ戻る
</button>
</body>
</html>
