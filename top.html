<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Dashboard</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Meiryo", sans-serif;
background:#000;
color:#f5f5f7;
height:100vh;
overflow:hidden;
}

/* ===== 空間ライト ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 45%),
radial-gradient(circle at 80% 70%, rgba(120,180,255,0.08), transparent 50%),
radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 60%);
filter: blur(18px);
pointer-events:none;
}

/* ===== ヘッダー（上固定） ===== */
header{
position:fixed;
top:24px;
left:0;
width:100%;
text-align:center;
font-size:13px;
letter-spacing:4px;
color:rgba(255,255,255,0.6);
z-index:10;
}

/* ===== 中央レイアウト（ここが重要） ===== */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
gap:16px;
width:100%;
max-width:420px;
padding:20px;
}

/* ===== 超ガラスカード（強化版） ===== */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.18);
border-radius:26px;

padding:26px;
text-align:center;
cursor:pointer;
transition:0.35s;

backdrop-filter: blur(28px);
-webkit-backdrop-filter: blur(28px);

/* 内側＋外側の光 */
box-shadow:
0 30px 80px rgba(0,0,0,0.75),
inset 0 1px 0 rgba(255,255,255,0.15),
inset 0 -1px 0 rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-3px) scale(1.015);
border-color:rgba(255,255,255,0.25);
}

.card:active{
transform:scale(0.98);
}

.title{
font-size:18px;
font-weight:500;
letter-spacing:1px;
margin-bottom:6px;
}

.desc{
font-size:12px;
color:rgba(255,255,255,0.6);
line-height:1.5;
}

.tag{
margin-top:12px;
display:inline-block;
font-size:10px;
padding:4px 12px;
border-radius:999px;

background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.14);
color:rgba(255,255,255,0.7);
}

/* ===== 下ナビ（固定） ===== */
.nav{
position:fixed;
bottom:22px;
left:50%;
transform:translateX(-50%);

width:92%;
max-width:440px;
height:64px;

background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.18);
border-radius:24px;

backdrop-filter: blur(30px);
-webkit-backdrop-filter: blur(30px);

display:flex;
align-items:center;
justify-content:space-around;

box-shadow:
0 30px 90px rgba(0,0,0,0.8),
inset 0 1px 0 rgba(255,255,255,0.1);
}

.nav-btn{
flex:1;
text-align:center;
font-size:10px;
color:rgba(255,255,255,0.55);
cursor:pointer;
transition:0.25s;
}

.nav-btn strong{
display:block;
font-size:13px;
color:rgba(255,255,255,0.9);
}

.nav-btn:active{
transform:scale(0.92);
}
</style>
</head>

<body>

<header>
VISION DASHBOARD
</header>

<div class="center">

<div class="card" onclick="openPage('manual.html')">
<div class="title">Manual</div>
<div class="desc">Knowledge / Rules / System Logic</div>
<div class="tag">GUIDE</div>
</div>

<div class="card" onclick="openPage('task.html')">
<div class="title">Task</div>
<div class="desc">Execution / Daily Flow / Action</div>
<div class="tag">WORK</div>
</div>

<div class="card" onclick="openPage('index.html')">
<div class="title">Progress</div>
<div class="desc">KPI / Analytics / Performance</div>
<div class="tag">DATA</div>
</div>

</div>

<div class="nav">

<div class="nav-btn" onclick="openPage('top.html')">
<strong>Home</strong>
</div>

<div class="nav-btn" onclick="openPage('manual.html')">
<strong>Manual</strong>
</div>

<div class="nav-btn" onclick="openPage('task.html')">
<strong>Task</strong>
</div>

<div class="nav-btn" onclick="openPage('index.html')">
<strong>Data</strong>
</div>

</div>

<script>
function openPage(url){
window.location.href = url;
}
</script>

</body>
</html>
